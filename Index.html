<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>English Dojo PWA</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #0b0f14; color: #e4dcd0; }
    .serif { font-family: 'Lora', serif; }
    .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    .flip-card { perspective: 1000px; height: 320px; }
    .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1.5rem; display: flex; flex-direction: column; padding: 1.5rem; justify-content: center; }
    .flip-back { transform: rotateY(180deg); background: rgba(212,168,67,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 核心 API 函式 ---
    async function callGemini(prompt, system) {
      const key = localStorage.getItem('gemini_api_key');
      if (!key) throw new Error("請先設定 API Key");
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `${system}\n\nUser: ${prompt}` }] }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return JSON.parse(data.candidates[0].content.parts[0].text);
    }

    // --- 模組組件 ---
    
    // 1. 字彙
    function VocabView() {
      const [data, setData] = useState(null);
      const [idx, setIdx] = useState(0);
      const [flip, setFlip] = useState(false);
      const [loading, setLoading] = useState(false);

      const gen = async () => {
        setLoading(true);
        try {
          const res = await callGemini("Generate 5 B2-C1 words.", "Return JSON array: [{\"word\":\"...\",\"pos\":\"...\",\"def\":\"...\",\"zh\":\"...\",\"ex\":\"...\",\"tip\":\"...\"}]");
          setData(res); setIdx(0); setFlip(false);
        } catch(e) { alert(e.message); }
        setLoading(false);
      };

      return (
        <div className="p-4 space-y-4">
          <button onClick={gen} className="w-full p-4 bg-[#d4a843] text-black font-bold rounded-xl">{loading ? "生成中..." : "🎲 生成字彙組"}</button>
          {data && (
            <>
              <div className="flip-card" onClick={() => setFlip(!flip)}>
                <div className={`flip-inner ${flip ? 'flipped' : ''}`}>
                  <div className="flip-front glass items-center shadow-2xl">
                    <h2 className="text-4xl font-bold text-[#d4a843]">{data[idx].word}</h2>
                    <p className="mt-2 opacity-50">{data[idx].pos}</p>
                    <p className="mt-4 text-xl">{data[idx].zh}</p>
                  </div>
                  <div className="flip-back glass shadow-2xl overflow-y-auto">
                    <p className="text-sm serif leading-relaxed">{data[idx].def}</p>
                    <p className="mt-4 italic text-[#d4a843]">"{data[idx].ex}"</p>
                    <p className="mt-4 text-xs opacity-60">💡 {data[idx].tip}</p>
                  </div>
                </div>
              </div>
              <div className="flex gap-4">
                <button onClick={()=>setIdx(Math.max(0,idx-1))} className="flex-1 p-3 glass rounded-xl">Prev</button>
                <button onClick={()=>setIdx(Math.min(4,idx+1))} className="flex-1 p-3 glass rounded-xl">Next</button>
              </div>
            </>
          )}
        </div>
      );
    }

    // 2. 文法
    function GrammarView() {
      const [qs, setQs] = useState([]);
      const [qi, setQi] = useState(0);
      const [ans, setAns] = useState(null);
      const [loading, setLoading] = useState(false);

      const gen = async () => {
        setLoading(true); setAns(null);
        try {
          const res = await callGemini("Generate 5 FLPT grammar MCQs.", "Return JSON array: [{\"q\":\"...\",\"o\":[\"A...\",\"B...\",\"C...\",\"D...\"],\"a\":0,\"exp\":\"...\"}]");
          setQs(res); setQi(0);
        } catch(e) { alert(e.message); }
        setLoading(false);
      };

      return (
        <div className="p-4 space-y-4">
          <button onClick={gen} className="w-full p-4 bg-[#d4a843] text-black font-bold rounded-xl">{loading ? "出題中..." : "⚡ 開始文法挑戰"}</button>
          {qs.length > 0 && (
            <div className="glass p-6 rounded-2xl space-y-4">
              <p className="text-lg serif">{qs[qi].q}</p>
              {qs[qi].o.map((opt, i) => (
                <button key={i} onClick={()=>setAns(i)} className={`w-full p-4 text-left rounded-xl border ${ans===i ? 'border-[#d4a843] bg-[#d4a843]/10' : 'border-white/10'}`}>{opt}</button>
              ))}
              {ans !== null && <div className="p-4 bg-white/5 rounded-xl text-sm leading-relaxed border-l-4 border-[#d4a843]">{ans === qs[qi].a ? "✅ 正確！" : "❌ 答錯了！"}<br/>{qs[qi].exp}</div>}
              {ans !== null && <button onClick={()=>{setQi((qi+1)%5); setAns(null)}} className="w-full p-3 bg-white/10 rounded-xl mt-4">下一題</button>}
            </div>
          )}
        </div>
      );
    }

    // 3. 閱讀文章
    function ArticleView() {
        const [art, setArt] = useState(null);
        const [loading, setLoading] = useState(false);
        const [show, setShow] = useState(false);

        const gen = async () => {
            setLoading(true); setShow(false);
            try {
                const res = await callGemini("Write a 300-word B2-C1 military/tech article.", "Return JSON: {\"t\":\"Title\",\"c\":\"Content\",\"tr\":\"Translation\",\"an\":\"Analysis\"}");
                setArt(res);
            } catch(e) { alert(e.message); }
            setLoading(false);
        };

        return (
            <div className="p-4 space-y-4">
                <button onClick={gen} className="w-full p-4 bg-[#d4a843] text-black font-bold rounded-xl">{loading ? "撰寫中..." : "📰 獲取深度文章"}</button>
                {art && (
                    <div className="glass p-6 rounded-2xl space-y-6 overflow-hidden">
                        <h2 className="text-2xl font-bold text-[#d4a843]">{art.t}</h2>
                        <p className="serif text-lg leading-relaxed opacity-90">{art.c}</p>
                        <button onClick={()=>setShow(!show)} className="w-full p-3 border border-[#d4a843] text-[#d4a843] rounded-xl font-bold">{show ? "隱藏研析" : "展開中譯與研析"}</button>
                        {show && <div className="space-y-4 animate-fade-in"><p className="text-sm opacity-60 bg-white/5 p-4 rounded-xl">{art.tr}</p><div className="p-4 bg-[#d4a843]/5 border-l-2 border-[#d4a843] text-xs leading-loose">{art.an}</div></div>}
                    </div>
                )}
            </div>
        );
    }

    // --- 設定視窗 ---
    function Settings({ close }) {
      const [k, setK] = useState(localStorage.getItem('gemini_api_key') || "");
      return (
        <div className="fixed inset-0 z-50 bg-black/95 p-8 flex flex-col justify-center">
          <h2 className="text-2xl font-bold mb-6 text-[#d4a843]">Gemini API 設定</h2>
          <input type="password" value={k} onChange={e=>setK(e.target.value)} className="p-4 glass rounded-xl mb-4 outline-none" placeholder="貼上您的 API Key..."/>
          <button onClick={()=>{localStorage.setItem('gemini_api_key', k); close();}} className="bg-[#d4a843] text-black font-bold p-4 rounded-xl">儲存並啟動 Dojo</button>
        </div>
      );
    }

    // --- 主程式入口 ---
    function App() {
      const [tab, setTab] = useState("home");
      const [setMode, setSetMode] = useState(!localStorage.getItem('gemini_api_key'));

      return (
        <div className="max-w-[480px] mx-auto min-h-screen flex flex-col">
          {setMode && <Settings close={()=>setSetMode(false)} />}
          <header className="p-6 border-b border-white/5 flex justify-between items-center bg-[#0b0f14]/90 backdrop-blur sticky top-0 z-40">
            <h1 className="text-xl font-extrabold text-[#d4a843]">English Dojo</h1>
            <button onClick={()=>setSetMode(true)} className="p-2 glass rounded-full text-xs">⚙️</button>
          </header>

          <main className="flex-1 pb-24">
            {tab === "home" && (
              <div className="p-6 grid gap-4 mt-4">
                <button onClick={()=>setTab("vocab")} className="p-8 glass rounded-3xl border-l-8 border-[#d4a843] text-left active:scale-95 transition-all"><h3 className="text-xl font-bold">🔤 Vocab Drill</h3><p className="text-xs opacity-40 mt-1">字彙翻轉練習</p></button>
                <button onClick={()=>setTab("grammar")} className="p-8 glass rounded-3xl border-l-8 border-[#d4a843] text-left active:scale-95 transition-all"><h3 className="text-xl font-bold">⚡ Grammar Blast</h3><p className="text-xs opacity-40 mt-1">FLPT 文法測驗</p></button>
                <button onClick={()=>setTab("article")} className="p-8 glass rounded-3xl border-l-8 border-[#d4a843] text-left active:scale-95 transition-all"><h3 className="text-xl font-bold">📰 Article Room</h3><p className="text-xs opacity-40 mt-1">深度文章研析</p></button>
              </div>
            )}
            {tab === "vocab" && <VocabView />}
            {tab === "grammar" && <GrammarView />}
            {tab === "article" && <ArticleView />}
          </main>

          <nav className="fixed bottom-0 w-full max-w-[480px] p-4 glass border-t border-white/5 flex justify-around items-center z-40">
            <button onClick={()=>setTab("home")} className={`text-2xl ${tab==='home'?'text-[#d4a843]':'opacity-20'}`}>🏠</button>
            <button onClick={()=>setTab("vocab")} className={`text-2xl ${tab==='vocab'?'text-[#d4a843]':'opacity-20'}`}>📚</button>
            <button onClick={()=>setTab("grammar")} className={`text-2xl ${tab==='grammar'?'text-[#d4a843]':'opacity-20'}`}>⚡</button>
            <button onClick={()=>setTab("article")} className={`text-2xl ${tab==='article'?'text-[#d4a843]':'opacity-20'}`}>📰</button>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
