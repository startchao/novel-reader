<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="書卷">
<meta name="theme-color" content="#8b5e3c">
<title>書卷</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --bg:#f5f0e8;--surface:#ede7da;--surface2:#e3ddd0;
  --text:#1e1408;--text-dim:#7a6e5a;--accent:#8b5e3c;--accent-light:#c49a6c;
  --border:#d5cec2;--shadow:rgba(44,30,14,.12);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="night"]{--bg:#0e0d0a;--surface:#1a1814;--surface2:#222018;--text:#d5c9b5;--text-dim:#665e50;--accent:#c49a6c;--accent-light:#8b5e3c;--border:#2a2820;--shadow:rgba(0,0,0,.6);}
[data-theme="eye"]{--bg:#ccd9b8;--surface:#bfcfaa;--surface2:#b2c49c;--text:#182810;--text-dim:#426030;--accent:#3a6820;--accent-light:#5a9040;--border:#a0bc88;--shadow:rgba(20,40,10,.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.page{position:fixed;inset:0;display:flex;flex-direction:column;}
.page.hidden{display:none;}

/* ══ LIBRARY ══ */
.lib-hd{display:flex;align-items:center;padding:calc(var(–safe-top)+14px) 16px 12px;background:var(–surface);border-bottom:1px solid var(–border);gap:10px;flex-shrink:0;}
.lib-title{flex:1;font-size:20px;font-weight:500;letter-spacing:3px;color:var(–accent);}
.icon-btn{width:40px;height:40px;border-radius:12px;border:none;background:transparent;color:var(–text-dim);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icon-btn:active{background:var(–surface2);}
.search-bar{padding:10px 16px;background:var(–surface);border-bottom:1px solid var(–border);flex-shrink:0;}
.search-inner{display:flex;align-items:center;background:var(–bg);border:1px solid var(–border);border-radius:10px;padding:8px 12px;gap:8px;}
.search-inner input{flex:1;border:none;background:transparent;color:var(–text);font-size:15px;font-family:inherit;outline:none;}
.search-inner input::placeholder{color:var(–text-dim);}
.s-clr{font-size:14px;color:var(–text-dim);cursor:pointer;display:none;padding:2px 6px;}
.lib-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.add-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(–border);cursor:pointer;background:var(–surface);}
.add-row:active{background:var(–surface2);}
.add-thumb{width:44px;height:58px;border-radius:8px;border:2px dashed var(–border);background:var(–bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.add-label{font-size:14px;color:var(–accent);font-weight:500;}
.add-sub{font-size:12px;color:var(–text-dim);margin-top:3px;}
.book-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(–border);cursor:pointer;}
.book-row:active{background:var(–surface2);}
.b-thumb{width:44px;height:58px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:1px 2px 6px var(–shadow);}
.b-info{flex:1;min-width:0;}
.b-title{font-size:15px;font-weight:500;color:var(–text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
.b-meta{font-size:12px;color:var(–text-dim);}
.empty-lib{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;text-align:center;}
.empty-lib .ei{font-size:52px;opacity:.35;}
.empty-lib .et{font-size:15px;color:var(–text-dim);letter-spacing:1px;}
.no-result{display:none;padding:30px;text-align:center;color:var(–text-dim);font-size:14px;}

/* ══ READER ══ */
#page-reader{background:var(–bg);}
.r-topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;
padding:calc(var(–safe-top)+10px) 14px 10px;background:var(–surface);
border-bottom:1px solid var(–border);gap:8px;transition:transform .28s,opacity .28s;}
.r-topbar.ui-hide{transform:translateY(-110%);opacity:0;pointer-events:none;}
.r-book-title{flex:1;font-size:15px;font-weight:500;color:var(–text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.r-toolbar{position:absolute;bottom:0;left:0;right:0;z-index:20;background:var(–surface);
border-top:1px solid var(–border);padding:6px 0 calc(var(–safe-bottom)+6px);
display:flex;align-items:center;justify-content:space-around;transition:transform .28s,opacity .28s;}
.r-toolbar.ui-hide{transform:translateY(110%);opacity:0;pointer-events:none;}
.tb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;
border:none;background:transparent;color:var(–text-dim);cursor:pointer;border-radius:10px;font-size:11px;min-width:44px;}
.tb-btn:active{background:var(–surface2);}
.tb-btn .tbi{font-size:20px;line-height:1.2;}
.tb-btn.active,.tb-btn.active .tbi{color:var(–accent);}

/* ══ FLIP ══ */
.r-flip{position:absolute;inset:0;display:flex;flex-direction:column;}
.flip-zones{position:absolute;inset:0;z-index:10;display:flex;}
.fz-l{flex:0 0 28%;height:100%;cursor:pointer;}
.fz-m{flex:1;height:100%;cursor:pointer;}
.fz-r{flex:0 0 28%;height:100%;cursor:pointer;}

/*

- flip-text: 精確分頁的關鍵 CSS
- padding: top 20px, sides 22px, bottom 10px — 與 JS 計算必須一致
- overflow: hidden — 電子書式，超出部分截斷
- line-height 在 JS 中動態設定
  */
  .flip-text{
  flex:1;
  overflow:hidden;
  padding:20px 22px 10px;
  color:var(–text);
  }
  .flip-text p{
  margin-bottom:.5em;   /* = 0.5 × fontSize，JS 計算時納入 */
  text-indent:2em;
  word-break:break-all;
  }
  .flip-text .ch-h{
  font-weight:500;
  color:var(–accent);
  text-indent:0;
  margin:1em 0 .8em;   /* top=1em, bottom=0.8em，JS 計算時納入 */
  padding-left:12px;
  border-left:3px solid var(–accent);
  }
  .flip-prog-bar{height:2px;background:var(–surface2);flex-shrink:0;}
  .flip-prog-fill{height:100%;background:var(–accent);transition:width .3s;}
  .flip-footer{flex-shrink:0;padding:4px 20px calc(var(–safe-bottom)+2px);display:flex;align-items:center;justify-content:space-between;}
  .flip-pnum{font-size:12px;color:var(–text-dim);}

/* ══ PANELS ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;opacity:0;pointer-events:none;transition:opacity .28s;}
.overlay.open{opacity:1;pointer-events:auto;}
.panel{position:fixed;bottom:0;left:0;right:0;background:var(–surface);border-radius:20px 20px 0 0;
z-index:51;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
max-height:82vh;display:flex;flex-direction:column;padding-bottom:var(–safe-bottom);}
.panel.open{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(–border);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.panel-title{font-size:15px;font-weight:500;letter-spacing:2px;color:var(–text);
padding:14px 20px 12px;border-bottom:1px solid var(–border);flex-shrink:0;
display:flex;align-items:center;justify-content:space-between;}
.panel-close{font-size:18px;color:var(–text-dim);cursor:pointer;padding:0 4px;}
.panel-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(–border);gap:12px;}
.srow:last-child{border-bottom:none;}
.slabel{font-size:14px;color:var(–text-dim);white-space:nowrap;}
.btnrow{display:flex;gap:6px;flex-wrap:wrap;}
.cbtn{padding:6px 14px;border-radius:20px;border:1px solid var(–border);background:transparent;color:var(–text-dim);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;}
.cbtn.active{background:var(–accent);border-color:var(–accent);color:#fff;}
.szctrl{display:flex;align-items:center;gap:10px;}
.szval{font-size:13px;color:var(–text);width:28px;text-align:center;}
.szbtn{width:32px;height:32px;border-radius:50%;border:1px solid var(–border);background:var(–surface2);color:var(–text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.tts-cur{font-size:13px;color:var(–text-dim);text-align:center;padding:4px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:20px;}
.tts-ctrl{display:flex;align-items:center;gap:12px;justify-content:center;padding:12px 0;}
.tts-cb{width:52px;height:52px;border-radius:50%;border:none;background:var(–surface2);color:var(–text-dim);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.tts-cb.play{width:64px;height:64px;background:var(–accent);color:#fff;font-size:26px;}
.tts-cb:active{opacity:.7;}
.timer-disp{font-size:26px;font-weight:300;color:var(–accent);letter-spacing:3px;text-align:center;padding:6px 0;}
.timer-slider{width:100%;accent-color:var(–accent);cursor:pointer;margin:4px 0;}
.timer-labels{display:flex;justify-content:space-between;font-size:11px;color:var(–text-dim);margin-bottom:8px;}
.ch-item{padding:13px 4px 13px 12px;border-bottom:1px solid var(–border);font-size:14px;color:var(–text-dim);cursor:pointer;border-left:3px solid transparent;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-item:active{background:var(–surface2);}
.ch-item.active{color:var(–accent);border-left-color:var(–accent);}
.bm-row{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(–border);gap:10px;}
.bm-row:last-child{border-bottom:none;}
.bm-info{flex:1;cursor:pointer;}
.bm-prev{font-size:13px;color:var(–text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bm-meta{font-size:11px;color:var(–text-dim);}
.bm-del{font-size:16px;background:none;border:none;cursor:pointer;color:var(–text-dim);padding:4px 8px;}
.toast{position:fixed;bottom:calc(var(–safe-bottom)+100px);left:50%;transform:translateX(-50%) translateY(14px);background:rgba(0,0,0,.78);color:#fff;padding:10px 22px;border-radius:22px;font-size:14px;opacity:0;transition:opacity .22s,transform .22s;z-index:200;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:10px;}
</style>

</head>
<body data-theme="day">

<!-- ══ LIBRARY ══ -->

<div class="page" id="page-library">
  <div class="lib-hd">
    <div class="lib-title">書　卷</div>

  </div>
  <div class="search-bar">

<!-- OpenCC 簡繁轉換 -->

<script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>

<script>
'use strict';

// ══════════════════════════════════════════
// DB
// ══════════════════════════════════════════
const DB_NAME='ShujuanDB',DB_VER=2;
let _db;
function openDB(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db);
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('books')){
        const bs=d.createObjectStore('books',{keyPath:'id',autoIncrement:true});
        bs.createIndex('lastRead','lastRead');
      }
      if(!d.objectStoreNames.contains('settings'))
        d.createObjectStore('settings',{keyPath:'key'});
      if(!d.objectStoreNames.contains('bms')){
        const bms=d.createObjectStore('bms',{keyPath:'id',autoIncrement:true});
        bms.createIndex('bookId','bookId');
      }
    };
    r.onsuccess=e=>{_db=e.target.result;res(_db);};
    r.onerror=e=>rej(e);
  });
}
async function dbOp(store,mode,fn){const d=await openDB();return new Promise((res,rej)=>{const s=d.transaction(store,mode).objectStore(store);const r=fn(s);if(r){r.onsuccess=()=>res(r.result);r.onerror=rej;}else res();});}
const dbPut=(st,o)=>dbOp(st,'readwrite',s=>s.put(o));
const dbGet=(st,k)=>dbOp(st,'readonly',s=>s.get(k));
const dbDel=(st,k)=>dbOp(st,'readwrite',s=>s.delete(k));
const dbAll=(st)=>dbOp(st,'readonly',s=>s.getAll());
async function dbIdx(st,ix,k){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction(st,'readonly').objectStore(st).index(ix).getAll(k);r.onsuccess=()=>res(r.result);r.onerror=rej;});}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
const DEF_S={fontSize:18,lineHeight:2,font:'serif',theme:'day'};
async function loadS(){const r=await dbGet('settings','app');return r?{...DEF_S,...r.value}:{...DEF_S};}
async function saveS(){await dbPut('settings',{key:'app',value:App.s});}

// ══════════════════════════════════════════
// OpenCC 簡→繁轉換
// 使用 opencc-js，支援語境判斷（发/髮、后/後 等歧義字）
// ══════════════════════════════════════════
let _openccConverter = null;

function _initOpenCC() {
  try {
    if (typeof OpenCC !== 'undefined') {
      _openccConverter = OpenCC.Converter({ from: 'cn', to: 'twp' });
    }
  } catch(e) {
    console.warn('OpenCC 初始化失敗，降級使用基本轉換', e);
    _openccConverter = null;
  }
}

function s2t(str) {
  if (_openccConverter) {
    try { return _openccConverter(str); } catch(e) {}
  }
  // 降級：基本常用字對照（OpenCC 載入失敗時備用）

// TTS
// ══════════════════════════════════════════
const synth=window.speechSynthesis;
let _ttsOn=false,_ttsBusy=false,_ttsIdx=0,_ttsParas=[],_ttsSpeed=1.0;
let _timerIv=null,_timerSecs=0,_timerPreview=10;

function _bestVoice(){const vs=synth.getVoices();return vs.find(v=>v.lang==='zh-TW'&&v.localService)||vs.find(v=>v.lang.startsWith('zh')&&v.localService)||vs.find(v=>v.lang.startsWith('zh'))||null;}
function _speak(idx){
  if(!_ttsOn||idx>=_ttsParas.length){if(idx>=_ttsParas.length){_stopTTS();document.getElementById('tts-cur').textContent='朗讀完畢';}return;}
  if(_ttsBusy)return;
  _ttsBusy=true;synth.cancel();_ttsIdx=idx;
  document.getElementById('tts-play-btn').textContent='⏸';
  document.getElementById('tts-cur').textContent=_ttsParas[idx].substring(0,40)+(_ttsParas[idx].length>40?'…':'');
  const u=new SpeechSynthesisUtterance(_ttsParas[idx]);
  u.lang='zh-TW';u.rate=_ttsSpeed;
  const v=_bestVoice();if(v)u.voice=v;
  u.onstart=()=>{_ttsBusy=true;};
  u.onend=()=>{_ttsBusy=false;if(_ttsOn)_speak(idx+1);};
  u.onerror=()=>{_ttsBusy=false;if(_ttsOn)_speak(idx+1);};
  setTimeout(()=>{if(_ttsOn)synth.speak(u);else _ttsBusy=false;},60);
}
function _stopTTS(){_ttsOn=false;_ttsBusy=false;synth.cancel();document.getElementById('tts-play-btn').textContent='▶';}
function toggleTTS(){if(_ttsOn)_stopTTS();else{_ttsOn=true;_ttsBusy=false;_speak(_ttsIdx);}}
function ttsPrev(){_ttsBusy=false;const i=Math.max(0,_ttsIdx-1);if(_ttsOn){_ttsOn=true;_speak(i);}else _ttsIdx=i;}
function ttsNext(){_ttsBusy=false;if(_ttsOn){_ttsOn=true;_speak(_ttsIdx+1);}else _ttsIdx++;}
function setSpeed(s){_ttsSpeed=s;document.querySelectorAll('[data-spd]').forEach(b=>b.classList.toggle('active',parseFloat(b.dataset.spd)===s));if(_ttsOn){_ttsBusy=false;_ttsOn=true;_speak(_ttsIdx);}}

function previewTimer(v){_timerPreview=parseInt(v);document.getElementById('timer-disp').textContent=_timerIv?document.getElementById('timer-disp').textContent:String(_timerPreview).padStart(2,'0')+':00';}
function startTimer(){
  cancelTimer();_timerSecs=_timerPreview*60;
  document.getElementById('timer-cancel').style.display='';
  _timerIv=setInterval(()=>{
    _timerSecs--;
    const m=Math.floor(_timerSecs/60),s=_timerSecs%60;
    document.getElementById('timer-disp').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(_timerSecs<=0){cancelTimer();_stopTTS();showToast('⏰ 定時結束，聽書已停止');}
  },1000);
  showToast(`⏰ 定時 ${_timerPreview} 分鐘已啟動`);
}
function cancelTimer(){if(_timerIv){clearInterval(_timerIv);_timerIv=null;}document.getElementById('timer-disp').textContent='未啟動';document.getElementById('timer-cancel').style.display='none';}

// ══════════════════════════════════════════
// 章節偵測正則
// 支援：第X章、====標題====、Chapter N、楔子、序章等
// ══════════════════════════════════════════
const CH_RE = /^(={2,}[^=\n]{1,40}={2,}|第\s*[零一二三四五六七八九十百千萬\d]{1,6}\s*[章節回卷部篇集話话](\s+\S.{0,40})?|Chapter\s*\d{1,4}(\s+\S.{0,40})?|[楔序][子章言](\s+\S.{0,20})?|[尾終][聲章](\s+\S.{0,20})?|番外(\s+\S.{0,20})?|外傳(\s+\S.{0,20})?|前言|後記|附錄)/i;

// ══════════════════════════════════════════
// FLIP — 精確分頁引擎 v2.0.9
//
// 設計原則：
//   計算每一行在螢幕上佔用的「實際像素高度」，
//   累加後超過可用空間就切頁，完全不使用魔法數字。
//
// CSS 對應（必須與此同步）：
//   .flip-text padding: top=20px, bottom=10px
//   p margin-bottom: 0.5em
//   .ch-h margin: top=1em, bottom=0.8em
//   line-height: 動態設定（App.s.lineHeight）
// ══════════════════════════════════════════
let _pages=[], _pidx=0, _lines=[];

// 將文字解析成行陣列
function _buildLines() {
  _lines = [];
  App.displayText.split('\n').forEach(line => {
    const t = line.trim();
    if (t) _lines.push({ t, h: CH_RE.test(t) && t.length < 60 });
  });
}

// 計算每行的實際像素高度
// isHeader: 章節標題有額外 margin
function _lineHeight(isHeader) {
  const fs = App.s.fontSize;
  const lh = App.s.lineHeight;
  const lineH = fs * lh;          // 一行文字高度（含行距）
  const marginBottom = fs * 0.5;  // p { margin-bottom: .5em }

  if (isHeader) {
    // .ch-h { margin: 1em 0 .8em } — 上下 margin 各算一次
    const marginTop = fs * 1.0;
    const marginBot = fs * 0.8;
    return marginTop + lineH + marginBot;
  } else {
    return lineH + marginBottom;
  }
}

// 主分頁函式：精確計算，不用魔法數字
function buildFlipPages() {
  const el = document.getElementById('flip-text');
  const containerH = el.clientHeight;
  if (containerH < 50) { setTimeout(buildFlipPages, 120); return; }

  // 可用高度 = 容器高度 - padding-top(20) - padding-bottom(10)
  const availH = containerH - 20 - 10;

  _pages = [];
  let curPage = [];
  let usedH = 0;

  for (const line of _lines) {
    const lh = _lineHeight(line.h);

    // 若加入這行會超出，且目前頁面已有內容，先切頁
    if (usedH + lh > availH && curPage.length > 0) {
      _pages.push(curPage);
      curPage = [];
      usedH = 0;
    }

    // 單行超過整頁（極端情況），強制放入
    curPage.push(line);
    usedH += lh;
  }

  if (curPage.length > 0) _pages.push(curPage);
  if (!_pages.length) _pages = [[{ t: '（無內容）', h: false }]];

  const saved = _savedPageIdx || 0;
  _pidx = Math.min(saved, _pages.length - 1);
  _renderFlip();
}

function _applyFlipStyle() {
  const el = document.getElementById('flip-text');
  const ff = App.s.font === 'sans' ? "'Noto Sans TC',sans-serif" : "'Noto Serif TC',serif";
  el.style.fontSize = App.s.fontSize + 'px';
  el.style.lineHeight = App.s.lineHeight;
  el.style.fontFamily = ff;
}

function _renderFlip() {
  _applyFlipStyle();
  const pg = _pages[_pidx] || [];
  document.getElementById('flip-text').innerHTML = pg.map(l =>
    l.h ? `<p class="ch-h">${esc(l.t)}</p>` : `<p>${esc(l.t)}</p>`
  ).join('');
  const tot = _pages.length;
  const pct = tot > 1 ? Math.round(_pidx / (tot - 1) * 100) : 100;
  document.getElementById('flip-pnum').textContent = `${_pidx + 1} / ${tot}`;
  document.getElementById('flip-pct').textContent = `${pct}%`;
  document.getElementById('flip-prog-fill').style.width = pct + '%';
  _saveProgress(pct);
}

let _spT, _savedPageIdx = 0;
function _saveProgress(pct) {
  _savedPageIdx = _pidx;
  clearTimeout(_spT);
  _spT = setTimeout(async () => {
    if (!App.bookId) return;
    const b = await dbGet('books', App.bookId);
    if (b) { b.progress = pct; b.pageIdx = _pidx; b.lastRead = Date.now(); await dbPut('books', b); }
  }, 800);
}

function flipNext() { if (_pidx < _pages.length - 1) { _pidx++; _renderFlip(); } }
function flipPrev() { if (_pidx > 0) { _pidx--; _renderFlip(); } }

let _sx = null;
function initSwipe() {
  const f = document.getElementById('r-flip');
  f.addEventListener('touchstart', e => { _sx = e.touches[0].clientX; }, { passive: true });
  f.addEventListener('touchend', e => {
    if (_sx === null) return;
    const dx = e.changedTouches[0].clientX - _sx; _sx = null;
    if (Math.abs(dx) > 55) { dx < 0 ? flipNext() : flipPrev(); }
  }, { passive: true });
}

async function init() {
  App.s = await loadS();
  applySettings();
  _initOpenCC();
  await renderLibrary();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  initSwipe();
  previewTimer(10);

  const fileInput = document.getElementById('file-input');
  const triggerUpload = () => fileInput.click();
  document.getElementById('upload-btn').addEventListener('click', triggerUpload);
  document.getElementById('add-row').addEventListener('click', triggerUpload);
  fileInput.addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    fileInput.value = '';
    showToast('載入中…');
    try {
      const text = await readTxt(f);
      const d = await openDB();
      const id = await new Promise((res, rej) => {
        const r = d.transaction('books', 'readwrite').objectStore('books')
          .add({ title: f.name.replace(/\.txt$/i, ''), content: text, size: f.size,
            addedAt: Date.now(), lastRead: Date.now(), progress: 0, pageIdx: 0 });
        r.onsuccess = () => res(r.result); r.onerror = rej;
      });
      await renderLibrary(); showToast('✅ 匯入成功'); openBook(id);
    } catch (err) { showToast('❌ 匯入失敗：' + err.message); }
  });
}

function readTxt(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      const t = e.target.result;
      if ((t.match(/\uFFFD/g) || []).length > 50) {
        const r2 = new FileReader();
        r2.onload = e2 => res(e2.target.result);
        r2.onerror = rej;
        r2.readAsText(f, 'GBK');
      } else res(t);
    };
    r.onerror = rej;
    r.readAsText(f, 'UTF-8');
  });
}

async function renderLibrary() {
  _allBooks = await dbAll('books');
  _allBooks.sort((a, b) => (b.lastRead || 0) - (a.lastRead || 0));
  _drawBooks(_allBooks);
}

function _drawBooks(books) {
  const list = document.getElementById('book-list');
  document.getElementById('empty-lib').style.display = books.length === 0 ? 'flex' : 'none';
  const EM = ['📖', '📚', '📜', '📕', '📗', '📘', '📙'];
  list.innerHTML = '';
  books.forEach(b => {
    let h = 0; for (const c of b.title) h = (h * 31 + c.charCodeAt(0)) >>> 0;
    const emoji = EM[h % EM.length];
    const pct = b.progress || 0;
    const sz = b.size < 1048576 ? (b.size / 1024).toFixed(0) + 'KB' : (b.size / 1048576).toFixed(1) + 'MB';
    const d = new Date(b.lastRead || b.addedAt);
    const circ = 2 * Math.PI * 14, off = circ * (1 - pct / 100);
    const row = document.createElement('div');
    row.className = 'book-row';
    row.innerHTML = `
      <div class="b-thumb" style="background:linear-gradient(135deg,var(--accent),var(--accent-light))">${emoji}</div>
      <div class="b-info"><div class="b-title">${esc(b.title)}</div><div class="b-meta">${sz} · ${d.getMonth() + 1}/${d.getDate()}</div></div>
      <svg width="36" height="36" viewBox="0 0 36 36" style="flex-shrink:0">
        <circle cx="18" cy="18" r="14" fill="none" stroke="var(--surface2)" stroke-width="3"/>
        <circle cx="18" cy="18" r="14" fill="none" stroke="var(--accent)" stroke-width="3"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
          transform="rotate(-90 18 18)" stroke-linecap="round"/>
        <text x="18" y="22" text-anchor="middle" style="font-size:8px;fill:var(--text-dim);font-family:sans-serif">${pct}%</text>
      </svg>`;
    row.addEventListener('click', () => openBook(b.id));
    let pt;
    row.addEventListener('touchstart', () => { pt = setTimeout(() => { if (confirm(`刪除「${b.title}」？`)) dbDel('books', b.id).then(renderLibrary).then(() => showToast('已刪除')); }, 700); }, { passive: true });
    row.addEventListener('touchend', () => clearTimeout(pt), { passive: true });
    row.addEventListener('touchmove', () => clearTimeout(pt), { passive: true });
    list.appendChild(row);
  });
}

function filterBooks(q) {
  document.getElementById('s-clr').style.display = q ? 'block' : 'none';
  document.getElementById('no-result').style.display = 'none';
  if (!q) { _drawBooks(_allBooks); return; }
  const f = _allBooks.filter(b => b.title.includes(q));
  _drawBooks(f);
  document.getElementById('no-result').style.display = f.length === 0 ? 'block' : 'none';
}
function clearSearch() { document.getElementById('search-input').value = ''; filterBooks(''); }

async function openBook(id) {
  const b = await dbGet('books', id); if (!b) return;
  App.bookId = id; App.rawText = b.content; App.isConverted = false; App.displayText = b.content;
  _savedPageIdx = b.pageIdx || 0;
  _updateConvBtn();
  _parseBook();
  document.getElementById('r-title').textContent = b.title;
  document.getElementById('page-library').classList.add('hidden');
  document.getElementById('page-reader').classList.remove('hidden');
  hideUI();
  _stopTTS(); _ttsIdx = 0; _ttsBusy = false;
  document.getElementById('tts-cur').textContent = '點擊播放開始聽書';
  setTimeout(() => { _buildLines(); buildFlipPages(); }, 100);
}

function goLibrary() {
  _stopTTS(); cancelTimer();
  document.getElementById('page-reader').classList.add('hidden');
  document.getElementById('page-library').classList.remove('hidden');
  renderLibrary();
}

function _parseBook() {
  App.chapters = []; _ttsParas = []; let pi = 0;
  App.displayText.split('\n').forEach(line => {
    const t = line.trim(); if (!t) return;
    if (CH_RE.test(t) && t.length < 60) App.chapters.push({ title: t, lineIdx: pi });
    else { _ttsParas.push(t); pi++; }
  });
}

function _buildChapters() {
  const list = document.getElementById('chapter-list');
  if (!App.chapters.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">未偵測到章節標題</div>'; return;
  }
  list.innerHTML = App.chapters.map((ch, i) =>
    `<div class="ch-item" id="chi-${i}" onclick="jumpCh(${i})">${esc(ch.title)}</div>`
  ).join('');
}

function jumpCh(i) {
  const ch = App.chapters[i];
  // 用字符位置找到對應行索引，再找所在頁面
  const lineIdx = _lines.findIndex(l => l.t === ch.title);
  if (lineIdx >= 0) {
    // 找出該行屬於哪一頁
    let charCount = 0;
    for (let pi = 0; pi < _pages.length; pi++) {
      charCount += _pages[pi].length;
      if (charCount > lineIdx) { _pidx = pi; break; }
    }
    _renderFlip();
  }
  document.querySelectorAll('.ch-item').forEach(e => e.classList.remove('active'));
  const ce = document.getElementById('chi-' + i); if (ce) ce.classList.add('active');
  closeAllPanels();
}

}
function jumpBMPage(pi) { _pidx = Math.min(pi, _pages.length - 1); _renderFlip(); closeAllPanels(); }
async function delBM(id) { await dbDel('bms', id); _renderBMs(); }
async function doAddBookmark() {
  const pct = _pages.length > 1 ? Math.round(_pidx / (_pages.length - 1) * 100) : 100;
  const firstLine = _pages[_pidx] && _pages[_pidx][0];
  const preview = firstLine ? firstLine.t.substring(0, 22) + '…' : pct + '%';
  const d = await openDB();
  await new Promise((res, rej) => {
    const r = d.transaction('bms', 'readwrite').objectStore('bms')
      .add({ bookId: App.bookId, pageIdx: _pidx, progress: pct, preview, createdAt: Date.now() });
    r.onsuccess = () => res(); r.onerror = rej;
  });
  _renderBMs(); showToast('🔖 書籤已加入');
}

function setTheme(t) { App.s.theme = t; document.body.setAttribute('data-theme', t); document.querySelectorAll('[data-theme-btn]').forEach(b => b.classList.toggle('active', b.dataset.themeBtn === t)); saveS(); }
function setFont(f) { App.s.font = f; document.querySelectorAll('[data-font-btn]').forEach(b => b.classList.toggle('active', b.dataset.fontBtn === f)); _rebuildIfReading(); saveS(); }
function setLH(v) { App.s.lineHeight = v; document.querySelectorAll('[data-lh]').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.lh) === v)); _rebuildIfReading(); saveS(); }

// ══════════════════════════════════════════
// PANELS
// ══════════════════════════════════════════
function openPanel(id) {
  if (id === 'panel-bookmarks') _renderBMs();
  if (id === 'panel-chapters') _buildChapters();
  document.getElementById(id).classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeAllPanels() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('open');
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
let _toastT;
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(_toastT); _toastT = setTimeout(() => t.classList.remove('show'), 2400); }

document.addEventListener('DOMContentLoaded', init);
</script>
