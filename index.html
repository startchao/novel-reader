<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="書卷">
<meta name="theme-color" content="#8b5e3c">
<title>書卷</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --bg:#f5f0e8;--surface:#ede7da;--surface2:#e3ddd0;--card:#fff9f0;
  --text:#1e1408;--text-dim:#7a6e5a;--accent:#8b5e3c;--accent-light:#c49a6c;
  --border:#d5cec2;--shadow:rgba(44,30,14,.12);--radius:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="night"]{--bg:#0e0d0a;--surface:#1a1814;--surface2:#222018;--card:#1a1814;--text:#d5c9b5;--text-dim:#665e50;--accent:#c49a6c;--accent-light:#8b5e3c;--border:#2a2820;--shadow:rgba(0,0,0,.6);}
[data-theme="eye"]{--bg:#ccd9b8;--surface:#bfcfaa;--surface2:#b2c49c;--card:#d4e0c0;--text:#182810;--text-dim:#426030;--accent:#3a6820;--accent-light:#5a9040;--border:#a0bc88;--shadow:rgba(20,40,10,.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.page{position:fixed;inset:0;display:flex;flex-direction:column;will-change:transform;}
.page.hidden{display:none;}

/* ══ LIBRARY ══ */
.lib-header{display:flex;align-items:center;padding:calc(var(--safe-top)+14px) 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0;}
.lib-title{flex:1;font-size:20px;font-weight:500;letter-spacing:3px;color:var(--accent);}
.icon-btn{width:40px;height:40px;border-radius:12px;border:none;background:transparent;color:var(--text-dim);font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icon-btn:active{background:var(--surface2);}
.search-bar{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.search-inner{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;gap:8px;}
.search-inner input{flex:1;border:none;background:transparent;color:var(--text);font-size:15px;font-family:inherit;outline:none;}
.search-inner input::placeholder{color:var(--text-dim);}
.s-clear{font-size:14px;color:var(--text-dim);cursor:pointer;display:none;padding:2px 4px;}
.lib-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.add-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface);}
.add-row:active{background:var(--surface2);}
.add-thumb{width:44px;height:58px;border-radius:8px;border:2px dashed var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.add-label{font-size:14px;color:var(--accent);font-weight:500;}
.add-sub{font-size:12px;color:var(--text-dim);margin-top:2px;}
.book-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;}
.book-row:active{background:var(--surface2);}
.b-thumb{width:44px;height:58px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:1px 2px 6px var(--shadow);}
.b-info{flex:1;min-width:0;}
.b-title{font-size:15px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
.b-meta{font-size:12px;color:var(--text-dim);}
.b-circle{flex-shrink:0;}
.b-circle svg{display:block;}
.empty-lib{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;text-align:center;}
.empty-lib .ei{font-size:52px;opacity:.35;}
.empty-lib .et{font-size:15px;color:var(--text-dim);letter-spacing:1px;}
.no-result{display:none;padding:30px;text-align:center;color:var(--text-dim);font-size:14px;}

/* ══ READER ══ */
#page-reader{background:var(--bg);}
/* Top bar — hidden by default, shows on tap */
.r-topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;padding:calc(var(--safe-top)+10px) 14px 10px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;transition:transform .28s,opacity .28s;transform:translateY(0);}
.r-topbar.ui-hide{transform:translateY(-110%);opacity:0;pointer-events:none;}
.r-book-title{flex:1;font-size:15px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* Bottom toolbar — hidden by default */
.r-toolbar{position:absolute;bottom:0;left:0;right:0;z-index:20;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(var(--safe-bottom)+6px);display:flex;align-items:center;justify-content:space-around;transition:transform .28s,opacity .28s;}
.r-toolbar.ui-hide{transform:translateY(110%);opacity:0;pointer-events:none;}
.tb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:10px;font-size:11px;min-width:44px;}
.tb-btn:active{background:var(--surface2);}
.tb-btn .tb-icon{font-size:20px;}
.tb-btn.active .tb-icon,.tb-btn.active{color:var(--accent);}

/* SCROLL reader */
.r-scroll{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px;}
.r-content{max-width:660px;margin:0 auto;font-size:18px;line-height:2;letter-spacing:.06em;color:var(--text);padding-bottom:80px;}
.r-content p{margin-bottom:.5em;text-indent:2em;word-break:break-all;}
.r-content .ch-h{font-size:1.05em;font-weight:500;color:var(--accent);text-indent:0;margin:2em 0 1em;padding-left:12px;border-left:3px solid var(--accent);}
.r-content .tts-hl{background:rgba(196,154,108,.3);border-radius:3px;}

/* FLIP reader */
.r-flip{position:absolute;inset:0;display:none;flex-direction:column;}
.r-flip.active{display:flex;}
/* tap zones */
.flip-zones{position:absolute;inset:0;display:flex;z-index:10;}
.fz-left{flex:0 0 28%;height:100%;}
.fz-mid{flex:1;height:100%;}
.fz-right{flex:0 0 28%;height:100%;}
.flip-text{flex:1;overflow:hidden;padding:20px 22px 16px;font-size:18px;line-height:2;letter-spacing:.06em;color:var(--text);}
.flip-text p{margin-bottom:.5em;text-indent:2em;word-break:break-all;}
.flip-text .ch-h{font-size:1.05em;font-weight:500;color:var(--accent);text-indent:0;margin:1em 0 .8em;padding-left:12px;border-left:3px solid var(--accent);}
.flip-footer{flex-shrink:0;padding:4px 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.flip-pnum{font-size:12px;color:var(--text-dim);}
/* progress bar under flip text */
.flip-prog{height:2px;background:var(--surface2);flex-shrink:0;}
.flip-prog-fill{height:100%;background:var(--accent);transition:width .3s;}

/* ══ PANELS (slide up) ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .28s;}
.overlay.open{opacity:1;pointer-events:auto;}
.panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:51;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:78vh;display:flex;flex-direction:column;padding-bottom:var(--safe-bottom);}
.panel.open{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.panel-title{font-size:15px;font-weight:500;letter-spacing:2px;color:var(--text);padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.panel-close{font-size:18px;color:var(--text-dim);cursor:pointer;padding:0 4px;}
.panel-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}

/* Settings rows */
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;}
.srow:last-child{border-bottom:none;}
.slabel{font-size:14px;color:var(--text-dim);white-space:nowrap;}
.btnrow{display:flex;gap:6px;flex-wrap:wrap;}
.cbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;}
.cbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.szctrl{display:flex;align-items:center;gap:10px;}
.szval{font-size:13px;color:var(--text);width:28px;text-align:center;}
.szbtn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* TTS panel */
.tts-panel-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--border);}
.tts-panel-row:last-child{border-bottom:none;}
.tts-plabel{font-size:14px;color:var(--text-dim);white-space:nowrap;width:72px;}
.tts-controls{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;}
.tts-cbtn{width:52px;height:52px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-dim);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.tts-cbtn.play{width:64px;height:64px;background:var(--accent);color:#fff;font-size:26px;}
.tts-cbtn:active{opacity:.7;}
.tts-cur-text{font-size:13px;color:var(--text-dim);text-align:center;padding:4px 0;min-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.spd-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;}
.spd-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
/* timer */
.timer-display{font-size:22px;font-weight:300;color:var(--accent);letter-spacing:2px;text-align:center;margin:4px 0;}
.timer-note{font-size:12px;color:var(--text-dim);text-align:center;}

/* Chapters & Bookmarks */
.ch-item{padding:13px 4px 13px 12px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text-dim);cursor:pointer;border-left:3px solid transparent;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-item:active{background:var(--surface2);}
.ch-item.active{color:var(--accent);border-left-color:var(--accent);}
.bm-row{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--border);gap:10px;}
.bm-row:last-child{border-bottom:none;}
.bm-info{flex:1;cursor:pointer;}
.bm-prev{font-size:13px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bm-meta{font-size:11px;color:var(--text-dim);}
.bm-del{font-size:16px;background:none;border:none;cursor:pointer;color:var(--text-dim);padding:4px 8px;}

/* Toast */
.toast{position:fixed;bottom:calc(var(--safe-bottom)+100px);left:50%;transform:translateX(-50%) translateY(14px);background:rgba(0,0,0,.78);color:#fff;padding:10px 22px;border-radius:22px;font-size:14px;opacity:0;transition:opacity .22s,transform .22s;z-index:200;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>
<body data-theme="day">

<!-- ══════════ LIBRARY PAGE ══════════ -->
<div class="page" id="page-library">
  <div class="lib-header">
    <div class="lib-title">書　卷</div>
    <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="匯入">＋</button>
  </div>
  <div class="search-bar">
    <div class="search-inner">
      <span style="font-size:15px;color:var(--text-dim)">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋書名…" oninput="filterBooks(this.value)">
      <span class="s-clear" id="s-clear" onclick="clearSearch()">✕</span>
    </div>
  </div>
  <div class="lib-body">
    <div class="add-row" onclick="document.getElementById('file-input').click()">
      <div class="add-thumb">📄</div>
      <div><div class="add-label">匯入 TXT 小說</div><div class="add-sub">點擊選擇檔案</div></div>
    </div>
    <div id="book-list"></div>
    <div class="empty-lib" id="empty-lib">
      <div class="ei">📚</div><div class="et">書庫空空如也</div>
    </div>
    <div class="no-result" id="no-result">找不到符合的書籍</div>
  </div>
  <input type="file" id="file-input" accept=".txt" style="display:none">
</div>

<!-- ══════════ READER PAGE ══════════ -->
<div class="page hidden" id="page-reader">

  <!-- TOP BAR -->
  <div class="r-topbar ui-hide" id="r-topbar">
    <button class="icon-btn" onclick="goLibrary()">‹</button>
    <div class="r-book-title" id="r-title">書名</div>
    <button class="icon-btn" onclick="openPanel('panel-chapters')">☰</button>
  </div>

  <!-- SCROLL MODE -->
  <div class="r-scroll" id="r-scroll" onclick="handleReaderTap(event)">
    <div class="r-content" id="r-content"></div>
  </div>

  <!-- FLIP MODE -->
  <div class="r-flip" id="r-flip">
    <!-- tap zones -->
    <div class="flip-zones">
      <div class="fz-left" onclick="flipPrev()"></div>
      <div class="fz-mid" onclick="toggleUI()"></div>
      <div class="fz-right" onclick="flipNext()"></div>
    </div>
    <div class="flip-text" id="flip-text"></div>
    <div class="flip-prog"><div class="flip-prog-fill" id="flip-prog-fill" style="width:0%"></div></div>
    <div class="flip-footer">
      <div class="flip-pnum" id="flip-pnum">1 / 1</div>
      <div class="flip-pnum" id="flip-pct-label">0%</div>
    </div>
  </div>

  <!-- BOTTOM TOOLBAR -->
  <div class="r-toolbar ui-hide" id="r-toolbar">
    <button class="tb-btn" id="tb-bm" onclick="doAddBookmark()" title="書籤">
      <span class="tb-icon">🔖</span><span>書籤</span>
    </button>
    <button class="tb-btn" id="tb-bml" onclick="openPanel('panel-bookmarks')" title="書籤列表">
      <span class="tb-icon">📋</span><span>記錄</span>
    </button>
    <button class="tb-btn" id="tb-tts" onclick="openPanel('panel-tts')" title="聽書">
      <span class="tb-icon">🎧</span><span>聽書</span>
    </button>
    <button class="tb-btn" id="tb-convert" onclick="toggleConvert()" title="繁簡轉換">
      <span class="tb-icon" id="tb-convert-icon">繁</span><span id="tb-convert-label">繁→簡</span>
    </button>
    <button class="tb-btn" id="tb-settings" onclick="openPanel('panel-settings')" title="設定">
      <span class="tb-icon">⚙️</span><span>設定</span>
    </button>
  </div>
</div>

<!-- ══════════ PANELS ══════════ -->
<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<!-- CHAPTERS -->
<div class="panel" id="panel-chapters">
  <div class="panel-handle"></div>
  <div class="panel-title">目　錄 <span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body"><div id="chapter-list"></div></div>
</div>

<!-- BOOKMARKS -->
<div class="panel" id="panel-bookmarks">
  <div class="panel-handle"></div>
  <div class="panel-title">書　籤 <span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body"><div id="bookmark-list"></div></div>
</div>

<!-- TTS PANEL -->
<div class="panel" id="panel-tts">
  <div class="panel-handle"></div>
  <div class="panel-title">聽　書 <span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body">
    <!-- playback controls -->
    <div class="tts-panel-row" style="flex-direction:column;gap:10px;align-items:center;">
      <div class="tts-cur-text" id="tts-cur-text">點擊播放開始聽書</div>
      <div class="tts-controls">
        <button class="tts-cbtn" onclick="ttsPrev()">⏮</button>
        <button class="tts-cbtn play" id="tts-play-btn" onclick="toggleTTS()">▶</button>
        <button class="tts-cbtn" onclick="ttsNext()">⏭</button>
      </div>
    </div>
    <!-- speed -->
    <div class="tts-panel-row">
      <div class="tts-plabel">速度</div>
      <div class="btnrow" id="spd-row">
        <button class="spd-btn" data-spd="0.7" onclick="setSpeed(0.7)">0.7×</button>
        <button class="spd-btn active" data-spd="1.0" onclick="setSpeed(1.0)">1.0×</button>
        <button class="spd-btn" data-spd="1.25" onclick="setSpeed(1.25)">1.25×</button>
        <button class="spd-btn" data-spd="1.5" onclick="setSpeed(1.5)">1.5×</button>
        <button class="spd-btn" data-spd="1.75" onclick="setSpeed(1.75)">1.75×</button>
        <button class="spd-btn" data-spd="2.0" onclick="setSpeed(2.0)">2.0×</button>
      </div>
    </div>
    <!-- sleep timer -->
    <div class="tts-panel-row" style="flex-direction:column;align-items:flex-start;gap:8px;">
      <div class="tts-plabel" style="width:auto">定時關閉</div>
      <div class="timer-display" id="timer-display">未啟動</div>
      <div class="btnrow" id="timer-btns">
        <button class="cbtn" onclick="setTimer(10)">10分</button>
        <button class="cbtn" onclick="setTimer(20)">20分</button>
        <button class="cbtn" onclick="setTimer(30)">30分</button>
        <button class="cbtn" onclick="setTimer(60)">60分</button>
        <button class="cbtn" id="timer-cancel-btn" style="display:none" onclick="cancelTimer()">取消</button>
      </div>
      <div class="timer-note" id="timer-note"></div>
    </div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel" id="panel-settings">
  <div class="panel-handle"></div>
  <div class="panel-title">閱讀設定 <span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body">
    <div class="srow">
      <div class="slabel">主題</div>
      <div class="btnrow">
        <button class="cbtn active" data-theme-btn="day" onclick="setTheme('day')">日間</button>
        <button class="cbtn" data-theme-btn="night" onclick="setTheme('night')">夜間</button>
        <button class="cbtn" data-theme-btn="eye" onclick="setTheme('eye')">護眼</button>
      </div>
    </div>
    <div class="srow">
      <div class="slabel">字體</div>
      <div class="btnrow">
        <button class="cbtn active" data-font-btn="serif" onclick="setFont('serif')">宋體</button>
        <button class="cbtn" data-font-btn="sans" onclick="setFont('sans')">黑體</button>
      </div>
    </div>
    <div class="srow">
      <div class="slabel">字體大小</div>
      <div class="szctrl">
        <button class="szbtn" onclick="changeFontSize(-1)">−</button>
        <div class="szval" id="font-size-val">18</div>
        <button class="szbtn" onclick="changeFontSize(1)">＋</button>
      </div>
    </div>
    <div class="srow">
      <div class="slabel">行距</div>
      <div class="btnrow">
        <button class="cbtn" onclick="setLH(1.6)">緊</button>
        <button class="cbtn active" onclick="setLH(2.0)">標準</button>
        <button class="cbtn" onclick="setLH(2.6)">寬</button>
      </div>
    </div>
    <div class="srow">
      <div class="slabel">閱讀模式</div>
      <div class="btnrow">
        <button class="cbtn active" data-mode-btn="scroll" onclick="setReadMode('scroll')">滑動</button>
        <button class="cbtn" data-mode-btn="flip" onclick="setReadMode('flip')">翻頁</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ══ DB ══
const DBN='ShujuanDB5';let _db;
function openDB(){return new Promise((res,rej)=>{if(_db)return res(_db);const r=indexedDB.open(DBN,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('books'))d.createObjectStore('books',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});if(!d.objectStoreNames.contains('bms')){const b=d.createObjectStore('bms',{keyPath:'id',autoIncrement:true});b.createIndex('bookId','bookId');}};r.onsuccess=e=>{_db=e.target.result;res(_db);};r.onerror=e=>rej(e);});}
const tx=(store,mode='readonly')=>openDB().then(d=>d.transaction(store,mode).objectStore(store));
async function dbAdd(store,obj){const s=await tx(store,'readwrite');return new Promise((res,rej)=>{const r=s.add(obj);r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbPut(store,obj){const s=await tx(store,'readwrite');return new Promise((res,rej)=>{const r=s.put(obj);r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbGet(store,key){const s=await tx(store);return new Promise((res,rej)=>{const r=s.get(key);r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbGetAll(store){const s=await tx(store);return new Promise((res,rej)=>{const r=s.getAll();r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbDel(store,key){const s=await tx(store,'readwrite');return new Promise((res,rej)=>{const r=s.delete(key);r.onsuccess=()=>res();r.onerror=rej;});}
async function dbIdx(store,idx,key){const s=await tx(store);return new Promise((res,rej)=>{const r=s.index(idx).getAll(key);r.onsuccess=()=>res(r.result);r.onerror=rej;});}

const T2S={};const S2T={};
// Parse pairs
for(let i=0;i<T2S_RAW.length-1;i+=2){const t=T2S_RAW[i],s=T2S_RAW[i+1];if(t&&s&&t!==s){T2S[t]=s;if(!S2T[s])S2T[s]=t;}}
// Additional common pairs
const EXTRA={"爲":"为","㑒":"会","諸":"诸","豈":"岂","氣":"气","裡":"里","裏":"里","喫":"吃","牠":"它","祂":"他","衹":"只","祇":"只","彊":"强","辤":"辞","頸":"颈","頷":"颔","頰":"颊","顴":"颧","鬢":"鬓","鬚":"须","髭":"髭","鬍":"胡","齜":"龇","齷":"龌","齪":"龊","齦":"龈","齬":"龉","齪":"龊","囪":"囱","囂":"嚣","囈":"呓","囉":"啰","囌":"苏","囑":"嘱","囔":"囔","囓":"啮","囗":"囗"};
Object.assign(T2S,EXTRA);for(const[t,s]of Object.entries(EXTRA)){if(!S2T[s])S2T[s]=t;}

function t2s(str){let r='';for(const c of str)r+=T2S[c]||c;return r;}
function s2t(str){let r='';for(const c of str)r+=S2T[c]||c;return r;}

// ══ TTS ══
const synth=window.speechSynthesis;
let _ttsOn=false,_ttsSpeaking=false,_ttsIdx=0,_ttsParas=[],_ttsSpeed=1.0,_timerInterval=null,_timerSecs=0;

function _bestVoice(){const vs=synth.getVoices();return vs.find(v=>v.lang==='zh-TW'&&v.localService)||vs.find(v=>v.lang.startsWith('zh')&&v.localService)||vs.find(v=>v.lang.startsWith('zh'))||null;}

function _doSpeak(idx){
  if(!_ttsOn)return;
  if(idx>=_ttsParas.length){_stopTTS();document.getElementById('tts-cur-text').textContent='朗讀完畢';return;}
  if(_ttsSpeaking)return;
  _ttsSpeaking=true;synth.cancel();_ttsIdx=idx;
  document.getElementById('tts-play-btn').textContent='⏸';
  document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));
  const el=document.querySelector(`[data-p="${idx}"]`);
  if(el){el.classList.add('tts-hl');el.scrollIntoView({behavior:'smooth',block:'center'});}
  document.getElementById('tts-cur-text').textContent=_ttsParas[idx].substring(0,40)+((_ttsParas[idx].length>40)?'…':'');
  const u=new SpeechSynthesisUtterance(_ttsParas[idx]);
  u.lang='zh-TW';u.rate=_ttsSpeed;
  const v=_bestVoice();if(v)u.voice=v;
  u.onstart=()=>{_ttsSpeaking=true;};
  u.onend=()=>{_ttsSpeaking=false;if(_ttsOn)_doSpeak(idx+1);};
  u.onerror=()=>{_ttsSpeaking=false;if(_ttsOn)_doSpeak(idx+1);};
  setTimeout(()=>{if(_ttsOn)synth.speak(u);else _ttsSpeaking=false;},60);
}
function _stopTTS(){_ttsOn=false;_ttsSpeaking=false;synth.cancel();document.getElementById('tts-play-btn').textContent='▶';document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));}
function toggleTTS(){if(_ttsOn){_stopTTS();}else{_ttsOn=true;_ttsSpeaking=false;_doSpeak(_ttsIdx);}}
function ttsPrev(){_ttsSpeaking=false;const i=Math.max(0,_ttsIdx-1);if(_ttsOn){_ttsOn=true;_doSpeak(i);}else _ttsIdx=i;}
function ttsNext(){_ttsSpeaking=false;if(_ttsOn){_ttsOn=true;_doSpeak(_ttsIdx+1);}else _ttsIdx++;}
function setSpeed(s){_ttsSpeed=s;document.querySelectorAll('[data-spd]').forEach(b=>b.classList.toggle('active',parseFloat(b.dataset.spd)===s));if(_ttsOn){_ttsSpeaking=false;_ttsOn=true;_doSpeak(_ttsIdx);}}

// Sleep timer
function setTimer(mins){
  cancelTimer();
  _timerSecs=mins*60;
  document.getElementById('timer-cancel-btn').style.display='';
  _timerInterval=setInterval(()=>{
    _timerSecs--;
    const m=Math.floor(_timerSecs/60),s=_timerSecs%60;
    document.getElementById('timer-display').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(_timerSecs<=0){cancelTimer();_stopTTS();showToast('⏰ 定時結束，聽書已停止');}
  },1000);
  const m=Math.floor(_timerSecs/60),s=_timerSecs%60;
  document.getElementById('timer-display').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timer-note').textContent=`將在 ${mins} 分鐘後停止朗讀`;
}
function cancelTimer(){if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}document.getElementById('timer-display').textContent='未啟動';document.getElementById('timer-note').textContent='';document.getElementById('timer-cancel-btn').style.display='none';}

// ══ FLIP ══
let _flipPages=[],_flipIdx=0;
function CH_RE(){return /^(第[零一二三四五六七八九十百千万萬\d]+[章节卷集回話话篇]+|Chapter\s*\d+|第\s*\d+\s*章|序章|前言|尾聲|後記|附錄|番外|楔子)/;}

function buildFlipPages(){
  const body=document.getElementById('flip-text');
  const fs=App.s.fontSize,lh=App.s.lineHeight;
  const lpp=Math.max(3,Math.floor((body.clientHeight*0.88)/(fs*lh)));
  const re=CH_RE();
  const lines=[];
  App.displayText.split('\n').forEach(line=>{const t=line.trim();if(t)lines.push({t,h:re.test(t)&&t.length<60});});
  _flipPages=[];
  for(let i=0;i<lines.length;i+=lpp)_flipPages.push(lines.slice(i,i+lpp));
  if(!_flipPages.length)_flipPages=[[{t:'（無內容）',h:false}]];
  _flipIdx=0;_renderFlip();
}
function _renderFlip(){
  const pg=_flipPages[_flipIdx]||[];
  const ff=App.s.font==='sans'?"'Noto Sans TC',sans-serif":"'Noto Serif TC',serif";
  const body=document.getElementById('flip-text');
  body.style.cssText=`font-size:${App.s.fontSize}px;line-height:${App.s.lineHeight};font-family:${ff};`;
  body.innerHTML=pg.map(l=>l.h?`<p class="ch-h">${esc(l.t)}</p>`:`<p>${esc(l.t)}</p>`).join('');
  const tot=_flipPages.length,idx=_flipIdx;
  const pct=tot>1?Math.round(idx/(tot-1)*100):100;
  document.getElementById('flip-pnum').textContent=`${idx+1} / ${tot}`;
  document.getElementById('flip-pct-label').textContent=`${pct}%`;
  document.getElementById('flip-prog-fill').style.width=pct+'%';
  _saveFlipProgress(pct);
}
let _fpSaveTimer;
function _saveFlipProgress(pct){clearTimeout(_fpSaveTimer);_fpSaveTimer=setTimeout(async()=>{if(App.bookId)await dbPut('books',{...await dbGet('books',App.bookId),progress:pct,lastRead:Date.now()});},800);}

function flipNext(){if(_flipIdx<_flipPages.length-1){_flipIdx++;_renderFlip();}}
function flipPrev(){if(_flipIdx>0){_flipIdx--;_renderFlip();}}

// swipe
let _sx=null;
function initSwipe(){
  const f=document.getElementById('r-flip');
  f.addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;},{passive:true});
  f.addEventListener('touchend',e=>{if(_sx===null)return;const dx=e.changedTouches[0].clientX-_sx;_sx=null;if(Math.abs(dx)>55){dx<0?flipNext():flipPrev();}},{passive:true});
}

function setReadMode(mode){
  App.s.readMode=mode;

  if(isFlip&&App.displayText)setTimeout(buildFlipPages,80);
  saveSettings(App.s);
}

// ══ INIT ══
async function init(){
  App.s=await loadSettings();
  applySettings();
  await renderLibrary();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  initSwipe();
  document.getElementById('file-input').onchange=async e=>{
    const f=e.target.files[0];if(!f)return;e.target.value='';
    showToast('載入中…');
    const text=await readTxt(f);
    const id=await dbAdd('books',{title:f.name.replace(/\.txt$/i,''),content:text,size:f.size,addedAt:Date.now(),lastRead:Date.now(),progress:0,scrollPos:0});
    await renderLibrary();showToast('✅ 匯入成功');openBook(id);
  };
}

function readTxt(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const t=e.target.result;const bad=(t.match(/\uFFFD/g)||[]).length;if(bad>50){const r2=new FileReader();r2.onload=e2=>res(e2.target.result);r2.onerror=()=>res(t);r2.readAsText(f,'GBK');}else res(t);};r.onerror=rej;r.readAsText(f,'UTF-8');});}

// ══ LIBRARY ══
async function renderLibrary(){
  _allBooks=await dbGetAll('books');
  _allBooks.sort((a,b)=>(b.lastRead||0)-(a.lastRead||0));
  _drawBooks(_allBooks);
}
function _drawBooks(books){
  const list=document.getElementById('book-list');
  const empty=document.getElementById('empty-lib');
  list.innerHTML='';
  empty.style.display=books.length===0?'flex':'none';
  const EMOJI=['📖','📚','📜','📕','📗','📘','📙'];
  books.forEach(b=>{
    let h=0;for(const c of b.title)h=(h*31+c.charCodeAt(0))>>>0;
    const emoji=EMOJI[h%EMOJI.length];
    const pct=b.progress||0;
    const sz=b.size<1048576?(b.size/1024).toFixed(0)+'KB':(b.size/1048576).toFixed(1)+'MB';
    const d=new Date(b.lastRead||b.addedAt);
    const circ=2*Math.PI*14,off=circ*(1-pct/100);
    const row=document.createElement('div');
    row.className='book-row';
    row.innerHTML=`
      <div class="b-thumb" style="background:linear-gradient(135deg,var(--accent),var(--accent-light))">${emoji}</div>
      <div class="b-info">
        <div class="b-title">${esc(b.title)}</div>
        <div class="b-meta">${sz} · ${d.getMonth()+1}/${d.getDate()}</div>
      </div>
      <div class="b-circle">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="14" fill="none" stroke="var(--surface2)" stroke-width="3"/>
          <circle cx="18" cy="18" r="14" fill="none" stroke="var(--accent)" stroke-width="3"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
            transform="rotate(-90 18 18)" stroke-linecap="round"/>
          <text x="18" y="22" text-anchor="middle" style="font-size:8px;fill:var(--text-dim);font-family:sans-serif">${pct}%</text>
        </svg>
      </div>`;
    row.addEventListener('click',()=>openBook(b.id));
    let pt;
    row.addEventListener('touchstart',()=>{pt=setTimeout(()=>{if(confirm(`刪除「${b.title}」？`))dbDel('books',b.id).then(renderLibrary).then(()=>showToast('已刪除'));},700);},{passive:true});
    row.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    row.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
    list.appendChild(row);
  });
}

function filterBooks(q){
  document.getElementById('s-clear').style.display=q?'block':'none';
  document.getElementById('no-result').style.display='none';
  if(!q){_drawBooks(_allBooks);return;}
  const f=_allBooks.filter(b=>b.title.includes(q));
  _drawBooks(f);
  document.getElementById('no-result').style.display=f.length===0?'block':'none';
}

// ══ OPEN BOOK ══
async function openBook(id){
  const b=await dbGet('books',id);if(!b)return;
  App.bookId=id;App.rawText=b.content;App.isSimplified=false;App.displayText=b.content;
  document.getElementById('tb-convert-icon').textContent='繁';
  document.getElementById('tb-convert-label').textContent='繁→簡';
  document.getElementById('tb-convert').classList.remove('active');
  _parseBook();_renderContent();
  document.getElementById('r-title').textContent=b.title;
  // switch page
  document.getElementById('page-library').classList.add('hidden');
  document.getElementById('page-reader').classList.remove('hidden');
  hideUI();
  _stopTTS();_ttsIdx=0;_ttsSpeaking=false;
  document.getElementById('tts-cur-text').textContent='點擊播放開始聽書';
  setTimeout(()=>{if(App.s.readMode!=='flip')document.getElementById('r-scroll').scrollTop=b.scrollPos||0;},120);
}

function goLibrary(){
  _stopTTS();cancelTimer();
  document.getElementById('page-reader').classList.add('hidden');
  document.getElementById('page-library').classList.remove('hidden');
  renderLibrary();
}

function _parseBook(){
  const re=CH_RE();
  App.chapters=[];App.paragraphs=[];let pi=0;
  App.displayText.split('\n').forEach(line=>{
    const t=line.trim();if(!t)return;
    if(re.test(t)&&t.length<60)App.chapters.push({title:t,pi});
    else{App.paragraphs.push(t);pi++;}
  });
  _ttsParas=App.paragraphs;
}

function _renderContent(){
  const re=CH_RE();let html='',pi=0;
  App.displayText.split('\n').forEach(line=>{
    const t=line.trim();if(!t)return;
    if(re.test(t)&&t.length<60)html+=`<p class="ch-h">${esc(t)}</p>`;
    else{html+=`<p data-p="${pi}">${esc(t)}</p>`;pi++;}
  });
  document.getElementById('r-content').innerHTML=html;
  _applyReaderStyle();
  _buildChapterList();_renderBMs();_updateScrollProgress();
  setReadMode(App.s.readMode||'scroll');
}

function _applyReaderStyle(){
  const rc=document.getElementById('r-content');
  if(!rc)return;
  const ff=App.s.font==='sans'?"'Noto Sans TC',sans-serif":"'Noto Serif TC',serif";
  rc.style.fontSize=App.s.fontSize+'px';
  rc.style.lineHeight=App.s.lineHeight;
  rc.style.fontFamily=ff;
}

// ══ CHAPTERS ══
function _buildChapterList(){
  const list=document.getElementById('chapter-list');
  if(!App.chapters||!App.chapters.length){list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">未偵測到章節標題</div>';return;}
  list.innerHTML=App.chapters.map((ch,i)=>`<div class="ch-item" id="chi-${i}" onclick="jumpCh(${i})">${esc(ch.title)}</div>`).join('');
}
function jumpCh(i){
  const ch=App.chapters[i];
  if(App.s.readMode==='flip'){const pi=_flipPages.findIndex(pg=>pg.some(l=>l.t===ch.title));if(pi>=0){_flipIdx=pi;_renderFlip();}}
  else{const el=document.querySelector(`[data-p="${ch.pi}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
  const ce=document.getElementById('chi-'+i);if(ce)ce.classList.add('active');
  closeAllPanels();
}

// ══ BOOKMARKS ══
async function _renderBMs(){
  if(!App.bookId)return;
  const bms=await dbIdx('bms','bookId',App.bookId);
  const list=document.getElementById('bookmark-list');
  if(!bms.length){list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">尚無書籤</div>';return;}
  list.innerHTML=bms.map(bm=>`<div class="bm-row"><div class="bm-info" onclick="jumpBM(${bm.scrollPos})"><div class="bm-prev">${esc(bm.preview)}</div><div class="bm-meta">${bm.progress}% · ${new Date(bm.createdAt).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div><button class="bm-del" onclick="delBM(${bm.id})">🗑</button></div>`).join('');
}
function jumpBM(sp){document.getElementById('r-scroll').scrollTop=sp;closeAllPanels();}
async function delBM(id){await dbDel('bms',id);_renderBMs();}
async function doAddBookmark(){
  const sc=document.getElementById('r-scroll');
  const sp=sc.scrollTop,tot=sc.scrollHeight-sc.clientHeight,pct=tot>0?Math.round(sp/tot*100):0;
  const els=document.elementsFromPoint(window.innerWidth/2,window.innerHeight/2);
  const pe=els.find(e=>e.tagName==='P'&&e.dataset.p!==undefined);
  const preview=pe?pe.textContent.substring(0,22)+'…':pct+'%';
  await dbAdd('bms',{bookId:App.bookId,scrollPos:sp,progress:pct,preview,createdAt:Date.now()});
  _renderBMs();showToast('🔖 書籤已加入');
}

// ══ PROGRESS ══
let _pgTimer;
function _updateScrollProgress(){
  const sc=document.getElementById('r-scroll');if(!sc)return;
  const sp=sc.scrollTop,tot=sc.scrollHeight-sc.clientHeight;
  const pct=tot>0?Math.round(sp/tot*100):0;
  clearTimeout(_pgTimer);_pgTimer=setTimeout(async()=>{
    if(App.bookId){const b=await dbGet('books',App.bookId);if(b){b.scrollPos=sp;b.progress=pct;b.lastRead=Date.now();await dbPut('books',b);}}
  },900);
}

// ══ SETTINGS ══
function applySettings(){
  document.body.setAttribute('data-theme',App.s.theme);
  _applyReaderStyle();
  document.querySelectorAll('[data-theme-btn]').forEach(b=>b.classList.toggle('active',b.dataset.themeBtn===App.s.theme));
  document.querySelectorAll('[data-font-btn]').forEach(b=>b.classList.toggle('active',b.dataset.fontBtn===App.s.font));
  document.querySelectorAll('[data-mode-btn]').forEach(b=>b.classList.toggle('active',b.dataset.modeBtn===(App.s.readMode||'scroll')));
  document.getElementById('font-size-val').textContent=App.s.fontSize;
}
function changeFontSize(d){App.s.fontSize=Math.max(12,Math.min(32,App.s.fontSize+d));document.getElementById('font-size-val').textContent=App.s.fontSize;_applyReaderStyle();if(App.s.readMode==='flip')buildFlipPages();saveSettings(App.s);}
function setTheme(t){App.s.theme=t;document.body.setAttribute('data-theme',t);document.querySelectorAll('[data-theme-btn]').forEach(b=>b.classList.toggle('active',b.dataset.themeBtn===t));saveSettings(App.s);}
function setFont(f){App.s.font=f;_applyReaderStyle();document.querySelectorAll('[data-font-btn]').forEach(b=>b.classList.toggle('active',b.dataset.fontBtn===f));if(App.s.readMode==='flip')buildFlipPages();saveSettings(App.s);}
function setLH(v){App.s.lineHeight=v;_applyReaderStyle();if(App.s.readMode==='flip')buildFlipPages();saveSettings(App.s);}

// ══ PANELS ══
function openPanel(id){
  if(id==='panel-bookmarks')_renderBMs();
  document.getElementById(id).classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeAllPanels(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('open');
}

// ══ UTILS ══
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let _toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2400);}

document.addEventListener('DOMContentLoaded',init);
// Keep screen progress updated
document.addEventListener('scroll',_updateScrollProgress,{passive:true});
</script>
