<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">

<title>書齋 · 閱讀器</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

:root {
–bg:#f5f0e8; –text:#2c2416; –text-sub:#8a7a66;
–accent:#8b4513; –accent-l:#d4956a;
–card:#fffdf7; –border:#e0d5c5; –shadow:rgba(44,36,22,.08);
–reader-bg:#f5f0e8; –reader-text:#2c2416;
–hh:52px; –fh:24px;
}
[data-theme=“dark”]  {–bg:#1a1612;–text:#e8dcc8;–text-sub:#7a6e60;–accent:#d4956a;–accent-l:#8b4513;–card:#221e18;–border:#3a3228;–shadow:rgba(0,0,0,.3);–reader-bg:#1a1612;–reader-text:#e8dcc8;}
[data-reader=“sepia”]{–reader-bg:#f4e8d0;–reader-text:#3d2b1a;}
[data-reader=“green”]{–reader-bg:#c7d5b0;–reader-text:#2a3520;}
[data-reader=“night”]{–reader-bg:#111;–reader-text:#a09080;}
[data-reader=“dark”] {–reader-bg:#1a1612;–reader-text:#e8dcc8;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:‘Noto Sans TC’,sans-serif;background:var(–bg);color:var(–text);}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;}
.screen.hidden{display:none;}

/* SHELF */
#shelf-screen{background:var(–bg);}
.shelf-hdr{height:var(–hh);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(–card);border-bottom:1px solid var(–border);box-shadow:0 2px 10px var(–shadow);flex-shrink:0;}
.shelf-title{font-family:‘Noto Serif TC’,serif;font-size:20px;font-weight:700;color:var(–accent);letter-spacing:.05em;}
.shelf-title span{color:var(–text-sub);font-weight:400;font-size:13px;margin-left:6px;}
.ibtn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(–text-sub);font-size:20px;}
.ibtn:active{background:var(–border);}
.shelf-body{flex:1;overflow-y:auto;padding:16px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(–text-sub);gap:14px;}
.empty-ic{font-size:72px;opacity:.22;}
.empty-tx{font-size:15px;line-height:1.8;text-align:center;}
.book-card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;gap:14px;align-items:center;box-shadow:0 2px 8px var(–shadow);cursor:pointer;transition:transform .12s;}
.book-card:active{transform:scale(.98);}
.book-spine{width:50px;height:66px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:linear-gradient(135deg,var(–accent),var(–accent-l));}
.book-info{flex:1;min-width:0;}
.book-name{font-family:‘Noto Serif TC’,serif;font-size:16px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.book-meta{font-size:12px;color:var(–text-sub);margin-bottom:7px;}
.book-bar{height:3px;background:var(–border);border-radius:2px;overflow:hidden;}
.book-fill{height:100%;background:var(–accent);border-radius:2px;}
.book-del{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:#c44;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.book-del:active{background:#fee;}
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(–accent),var(–accent-l));color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(139,69,19,.4);display:flex;align-items:center;justify-content:center;z-index:10;}
.fab:active{transform:scale(.93);}

/* READER */
#reader-screen{background:var(–reader-bg);transition:background .3s;}
.reader-hdr{height:var(–hh);display:flex;align-items:center;padding:0 4px;gap:2px;background:var(–card);border-bottom:1px solid var(–border);box-shadow:0 2px 8px var(–shadow);flex-shrink:0;z-index:10;}
.reader-htitle{flex:1;text-align:center;font-size:13px;color:var(–text-sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;}

/* PAGE AREA */
.page-wrap{flex:1;overflow:hidden;position:relative;background:var(–reader-bg);transition:background .3s;}
.page-slider{display:flex;height:100%;will-change:transform;}
.vpage{min-width:100%;height:100%;overflow-y:auto;padding:6px 16px;font-family:’Noto Serif TC’,serif;color:var(–reader-text);background:var(–reader-bg);transition:background .3s,color .3s;-webkit-overflow-scrolling:touch;}
.vpage-text{white-space:pre-wrap;word-break:break-all;color:var(–reader-text);line-height:1.9;}
/* tap zones */
.tz{position:absolute;top:0;height:100%;z-index:5;}
.tz-prev{left:0;width:25%;}
.tz-next{right:0;width:25%;}
.tz-mid{left:25%;width:50%;}

.reader-ftr{height:var(–fh);display:flex;align-items:center;justify-content:center;padding:0 8px;background:var(–card);border-top:1px solid var(–border);flex-shrink:0;}
.ch-info{font-size:11px;color:var(–text-sub);text-align:center;}

/* TTS BAR */
.tts-bar{background:var(–card);border-top:1px solid var(–border);display:flex;align-items:center;gap:10px;max-height:0;overflow:hidden;padding:0 14px;transition:max-height .3s,padding .3s;box-shadow:0 -2px 10px var(–shadow);flex-shrink:0;}
.tts-bar.open{max-height:56px;padding:8px 14px;}
.tts-info{flex:1;font-size:12px;color:var(–text-sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tts-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;}
.tts-btn:active{opacity:.7;}
.tts-play{background:var(–accent);color:#fff;}
.tts-ctrl{background:var(–border);color:var(–text);}
.spd{background:var(–border);border:none;border-radius:6px;color:var(–text);font-size:12px;padding:4px 6px;cursor:pointer;}

/* TOC */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
.ov.open{opacity:1;pointer-events:all;}
.side-panel{position:fixed;top:0;left:0;bottom:0;width:78%;max-width:310px;background:var(–card);z-index:101;transform:translateX(-100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.ov.open .side-panel{transform:translateX(0);}
.ph{padding:16px 18px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;}
.ph-title{font-family:‘Noto Serif TC’,serif;font-size:16px;font-weight:700;}
.toc-list{flex:1;overflow-y:auto;}
.toc-item{padding:13px 18px;border-bottom:1px solid var(–border);font-size:14px;cursor:pointer;color:var(–text);display:flex;align-items:center;gap:8px;}
.toc-item:active{background:var(–border);}
.toc-item.cur{color:var(–accent);font-weight:600;}
.toc-dot{width:6px;height:6px;border-radius:50%;background:var(–border);flex-shrink:0;}
.toc-item.cur .toc-dot{background:var(–accent);}

/* SETTINGS */
.sov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
.sov.open{opacity:1;pointer-events:all;}
.ssheet{position:fixed;bottom:0;left:0;right:0;background:var(–card);z-index:101;border-radius:18px 18px 0 0;padding:0 0 36px;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px var(–shadow);}
.sov.open .ssheet{transform:translateY(0);}
.shandle{width:36px;height:4px;background:var(–border);border-radius:2px;margin:10px auto 16px;}
.ss{padding:0 20px 14px;}
.ssl{font-size:11px;color:var(–text-sub);margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em;}
.stepper{display:flex;align-items:center;gap:14px;}
.stb{width:34px;height:34px;border-radius:8px;border:1px solid var(–border);background:transparent;font-size:18px;cursor:pointer;color:var(–text);display:flex;align-items:center;justify-content:center;}
.stb:active{background:var(–border);}
.stv{font-size:15px;min-width:34px;text-align:center;}
.throw{display:flex;gap:7px;margin-bottom:4px;}
.thb{flex:1;height:34px;border-radius:8px;border:2px solid transparent;cursor:pointer;font-size:11px;}
.thb.on{border-color:var(–accent);}
.cbadge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:12px;border:1px solid var(–border);font-size:13px;cursor:pointer;color:var(–text-sub);}
.cbadge.on{border-color:var(–accent);color:var(–accent);}

/* MODAL */
.mwrap{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.mwrap.open{opacity:1;pointer-events:all;}
.modal{background:var(–card);border-radius:16px;padding:24px 20px;width:calc(100% - 48px);max-width:340px;}
.modal h3{font-family:‘Noto Serif TC’,serif;font-size:18px;margin-bottom:8px;}
.modal p{font-size:14px;color:var(–text-sub);margin-bottom:20px;line-height:1.6;}
.mbtns{display:flex;gap:10px;}
.mb{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-family:‘Noto Sans TC’,sans-serif;}
.mb:active{opacity:.8;}
.mb.pri{background:var(–accent);color:#fff;}
.mb.sec{background:var(–border);color:var(–text);}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(0,0,0,.72);color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px;}
#file-in{display:none;}
/* IMMERSIVE MODE */
.reader-hdr,.reader-ftr{transition:height .28s,opacity .28s,border .28s;}
#reader-screen.immersive .reader-hdr,#reader-screen.immersive .reader-ftr{height:0!important;opacity:0;overflow:hidden;border:none;}
</style>

</head>
<body>
<input type="file" id="file-in" accept=".txt" multiple>

<!-- SHELF -->

<div class="screen" id="shelf-screen">
  <div class="shelf-hdr">
    <div class="shelf-title">書齋 <span>我的書架</span></div>

<!-- TOC -->

  </div>
</div>

<!-- SETTINGS -->

<div class="sov" id="set-ov">
  <div class="ssheet">
    <div class="shandle"></div>
    <div class="ss"><div class="ssl">字體大小</div><div class="stepper"><button class="stb" id="fs-dn">－</button><div class="stv" id="fs-v">18</div><button class="stb" id="fs-up">＋</button></div></div>

        <button class="thb" data-r="green"   style="background:#c7d5b0;color:#2a3520;">護眼</button>

  </div>
</div>

<!-- DELETE MODAL -->

<div class="mwrap" id="del-modal">
  <div class="modal">
    <h3>刪除書籍</h3>
    <p id="del-msg">確定刪除？</p>
    <div class="mbtns"><button class="mb sec" id="del-cancel">取消</button><button class="mb pri" id="del-ok">刪除</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ── BUILD CHECK (no reload, just track) ── */
const BUILD='2026-03-07-002';
try{ localStorage.setItem('sz_build',BUILD); }catch(e){}

/* ── S2T MAP ── */
const S2T={"爱":"愛","碍":"礙","肮":"骯","袄":"襖","奥":"奧","坝":"壩","罢":"罷","败":"敗","备":"備","贝":"貝","笔":"筆","币":"幣","毕":"畢","边":"邊","宾":"賓","补":"補","财":"財","蚕":"蠶","残":"殘","惭":"慚","层":"層","产":"產","尝":"嘗","长":"長","场":"場","车":"車","尘":"塵","称":"稱","齿":"齒","冲":"沖","虫":"蟲","筹":"籌","传":"傳","词":"詞","从":"從","错":"錯","达":"達","带":"帶","担":"擔","单":"單","胆":"膽","当":"當","党":"黨","导":"導","灯":"燈","递":"遞","点":"點","淀":"澱","电":"電","动":"動","斗":"鬥","独":"獨","断":"斷","对":"對","队":"隊","尔":"爾","发":"發","罚":"罰","风":"風","妇":"婦","赶":"趕","个":"個","给":"給","巩":"鞏","顾":"顧","关":"關","观":"觀","广":"廣","归":"歸","国":"國","过":"過","号":"號","华":"華","画":"畫","坏":"壞","欢":"歡","还":"還","汉":"漢","话":"話","怀":"懷","环":"環","换":"換","会":"會","机":"機","积":"積","级":"級","计":"計","记":"記","际":"際","继":"繼","夹":"夾","价":"價","奖":"獎","节":"節","进":"進","经":"經","举":"舉","开":"開","来":"來","乐":"樂","类":"類","离":"離","历":"歷","联":"聯","刘":"劉","龙":"龍","楼":"樓","录":"錄","论":"論","罗":"羅","买":"買","卖":"賣","满":"滿","贸":"貿","门":"門","灭":"滅","难":"難","脑":"腦","内":"內","拟":"擬","区":"區","气":"氣","钱":"錢","亲":"親","穷":"窮","权":"權","让":"讓","认":"認","软":"軟","时":"時","实":"實","书":"書","树":"樹","数":"數","说":"說","随":"隨","台":"臺","态":"態","坛":"壇","题":"題","体":"體","听":"聽","图":"圖","团":"團","为":"為","围":"圍","维":"維","问":"問","无":"無","务":"務","献":"獻","乡":"鄉","响":"響","项":"項","写":"寫","选":"選","学":"學","样":"樣","业":"業","义":"義","艺":"藝","应":"應","拥":"擁","优":"優","鱼":"魚","语":"語","员":"員","远":"遠","运":"運","赞":"贊","张":"張","战":"戰","这":"這","证":"證","专":"專","转":"轉","装":"裝","状":"狀","总":"總","纵":"縱","组":"組","资":"資","钻":"鑽","见":"見","觉":"覺","虑":"慮","热":"熱","练":"練","缘":"緣","须":"須","丽":"麗","结":"結","挣":"掙","东":"東","两":"兩","试":"試","报":"報","头":"頭","们":"們","块":"塊","谁":"誰","终":"終","别":"別","处":"處","后":"後","里":"裡","乱":"亂","丢":"丟","颜":"顏","脸":"臉","师":"師","爷":"爺","虽":"雖","现":"現","绝":"絕","坚":"堅","泪":"淚","强":"強","着":"著","间":"間","炼":"煉","议":"議","属":"屬","齐":"齊","责":"責","险":"險","势":"勢","简":"簡","尽":"盡","讨":"討","辞":"辭","规":"規","获":"獲","领":"領","读":"讀","础":"礎","综":"綜","细":"細","丝":"絲","纸":"紙","线":"線","绿":"綠","红":"紅","蓝":"藍","饭":"飯","饿":"餓","饮":"飲","馆":"館","驾":"駕","骑":"騎","马":"馬","剑":"劍","灵":"靈","阵":"陣","阶":"階","阳":"陽","阴":"陰","隐":"隱"};
function toTrad(t){return t.replace(/[\u4e00-\u9fff]/g,c=>S2T[c]||c);}

/* ── STATE ── */
let books=[], cur=null, chIdx=0;
let cfg={fs:18,reader:'default',trad:false};
let darkMode=false, delTarget=null;
let ttsOn=false,ttsPaused=false,ttsChunks=[],ttsCI=0,ttsUtt=null;

/* ── PERSIST ── */
function saveBooks(){try{localStorage.setItem('sz_b',JSON.stringify(books.map(b=>({title:b.title,chapters:b.chapters,lastCh:b.lastCh||0}))));}catch(e){}}
function loadBooks(){try{const d=localStorage.getItem('sz_b');if(d)books=JSON.parse(d);}catch(e){books=[];}}
function saveCfg(){try{localStorage.setItem('sz_c',JSON.stringify(cfg));}catch(e){}}
function loadCfg(){try{const d=localStorage.getItem('sz_c');if(d)cfg={...cfg,...JSON.parse(d)};}catch(e){}}
function loadDark(){try{darkMode=localStorage.getItem('sz_d')==='1';}catch(e){}}
function saveDark(){try{localStorage.setItem('sz_d',darkMode?'1':'0');}catch(e){}}

/* ── CHAPTER DETECTION ── */
function parseChapters(text){
  const RE=/^[\s\u3000]*(第\s*[零一二三四五六七八九十百千万萬\d]+\s*[章節节回卷篇集部][^\n]{0,50}|\d+\s*[\.、。]\s*[\u4e00-\u9fff][^\n]{0,40}|Chapter\s*\d+[^\n]{0,40})[\s\u3000]*$/;
  const lines=text.split('\n');
  const chs=[];
  let title=null,buf=[];
  for(const line of lines){
    const tr=line.trim();
    if(tr&&RE.test(tr)&&tr.length<80){
      if(title!==null){const c=buf.join('\n').trim();if(c)chs.push({title,content:c});}
      else if(buf.join('').trim()){chs.push({title:'序章',content:buf.join('\n').trim()});}
      title=tr; buf=[];
    } else {buf.push(line);}
  }
  if(buf.join('').trim()) chs.push({title:title||'全文',content:buf.join('\n').trim()});
  return chs.length?chs:[{title:'全文',content:text.trim()}];
}

/* ── SHELF ── */
function renderShelf(){
  const body=document.getElementById('shelf-body');
  body.innerHTML='';
  if(!books.length){
    body.innerHTML='<div class="empty"><div class="empty-ic">📚</div><div class="empty-tx">書架空空如也<br>點擊右下角 ＋ 匯入小說</div></div>';
    return;
  }
  books.forEach((b,i)=>{
    const prog=b.chapters.length?((b.lastCh||0)+1)/b.chapters.length:0;
    const el=document.createElement('div');
    el.className='book-card';
    el.innerHTML=`<div class="book-spine">📖</div><div class="book-info"><div class="book-name">${esc(b.title)}</div><div class="book-meta">共 ${b.chapters.length} 章 · 已讀至第 ${(b.lastCh||0)+1} 章</div><div class="book-bar"><div class="book-fill" style="width:${(prog*100).toFixed(1)}%"></div></div></div><button class="book-del" data-i="${i}">🗑</button>`;
    el.addEventListener('click',e=>{if(e.target.closest('.book-del'))return;openBook(i);});
    el.querySelector('.book-del').addEventListener('click',e=>{e.stopPropagation();showDel(i);});
    body.appendChild(el);
  });
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ── IMPORT ── */
document.getElementById('import-btn').addEventListener('click',()=>document.getElementById('file-in').click());
document.getElementById('file-in').addEventListener('change',async e=>{
  for(const f of Array.from(e.target.files)){
    try{
      const text=await readTxt(f);
      const chapters=parseChapters(text);
      const title=f.name.replace(/\.txt$/i,'');
      const ei=books.findIndex(b=>b.title===title);
      if(ei>=0){books[ei].chapters=chapters;toast(`《${title}》已更新，共 ${chapters.length} 章`);}
      else{books.push({title,chapters,lastCh:0});toast(`《${title}》匯入成功，共 ${chapters.length} 章`);}
    }catch(err){toast('匯入失敗');}
  }
  saveBooks();renderShelf();e.target.value='';
});
function readTxt(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{
      const t=e.target.result;
      if((t.match(/\uFFFD/g)||[]).length>20){
        const r2=new FileReader();
        r2.onload=e2=>res(e2.target.result);
        r2.onerror=()=>res(t);
        r2.readAsText(file,'Big5');
      } else res(t);
    };
    r.onerror=()=>rej(new Error('讀取失敗'));
    r.readAsText(file,'UTF-8');
  });
}

/* ── OPEN / RENDER ── */
function openBook(i){cur=i;chIdx=books[i].lastCh||0;showScreen('reader-screen');renderCh();}

function fillVP(el,ci){
  const b=books[cur];
  if(ci<0||ci>=b.chapters.length){el.innerHTML='';return;}
  let t=b.chapters[ci].title, c=b.chapters[ci].content;
  if(cfg.trad){t=toTrad(t);c=toTrad(c);}
  el.innerHTML=`<div class="vpage-text">${esc(c)}</div>`;
  el.style.fontSize=cfg.fs+'px';
}

function renderCh(){
  const b=books[cur];
  let title=b.chapters[chIdx].title;
  if(cfg.trad)title=toTrad(title);
  document.getElementById('r-title').textContent=b.title+' · '+title;
  document.getElementById('ch-info').textContent=`${chIdx+1} / ${b.chapters.length}`;
  fillVP(document.getElementById('vp0'),chIdx-1);
  fillVP(document.getElementById('vp1'),chIdx);
  fillVP(document.getElementById('vp2'),chIdx+1);
  // Reset slider to center (vp1)
  const sl=document.getElementById('slider');
  sl.style.transition='none';
  sl.style.transform='translateX(-100%)';
  const saved=b.chapters[chIdx].scrollTop||0;
  requestAnimationFrame(()=>{document.getElementById('vp1').scrollTop=saved;});
  b.lastCh=chIdx;saveBooks();
  document.getElementById('tts-info').textContent=title;
  if(ttsOn)stopTTS();
  applyTheme();
}

/* ── SCROLL POSITION ── */
function saveScrollPos(){
  if(cur===null||!books[cur])return;
  books[cur].chapters[chIdx].scrollTop=document.getElementById('vp1').scrollTop;
}

/* ── SWIPE NAV ── */
let sx=0,sy=0,isSwiping=false;
const wrap=document.getElementById('page-wrap');
const sl=document.getElementById('slider');

wrap.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;isSwiping=false;},{passive:true});
wrap.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
  if(!isSwiping&&Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)*1.2) isSwiping=true;
  if(isSwiping){sl.style.transition='none';sl.style.transform=`translateX(${-wrap.offsetWidth+dx}px)`;}
},{passive:true});
wrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  if(isSwiping){
    if(dx<-60&&chIdx<books[cur].chapters.length-1) doSlide('next');
    else if(dx>60&&chIdx>0) doSlide('prev');
    else{sl.style.transition='transform .3s cubic-bezier(.4,0,.2,1)';sl.style.transform='translateX(-100%)';}
  }
  isSwiping=false;
});
function doSlide(dir){
  saveScrollPos();
  const w=wrap.offsetWidth;
  sl.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
  sl.style.transform=dir==='next'?`translateX(${-2*w}px)`:'translateX(0)';
  setTimeout(()=>{if(dir==='next')chIdx++;else chIdx--;renderCh();},320);
}
document.getElementById('tz-next').addEventListener('click',()=>{if(chIdx<books[cur].chapters.length-1)doSlide('next');});
document.getElementById('tz-prev').addEventListener('click',()=>{if(chIdx>0)doSlide('prev');});
document.getElementById('tz-mid').addEventListener('click',()=>{document.getElementById('reader-screen').classList.toggle('immersive');});

/* ── BACK ── */
document.getElementById('back-btn').addEventListener('click',()=>{stopTTS();showScreen('shelf-screen');renderShelf();});
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}

/* ── TOC ── */
document.getElementById('toc-btn').addEventListener('click',()=>{buildTOC();document.getElementById('toc-ov').classList.add('open');});
document.getElementById('toc-close').addEventListener('click',()=>document.getElementById('toc-ov').classList.remove('open'));
document.getElementById('toc-ov').addEventListener('click',e=>{if(e.target===document.getElementById('toc-ov'))document.getElementById('toc-ov').classList.remove('open');});
function buildTOC(){
  const b=books[cur];
  document.getElementById('toc-title').textContent=b.title;
  const list=document.getElementById('toc-list');
  list.innerHTML='';
  b.chapters.forEach((ch,i)=>{
    const el=document.createElement('div');
    el.className='toc-item'+(i===chIdx?' cur':'');
    el.innerHTML=`<div class="toc-dot"></div>${esc(ch.title)}`;
    el.addEventListener('click',()=>{saveScrollPos();chIdx=i;renderCh();document.getElementById('toc-ov').classList.remove('open');});
    list.appendChild(el);
  });
  setTimeout(()=>{const a=list.querySelector('.cur');if(a)a.scrollIntoView({block:'center'});},100);
}

/* ── SETTINGS ── */
document.getElementById('set-btn').addEventListener('click',()=>{syncUI();document.getElementById('set-ov').classList.add('open');});
document.getElementById('set-ov').addEventListener('click',e=>{if(e.target===document.getElementById('set-ov'))document.getElementById('set-ov').classList.remove('open');});
function syncUI(){
  document.getElementById('fs-v').textContent=cfg.fs;
  document.querySelectorAll('.thb').forEach(b=>b.classList.toggle('on',b.dataset.r===cfg.reader));
  const cb=document.getElementById('conv-tog');cb.textContent=cfg.trad?'✓ 開啟':'✕ 關閉';cb.classList.toggle('on',cfg.trad);
}
document.getElementById('fs-dn').addEventListener('click',()=>{if(cfg.fs>12){cfg.fs--;apply();}});
document.getElementById('fs-up').addEventListener('click',()=>{if(cfg.fs<28){cfg.fs++;apply();}});
document.querySelectorAll('.thb').forEach(b=>b.addEventListener('click',()=>{cfg.reader=b.dataset.r;apply();}));
document.getElementById('conv-tog').addEventListener('click',()=>{cfg.trad=!cfg.trad;apply();if(cur!==null)renderCh();});
function apply(){syncUI();applyTheme();saveCfg();}
function applyTheme(){
  document.getElementById('reader-screen').setAttribute('data-reader',cfg.reader);
  ['vp0','vp1','vp2'].forEach(id=>{const el=document.getElementById(id);el.style.fontSize=cfg.fs+'px';});
}

/* ── DARK MODE ── */
document.getElementById('dark-btn').addEventListener('click',()=>{
  darkMode=!darkMode;
  document.body.setAttribute('data-theme',darkMode?'dark':'');
  document.getElementById('dark-btn').textContent=darkMode?'☀️':'🌙';
  saveDark();
});

/* ── TTS ── */
document.getElementById('tts-tog').addEventListener('click',()=>{
  const bar=document.getElementById('tts-bar');
  if(bar.classList.contains('open')){bar.classList.remove('open');stopTTS();}
  else bar.classList.add('open');
});
document.getElementById('tts-play').addEventListener('click',()=>{if(!ttsOn)startTTS();else if(ttsPaused)resumeTTS();else pauseTTS();});
document.getElementById('tts-prev').addEventListener('click',()=>{stopTTS();if(chIdx>0){saveScrollPos();chIdx--;renderCh();}});
document.getElementById('tts-nxt').addEventListener('click',()=>{stopTTS();if(chIdx<books[cur].chapters.length-1){saveScrollPos();chIdx++;renderCh();}});
function startTTS(){
  if(!('speechSynthesis' in window)){toast('此瀏覽器不支援語音朗讀');return;}
  const text=document.getElementById('vp1').querySelector('.vpage-text')?.textContent||'';
  ttsChunks=mkChunks(text,180);ttsCI=0;ttsOn=true;ttsPaused=false;
  document.getElementById('tts-play').textContent='⏸';speakNext();
}
function mkChunks(t,max){
  const parts=t.match(/[^。！？\n]{1,200}[。！？\n]?/g)||[t];
  const out=[];let buf='';
  for(const p of parts){if((buf+p).length>max&&buf){out.push(buf);buf=p;}else buf+=p;}
  if(buf)out.push(buf);
  return out.filter(c=>c.trim());
}
function speakNext(){
  if(!ttsOn||ttsCI>=ttsChunks.length){ttsOn=false;document.getElementById('tts-play').textContent='▶';document.getElementById('tts-info').textContent='朗讀完畢';return;}
  const rate=parseFloat(document.getElementById('tts-spd').value);
  ttsUtt=new SpeechSynthesisUtterance(ttsChunks[ttsCI]);
  ttsUtt.lang='zh-TW';ttsUtt.rate=rate;
  ttsUtt.onend=()=>{if(!ttsOn||ttsPaused)return;ttsCI++;speakNext();};
  ttsUtt.onerror=()=>{ttsCI++;speakNext();};
  document.getElementById('tts-info').textContent=`(${ttsCI+1}/${ttsChunks.length})`;
  try{window.speechSynthesis.speak(ttsUtt);}catch(e){}
}
function pauseTTS(){ttsPaused=true;try{window.speechSynthesis.pause();}catch(e){}document.getElementById('tts-play').textContent='▶';}
function resumeTTS(){ttsPaused=false;try{window.speechSynthesis.resume();}catch(e){}document.getElementById('tts-play').textContent='⏸';}
function stopTTS(){ttsOn=false;ttsPaused=false;try{window.speechSynthesis.cancel();}catch(e){}document.getElementById('tts-play').textContent='▶';}

/* ── DELETE ── */
function showDel(i){delTarget=i;document.getElementById('del-msg').textContent=`確定要刪除《${books[i].title}》嗎？閱讀進度也會一併清除。`;document.getElementById('del-modal').classList.add('open');}
document.getElementById('del-cancel').addEventListener('click',()=>document.getElementById('del-modal').classList.remove('open'));
document.getElementById('del-ok').addEventListener('click',()=>{
  if(delTarget!==null){const t=books[delTarget].title;books.splice(delTarget,1);saveBooks();renderShelf();toast(`《${t}》已刪除`);delTarget=null;}
  document.getElementById('del-modal').classList.remove('open');
});

/* ── TOAST ── */
let ttmr=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(ttmr);ttmr=setTimeout(()=>el.classList.remove('on'),2600);}

/* ── INIT ── */
loadBooks();loadCfg();loadDark();
if(darkMode){document.body.setAttribute('data-theme','dark');document.getElementById('dark-btn').textContent='☀️';}
apply();renderShelf();
</script>

</body>
