<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>書卷 v2.0.2</title>
<style>
:root {
  --bg: #f0ece2;
  --surface: #faf8f3;
  --surface2: #ede9df;
  --border: #e0d9cc;
  --text: #2c2a26;
  --text-dim: #8a8070;
  --accent: #7a5230;
  --accent2: #b8936a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
[data-night] {
  --bg: #18171a;
  --surface: #242228;
  --surface2: #2e2c33;
  --border: #3a3840;
  --text: #e8e4da;
  --text-dim: #7a7468;
  --accent: #c4915a;
  --accent2: #8a6040;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: "Georgia","Songti SC","SimSun",serif; transition: background 0.3s, color 0.3s; }
.page { position: fixed; inset: 0; display: flex; flex-direction: column; }
.hidden { display: none !important; }

/* 書庫 */
#page-lib { background: var(–bg); }
.lib-header { padding: calc(var(–safe-top) + 16px) 20px 14px; background: var(–surface); border-bottom: 1px solid var(–border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.lib-title { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(–accent); }
.lib-version { font-size: 10px; color: var(–text-dim); margin-left: 6px; font-weight: 400; letter-spacing: 0; }
.hdr-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(–border); background: var(–surface2); color: var(–text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.lib-body { flex: 1; overflow-y: auto; padding: 20px 16px calc(var(–safe-bot) + 20px); -webkit-overflow-scrolling: touch; }

/* 匯入卡 */
.import-card { background: var(–surface); border: 2px dashed var(–border); border-radius: 18px; padding: 28px 20px; text-align: center; cursor: pointer; margin-bottom: 24px; transition: border-color 0.2s, background 0.2s; }
.import-card:active { background: var(–surface2); border-color: var(–accent2); }
.import-icon { font-size: 36px; margin-bottom: 8px; }
.import-label { font-size: 16px; font-weight: 600; color: var(–accent); letter-spacing: 1px; }
.import-sub { font-size: 12px; color: var(–text-dim); margin-top: 4px; }

/* 宮格 */
.section-title { font-size: 12px; color: var(–text-dim); letter-spacing: 2px; margin-bottom: 14px; padding-left: 2px; }
.book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
.book-cell { cursor: pointer; user-select: none; min-width: 0; }
.book-cover { aspect-ratio: 3/4; border-radius: 10px; background: var(–surface); border: 1px solid var(–border); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 8px 10px 14px; position: relative; overflow: hidden; transition: transform 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.book-cell:active .book-cover { transform: scale(0.96); }
.book-cover-spine { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; border-radius: 10px 0 0 10px; }
.book-cover-title { font-size: 13px; font-weight: 700; text-align: center; color: var(–text); line-height: 1.4; word-break: break-all; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; padding-left: 8px; }
.book-cover-prog { position: absolute; bottom: 6px; right: 8px; font-size: 10px; color: var(–text-dim); }
.book-cover-new { position: absolute; top: 6px; right: 6px; background: var(–accent); color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 6px; }
.book-name { font-size: 12px; text-align: center; margin-top: 7px; color: var(–text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
.empty-lib { text-align: center; padding: 60px 20px; color: var(–text-dim); }
.empty-lib .ei { font-size: 48px; margin-bottom: 12px; }
.empty-lib .et { font-size: 14px; letter-spacing: 2px; }

/* 閱讀器 */
#page-reader { background: var(–bg); overflow: hidden; }

/* 翻頁 - 全螢幕 */
.flip-viewport { position: absolute; inset: 0; overflow: hidden; }
.flip-canvas { position: absolute; top: 0; bottom: 0; left: 0; display: flex; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
.flip-page { width: 100vw; height: 100vh; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; padding: calc(var(–safe-top) + 52px) 22px calc(var(–safe-bot) + 36px); }
.flip-page-text { flex: 1; overflow: hidden; line-height: 2; color: var(–text); white-space: pre-wrap; word-break: break-all; }

/* 頁碼 - 底部中央小字，常駐顯示 */
.r-page-indicator { position: absolute; bottom: calc(var(–safe-bot) + 10px); left: 0; right: 0; text-align: center; font-size: 11px; color: var(–text-dim); pointer-events: none; z-index: 10; opacity: 0.6; }

/* 頂部浮動工具列 */
.r-topbar { position: absolute; top: 0; left: 0; right: 0; padding: calc(var(–safe-top) + 8px) 16px 10px; background: rgba(250,248,243,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(–border); display: flex; align-items: center; gap: 10px; z-index: 100; transition: transform 0.25s, opacity 0.25s; }
[data-night] .r-topbar { background: rgba(36,34,40,0.95); }
.r-topbar.hidden-ui { transform: translateY(-100%); opacity: 0; pointer-events: none; }
.r-back { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(–border); background: var(–surface2); color: var(–text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.r-title { flex: 1; font-size: 15px; font-weight: 600; color: var(–text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
.r-toc-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(–border); background: var(–surface2); color: var(–text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* 底部浮動工具列 */
.r-botbar { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 20px calc(var(–safe-bot) + 12px); background: rgba(250,248,243,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid var(–border); z-index: 100; transition: transform 0.25s, opacity 0.25s; }
[data-night] .r-botbar { background: rgba(36,34,40,0.95); }
.r-botbar.hidden-ui { transform: translateY(100%); opacity: 0; pointer-events: none; }
.r-tools { display: flex; justify-content: space-around; align-items: center; }
.r-tool-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 14px; border-radius: 10px; border: none; background: none; color: var(–text); transition: background 0.15s; }
.r-tool-btn:active { background: var(–surface2); }
.r-tool-icon { font-size: 22px; }
.r-tool-label { font-size: 10px; color: var(–text-dim); }

/* 熱區 */
.tap-zone { position: absolute; top: 0; height: 100%; z-index: 50; }
#tap-prev { left: 0; width: 30%; }
#tap-mid  { left: 30%; width: 40%; }
#tap-next { right: 0; width: 30%; }

/* 目錄 */
.toc-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.toc-overlay.open { opacity: 1; pointer-events: auto; }
.toc-panel { position: fixed; top: 0; left: -100%; bottom: 0; width: 82%; max-width: 320px; background: var(–surface); z-index: 201; transition: left 0.28s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
.toc-panel.open { left: 0; }
.toc-header { padding: calc(var(–safe-top) + 16px) 20px 14px; border-bottom: 1px solid var(–border); font-size: 16px; font-weight: 700; color: var(–accent); letter-spacing: 2px; flex-shrink: 0; }
.toc-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.toc-item { padding: 14px 20px; border-bottom: 1px solid var(–border); font-size: 14px; color: var(–text); cursor: pointer; transition: background 0.15s; }
.toc-item:active { background: var(–surface2); }
.toc-item.active { color: var(–accent); font-weight: 600; }

/* 字級面板 */
.bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(–surface); border-top: 1px solid var(–border); border-radius: 20px 20px 0 0; padding: 20px 24px calc(var(–safe-bot) + 20px); z-index: 300; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }
.bottom-sheet.open { transform: translateY(0); }
.sheet-title { font-size: 13px; color: var(–text-dim); letter-spacing: 2px; margin-bottom: 16px; text-align: center; }
.size-row { display: flex; align-items: center; gap: 16px; justify-content: center; }
.size-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(–border); background: var(–surface2); font-size: 20px; cursor: pointer; color: var(–text); display: flex; align-items: center; justify-content: center; }
.size-btn:active { background: var(–border); }
.size-display { font-size: 18px; font-weight: 600; color: var(–text); min-width: 60px; text-align: center; }

/* 刪除確認 */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.confirm-overlay.open { opacity: 1; pointer-events: auto; }
.confirm-sheet { background: var(–surface); border-radius: 20px 20px 0 0; width: 100%; padding: 20px 20px calc(var(–safe-bot) + 16px); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }
.confirm-overlay.open .confirm-sheet { transform: translateY(0); }
.confirm-title { font-size: 15px; font-weight: 600; color: var(–text); margin-bottom: 6px; }
.confirm-sub { font-size: 13px; color: var(–text-dim); margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
.confirm-cancel { background: var(–surface2); color: var(–text); }
.confirm-del { background: #ff3b30; color: white; }

/* Toast */
.toast { position: fixed; bottom: calc(var(–safe-bot) + 100px); left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,28,26,0.88); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<!-- 書庫 -->

<div class="page" id="page-lib">
  <div class="lib-header">
    <div>
      <span class="lib-title">書　卷</span>
      <span class="lib-version">v2.0.2</span>
    </div>
    <button class="hdr-btn" id="night-btn" onclick="toggleNight()">🌙</button>
  </div>
  <div class="lib-body">
    <div class="import-card" id="import-card">
      <div class="import-icon">📄</div>
      <div class="import-label">匯入 TXT 小說</div>
      <div class="import-sub">點擊選擇檔案</div>
    </div>
    <input type="file" id="file-input" accept=".txt" style="display:none">
    <div id="book-section" class="hidden">
      <div class="section-title">我的書庫</div>
      <div class="book-grid" id="book-grid"></div>
    </div>
    <div class="empty-lib" id="empty-lib">
      <div class="ei">📚</div>
      <div class="et">書庫空空如也</div>
    </div>
  </div>
</div>

<!-- 閱讀器 -->

<div class="page hidden" id="page-reader">
  <div class="tap-zone" id="tap-prev"></div>
  <div class="tap-zone" id="tap-mid"></div>
  <div class="tap-zone" id="tap-next"></div>
  <div class="flip-viewport" id="flip-viewport">
    <div class="flip-canvas" id="flip-canvas"></div>
  </div>
  <div class="r-topbar hidden-ui" id="r-topbar">
    <button class="r-back" onclick="closeReader()">‹</button>
    <div class="r-title" id="r-title">書名</div>
    <button class="r-toc-btn" onclick="openTOC()">☰</button>
  </div>
  <div class="r-botbar hidden-ui" id="r-botbar">
    <div class="r-page-info" id="r-page-info">第 1 頁</div>
    <div class="r-tools">
      <button class="r-tool-btn" onclick="openSizePanel()">
        <span class="r-tool-icon">文</span>
        <span class="r-tool-label">字級</span>
      </button>
      <button class="r-tool-btn" onclick="toggleNight()">
        <span class="r-tool-icon" id="r-night-icon">🌙</span>
        <span class="r-tool-label">主題</span>
      </button>
    </div>
  </div>
</div>

<!-- 目錄 -->

<div class="toc-overlay" id="toc-overlay" onclick="closeTOC()"></div>
<div class="toc-panel" id="toc-panel">
  <div class="toc-header">章節目錄</div>
  <div class="toc-list" id="toc-list"></div>
</div>

<!-- 字級面板 -->

<div class="bottom-sheet" id="size-panel" onclick="if(event.target===this)closeSizePanel()">
  <div class="sheet-title">字　級</div>
  <div class="size-row">
    <button class="size-btn" onclick="adjFontSize(-1)">−</button>
    <div class="size-display" id="size-display">20px</div>
    <button class="size-btn" onclick="adjFontSize(1)">＋</button>
  </div>
</div>

<!-- 刪除確認 -->

<div class="confirm-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-sheet">
    <div class="confirm-title">刪除書籍</div>
    <div class="confirm-sub" id="confirm-sub">確定要刪除這本書嗎？</div>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-cancel" onclick="closeConfirm()">取消</button>
      <button class="confirm-btn confirm-del" onclick="confirmDelete()">刪除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_NAME = 'shujuan2', DB_VER = 1;
const SPINE_COLORS = ['#c47a5a','#7a8c5a','#5a7a8c','#8c5a7a','#7a6e5a','#5a8c7a','#8c7a5a'];
const PAGE_CHARS = 600;

let _db = null, _books = [], _cur = null;
let _uiVisible = false, _deleteId = null;
let _fontSize = 20, _isNight = false;
let _longPressTimer = null;
let _touchStartX = 0, _touchStartY = 0;

// ── DB ──
function openDB() {
  return new Promise((res, rej) => {
    if (_db) return res(_db);
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books')) d.createObjectStore('books', { keyPath: 'id', autoIncrement: true });
      if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'key' });
    };
    r.onsuccess = e => { _db = e.target.result; res(_db); };
    r.onerror = rej;
  });
}
async function dbOp(store, mode, fn) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const t = d.transaction(store, mode).objectStore(store);
    const r = fn(t);
    if (r) { r.onsuccess = () => res(r.result); r.onerror = rej; } else res();
  });
}
const dbAdd = (s,o) => dbOp(s,'readwrite',t=>t.add(o));
const dbPut = (s,o) => dbOp(s,'readwrite',t=>t.put(o));
const dbGet = (s,k) => dbOp(s,'readonly', t=>t.get(k));
const dbDel = (s,k) => dbOp(s,'readwrite',t=>t.delete(k));
const dbAll = (s)   => dbOp(s,'readonly', t=>t.getAll());

// ── 設定 ──
async function loadSettings() {
  const s = await dbGet('settings','ui');
  if (s) { _fontSize = s.fontSize||20; _isNight = s.isNight||false; }
  applyNight();
}
async function saveSettings() {
  await dbPut('settings',{key:'ui',fontSize:_fontSize,isNight:_isNight});
}

// ── 夜間 ──
function toggleNight() {
  _isNight = !_isNight; applyNight(); saveSettings();
}
function applyNight() {
  document.body.toggleAttribute('data-night', _isNight);
  document.getElementById('night-btn').textContent = _isNight ? '☀️' : '🌙';
  document.getElementById('r-night-icon').textContent = _isNight ? '☀️' : '🌙';
}

// ── Toast ──
let _toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT); _toastT = setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── 上傳 ──
function readTxt(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => {
      const t = e.target.result;
      if ((t.match(/\uFFFD/g)||[]).length > 30) {
        const r2 = new FileReader();
        r2.onload = e2 => res(e2.target.result);
        r2.onerror = rej;
        r2.readAsText(file,'GBK');
      } else res(t);
    };
    r.onerror = rej;
    r.readAsText(file,'UTF-8');
  });
}
async function handleFile(input) {
  const file = input.files[0]; if (!file) return;
  const fname = file.name, fsize = file.size;
  showToast('載入中…');
  try {
    const text = await readTxt(file);
    input.value = '';
    const id = await dbAdd('books',{
      title: fname.replace(/\.txt$/i,''),
      content: text, size: fsize,
      addedAt: Date.now(), lastRead: Date.now(), pageIdx: 0
    });
    showToast('✅ 匯入成功');
    await renderLibrary();
    openBook(id);
  } catch(err) {
    input.value = '';
    showToast('❌ '+(err&&err.message?err.message:String(err)));
  }
}

// ── 書庫 ──
function simpleHash(str) { let h=0; for (const c of str) h=(h*31+c.charCodeAt(0))>>>0; return h; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function renderLibrary() {
  _books = await dbAll('books');
  _books.sort((a,b)=>(b.lastRead||0)-(a.lastRead||0));
  const grid = document.getElementById('book-grid');
  const empty = document.getElementById('empty-lib');
  const section = document.getElementById('book-section');
  if (_books.length === 0) { empty.classList.remove('hidden'); section.classList.add('hidden'); return; }
  empty.classList.add('hidden'); section.classList.remove('hidden');
  grid.innerHTML = '';
  _books.forEach(b => {
    const color = SPINE_COLORS[simpleHash(b.title) % SPINE_COLORS.length];
    const pct = b._totalPages ? Math.round((b.pageIdx||0)/b._totalPages*100) : 0;
    const isNew = (Date.now()-(b.addedAt||0)) < 172800000;
    const cell = document.createElement('div');
    cell.className = 'book-cell';
    cell.innerHTML = `
      <div class="book-cover">
        <div class="book-cover-spine" style="background:${color}"></div>
        ${isNew?'<div class="book-cover-new">新</div>':''}
        <div class="book-cover-title">${esc(b.title)}</div>
        ${pct>0?`<div class="book-cover-prog">${pct}%</div>`:''}
      </div>
      <div class="book-name">${esc(b.title)}</div>`;
    cell.addEventListener('click', ()=>openBook(b.id));
    cell.addEventListener('touchstart', ()=>{ _longPressTimer=setTimeout(()=>showConfirm(b.id,b.title),650); },{passive:true});
    cell.addEventListener('touchend',  ()=>clearTimeout(_longPressTimer),{passive:true});
    cell.addEventListener('touchmove', ()=>clearTimeout(_longPressTimer),{passive:true});
    grid.appendChild(cell);
  });
}

// ── 刪除 ──
function showConfirm(id, title) {
  _deleteId = id;
  document.getElementById('confirm-sub').textContent = `確定要刪除「${title}」？`;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { _deleteId=null; document.getElementById('confirm-overlay').classList.remove('open'); }
async function confirmDelete() {
  if (!_deleteId) return;
  await dbDel('books',_deleteId); closeConfirm(); showToast('已刪除'); await renderLibrary();
}

// ── 分頁 ──
function splitPages(text) {
  const paras = text.split(/\n+/).map(p=>p.trim()).filter(p=>p.length>0);
  const pages = []; let cur = '';
  for (const para of paras) {
    const cand = cur ? cur+'\n\n'+para : para;
    if (cand.length > PAGE_CHARS && cur.length > 0) { pages.push(cur); cur = para; }
    else cur = cand;
    while (cur.length > PAGE_CHARS*1.5) { pages.push(cur.substring(0,PAGE_CHARS)); cur=cur.substring(PAGE_CHARS); }
  }
  if (cur) pages.push(cur);
  return pages.length>0 ? pages : [''];
}
function detectChapters(pages) {
  const reg = /^(第\s*[0-9一二三四五六七八九十百千萬]+\s*[章節回卷]|楔子|序章|尾聲)/;
  return pages.reduce((arr,p,idx)=>{
    const first = p.split('\n')[0].trim();
    if (first.length>0 && first.length<30 && reg.test(first)) arr.push({name:first,pageIdx:idx});
    return arr;
  },[]);
}

// ── 開書 ──
async function openBook(id) {
  const b = await dbGet('books',id); if (!b) return;
  const pages = splitPages(b.content);
  const chapters = detectChapters(pages);
  const pageIdx = Math.min(b.pageIdx||0, pages.length-1);
  _cur = {id, title:b.title, pages, chapters, pageIdx};
  b.lastRead = Date.now(); b._totalPages = pages.length;
  await dbPut('books',b);
  document.getElementById('r-title').textContent = b.title;
  document.getElementById('page-lib').classList.add('hidden');
  document.getElementById('page-reader').classList.remove('hidden');
  _uiVisible = false; applyUIState();
  buildFlipCanvas(); goToPage(pageIdx, false);
}

// ── 翻頁 ──
function buildFlipCanvas() {
  const canvas = document.getElementById('flip-canvas');
  canvas.innerHTML = '';
  if (!_cur) return;
  _cur.pages.forEach(text => {
    const pg = document.createElement('div'); pg.className = 'flip-page';
    const el = document.createElement('div'); el.className = 'flip-page-text';
    el.style.fontSize = _fontSize+'px'; el.textContent = text;
    pg.appendChild(el); canvas.appendChild(pg);
  });
}
function goToPage(idx, animate=true) {
  if (!_cur) return;
  idx = Math.max(0, Math.min(idx, _cur.pages.length-1));
  _cur.pageIdx = idx;
  const canvas = document.getElementById('flip-canvas');
  if (!animate) canvas.style.transition='none';
  canvas.style.transform = `translateX(-${idx*100}vw)`;
  if (!animate) { canvas.offsetHeight; canvas.style.transition=''; }
  document.getElementById('r-page-info').textContent = `第 ${idx+1} 頁　共 ${_cur.pages.length} 頁`;
  saveProgress();
}
async function saveProgress() {
  if (!_cur) return;
  const b = await dbGet('books',_cur.id);
  if (b) { b.pageIdx=_cur.pageIdx; b._totalPages=_cur.pages.length; b.lastRead=Date.now(); await dbPut('books',b); }
}
function prevPage() { if(!_cur)return; if(_uiVisible){hideUI();return;} if(_cur.pageIdx>0)goToPage(_cur.pageIdx-1); else showToast('已是第一頁'); }
function nextPage() { if(!_cur)return; if(_uiVisible){hideUI();return;} if(_cur.pageIdx<_cur.pages.length-1)goToPage(_cur.pageIdx+1); else showToast('已是最後一頁'); }

// ── 觸控滑動 ──
function initTouch() {
  const vp = document.getElementById('flip-viewport');
  vp.addEventListener('touchstart',e=>{ _touchStartX=e.touches[0].clientX; _touchStartY=e.touches[0].clientY; },{passive:true});
  vp.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_touchStartX;
    const dy=e.changedTouches[0].clientY-_touchStartY;
    if (Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40) { if(dx<0)nextPage(); else prevPage(); }
  },{passive:true});
}

// ── UI ──
function toggleUI() { _uiVisible=!_uiVisible; applyUIState(); }
function hideUI()   { _uiVisible=false; applyUIState(); }
function applyUIState() {
  document.getElementById('r-topbar').classList.toggle('hidden-ui',!_uiVisible);
  document.getElementById('r-botbar').classList.toggle('hidden-ui',!_uiVisible);
  // 隱藏 UI 時同時收起字級面板
  if (!_uiVisible) closeSizePanel();
}
function closeReader() {
  closeSizePanel();
  closeTOC();
  document.getElementById('page-reader').classList.add('hidden');
  document.getElementById('page-lib').classList.remove('hidden');
  renderLibrary();
}

// ── 目錄 ──
function openTOC() {
  if (!_cur) return;
  const list = document.getElementById('toc-list');
  list.innerHTML = _cur.chapters.length===0
    ? '<div class="toc-item" style="color:var(--text-dim)">未偵測到章節</div>'
    : _cur.chapters.map(ch=>`<div class="toc-item ${ch.pageIdx===_cur.pageIdx?'active':''}" onclick="jumpChapter(${ch.pageIdx})">${esc(ch.name)}</div>`).join('');
  document.getElementById('toc-overlay').classList.add('open');
  document.getElementById('toc-panel').classList.add('open');
}
function closeTOC() { document.getElementById('toc-overlay').classList.remove('open'); document.getElementById('toc-panel').classList.remove('open'); }
function jumpChapter(idx) { closeTOC(); goToPage(idx); }

// ── 字級 ──
function openSizePanel() { document.getElementById('size-display').textContent=_fontSize+'px'; document.getElementById('size-panel').classList.add('open'); }
function closeSizePanel() { document.getElementById('size-panel').classList.remove('open'); }
function adjFontSize(d) {
  _fontSize = Math.max(14,Math.min(32,_fontSize+d));
  document.getElementById('size-display').textContent = _fontSize+'px';
  document.querySelectorAll('.flip-page-text').forEach(el=>el.style.fontSize=_fontSize+'px');
  saveSettings();
}

// ── 初始化 ──
async function init() {
  document.getElementById('import-card').addEventListener('click', ()=>document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', function(){ handleFile(this); });
  document.getElementById('tap-prev').addEventListener('click', prevPage);
  document.getElementById('tap-mid').addEventListener('click', toggleUI);
  document.getElementById('tap-next').addEventListener('click', nextPage);
  await loadSettings();
  await renderLibrary();
  initTouch();
}
document.addEventListener('DOMContentLoaded', init);
</script>
