<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="書卷">
<meta name="theme-color" content="#8b5e3c">
<title>書卷</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --bg:#f5f0e8;--surface:#ede7da;--surface2:#e3ddd0;--card:#fff9f0;
  --text:#1e1408;--text-dim:#7a6e5a;--accent:#8b5e3c;--accent-light:#c49a6c;
  --border:#d5cec2;--shadow:rgba(44,30,14,.12);--radius:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="night"]{--bg:#0e0d0a;--surface:#1a1814;--surface2:#222018;--card:#1a1814;--text:#d5c9b5;--text-dim:#665e50;--accent:#c49a6c;--accent-light:#8b5e3c;--border:#2a2820;--shadow:rgba(0,0,0,.6);}
[data-theme="eye"]{--bg:#ccd9b8;--surface:#bfcfaa;--surface2:#b2c49c;--card:#d4e0c0;--text:#182810;--text-dim:#426030;--accent:#3a6820;--accent-light:#5a9040;--border:#a0bc88;--shadow:rgba(20,40,10,.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.page{position:fixed;inset:0;display:flex;flex-direction:column;will-change:transform;}
.page.hidden{display:none;}

/* ══ LIBRARY ══ */
.lib-header{display:flex;align-items:center;padding:calc(var(--safe-top)+14px) 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0;}
.lib-title{flex:1;font-size:20px;font-weight:500;letter-spacing:3px;color:var(--accent);}
.icon-btn{width:40px;height:40px;border-radius:12px;border:none;background:transparent;color:var(--text-dim);font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icon-btn:active{background:var(--surface2);}
.search-bar{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.search-inner{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;gap:8px;}
.search-inner input{flex:1;border:none;background:transparent;color:var(--text);font-size:15px;font-family:inherit;outline:none;}
.search-inner input::placeholder{color:var(--text-dim);}
.s-clear{font-size:14px;color:var(--text-dim);cursor:pointer;display:none;padding:2px 4px;}
.lib-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.add-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface);}
.add-row:active{background:var(--surface2);}
.add-thumb{width:44px;height:58px;border-radius:8px;border:2px dashed var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.add-label{font-size:14px;color:var(--accent);font-weight:500;}
.add-sub{font-size:12px;color:var(--text-dim);margin-top:2px;}
.book-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.book-row:active{background:var(--surface2);}
.b-thumb{width:44px;height:58px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:1px 2px 6px var(--shadow);}
.b-info{flex:1;min-width:0;}
.b-title{font-size:15px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
.b-meta{font-size:12px;color:var(--text-dim);}
.empty-lib{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;text-align:center;}
.empty-lib .ei{font-size:52px;opacity:.35;}
.empty-lib .et{font-size:15px;color:var(--text-dim);letter-spacing:1px;}
.no-result{display:none;padding:30px;text-align:center;color:var(--text-dim);font-size:14px;}

/* ══ READER ══ */
#page-reader{background:var(--bg);}
.r-topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;padding:calc(var(--safe-top)+10px) 14px 10px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;transition:transform .28s,opacity .28s;}
.r-topbar.ui-hide{transform:translateY(-110%);opacity:0;pointer-events:none;}
.r-book-title{flex:1;font-size:15px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.r-toolbar{position:absolute;bottom:0;left:0;right:0;z-index:20;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(var(--safe-bottom)+6px);display:flex;align-items:center;justify-content:space-around;transition:transform .28s,opacity .28s;}
.r-toolbar.ui-hide{transform:translateY(110%);opacity:0;pointer-events:none;}
.tb-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:10px;font-size:11px;min-width:44px;}
.tb-btn:active{background:var(--surface2);}
.tb-btn .tbi{font-size:20px;line-height:1;}
.tb-btn.active,.tb-btn.active .tbi{color:var(--accent);}

/* ══ FLIP ══ */
.r-flip{position:absolute;inset:0;display:flex;flex-direction:column;}
.flip-zones{position:absolute;inset:0;z-index:10;display:flex;}
.fz-l{flex:0 0 28%;height:100%;cursor:pointer;}
.fz-m{flex:1;height:100%;cursor:pointer;}
.fz-r{flex:0 0 28%;height:100%;cursor:pointer;}
.flip-text{flex:1;overflow:hidden;padding:20px 22px 12px;color:var(--text);}
.flip-text p{margin-bottom:.5em;text-indent:2em;word-break:break-all;}
.flip-text .ch-h{font-weight:500;color:var(--accent);text-indent:0;margin:1em 0 .8em;padding-left:12px;border-left:3px solid var(--accent);}
.flip-text .tts-hl{background:rgba(196,154,108,.3);border-radius:3px;}
.flip-prog-bar{height:2px;background:var(--surface2);flex-shrink:0;}
.flip-prog-fill{height:100%;background:var(--accent);transition:width .3s;}
.flip-footer{flex-shrink:0;padding:4px 20px calc(var(--safe-bottom)+2px);display:flex;align-items:center;justify-content:space-between;}
.flip-pnum{font-size:12px;color:var(--text-dim);}

/* ══ PANELS ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;opacity:0;pointer-events:none;transition:opacity .28s;}
.overlay.open{opacity:1;pointer-events:auto;}
.panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:51;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:80vh;display:flex;flex-direction:column;padding-bottom:var(--safe-bottom);}
.panel.open{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.panel-title{font-size:15px;font-weight:500;letter-spacing:2px;color:var(--text);padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.panel-close{font-size:18px;color:var(--text-dim);cursor:pointer;padding:0 4px;}
.panel-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;}
.srow:last-child{border-bottom:none;}
.slabel{font-size:14px;color:var(--text-dim);white-space:nowrap;}
.btnrow{display:flex;gap:6px;flex-wrap:wrap;}
.cbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;}
.cbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.szctrl{display:flex;align-items:center;gap:10px;}
.szval{font-size:13px;color:var(--text);width:28px;text-align:center;}
.szbtn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* TTS panel */
.tts-cur{font-size:13px;color:var(--text-dim);text-align:center;padding:4px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:20px;}
.tts-ctrl{display:flex;align-items:center;gap:12px;justify-content:center;padding:12px 0;}
.tts-cb{width:52px;height:52px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-dim);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.tts-cb.play{width:64px;height:64px;background:var(--accent);color:#fff;font-size:26px;}
.tts-cb:active{opacity:.7;}
/* timer slider */
.timer-wrap{display:flex;flex-direction:column;gap:10px;}
.timer-disp{font-size:24px;font-weight:300;color:var(--accent);letter-spacing:3px;text-align:center;}
.timer-slider{width:100%;accent-color:var(--accent);height:4px;cursor:pointer;}
.timer-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);}
.timer-note{font-size:12px;color:var(--text-dim);text-align:center;}
.timer-cancel{display:none;margin:0 auto;padding:6px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;}

/* chapters / bookmarks */
.ch-item{padding:13px 4px 13px 12px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text-dim);cursor:pointer;border-left:3px solid transparent;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-item:active{background:var(--surface2);}
.ch-item.active{color:var(--accent);border-left-color:var(--accent);}
.bm-row{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--border);gap:10px;}
.bm-row:last-child{border-bottom:none;}
.bm-info{flex:1;cursor:pointer;}
.bm-prev{font-size:13px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bm-meta{font-size:11px;color:var(--text-dim);}
.bm-del{font-size:16px;background:none;border:none;cursor:pointer;color:var(--text-dim);padding:4px 8px;}

.toast{position:fixed;bottom:calc(var(--safe-bottom)+100px);left:50%;transform:translateX(-50%) translateY(14px);background:rgba(0,0,0,.78);color:#fff;padding:10px 22px;border-radius:22px;font-size:14px;opacity:0;transition:opacity .22s,transform .22s;z-index:200;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>
<body data-theme="day">

<!-- ══ LIBRARY ══ -->
<div class="page" id="page-library">
  <div class="lib-header">
    <div class="lib-title">書　卷</div>
    <button class="icon-btn" onclick="document.getElementById('file-input').click()">＋</button>
  </div>
  <div class="search-bar">
    <div class="search-inner">
      <span style="font-size:15px;color:var(--text-dim)">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋書名…" oninput="filterBooks(this.value)">
      <span class="s-clear" id="s-clear" onclick="clearSearch()">✕</span>
    </div>
  </div>
  <div class="lib-body">
    <div class="add-row" onclick="document.getElementById('file-input').click())">
      <div class="add-thumb">📄</div>
      <div><div class="add-label">匯入 TXT 小說</div><div class="add-sub">點擊選擇檔案</div></div>
    </div>
    <div id="book-list"></div>
    <div class="empty-lib" id="empty-lib"><div class="ei">📚</div><div class="et">書庫空空如也</div></div>
    <div class="no-result" id="no-result">找不到符合的書籍</div>
  </div>
  <input type="file" id="file-input" accept=".txt" style="display:none">
</div>

<!-- ══ READER ══ -->
<div class="page hidden" id="page-reader">
  <div class="r-topbar ui-hide" id="r-topbar">
    <button class="icon-btn" onclick="goLibrary()">‹</button>
    <div class="r-book-title" id="r-title"></div>
    <button class="icon-btn" onclick="openPanel('panel-chapters')">☰</button>
  </div>

  <!-- FLIP AREA -->
  <div class="r-flip" id="r-flip">
    <div class="flip-zones">
      <div class="fz-l" onclick="flipPrev()"></div>
      <div class="fz-m" onclick="toggleUI()"></div>
      <div class="fz-r" onclick="flipNext()"></div>
    </div>
    <div class="flip-text" id="flip-text"></div>
    <div class="flip-prog-bar"><div class="flip-prog-fill" id="flip-prog-fill" style="width:0%"></div></div>
    <div class="flip-footer">
      <div class="flip-pnum" id="flip-pnum">1 / 1</div>
      <div class="flip-pnum" id="flip-pct-label">0%</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="r-toolbar ui-hide" id="r-toolbar">
    <button class="tb-btn" onclick="doAddBookmark()"><span class="tbi">🔖</span><span>書籤</span></button>
    <button class="tb-btn" onclick="openPanel('panel-bookmarks')"><span class="tbi">📋</span><span>記錄</span></button>
    <button class="tb-btn" onclick="openPanel('panel-tts')"><span class="tbi">🎧</span><span>聽書</span></button>
    <button class="tb-btn" id="tb-conv" onclick="toggleConvert()"><span class="tbi">簡</span><span id="tb-conv-lbl">簡→繁</span></button>
    <button class="tb-btn" onclick="openPanel('panel-settings')"><span class="tbi">⚙️</span><span>設定</span></button>
  </div>
</div>

<!-- ══ PANELS ══ -->
<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<div class="panel" id="panel-chapters">
  <div class="panel-handle"></div>
  <div class="panel-title">目　錄<span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body"><div id="chapter-list"></div></div>
</div>

<div class="panel" id="panel-bookmarks">
  <div class="panel-handle"></div>
  <div class="panel-title">書　籤<span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body"><div id="bookmark-list"></div></div>
</div>

<div class="panel" id="panel-tts">
  <div class="panel-handle"></div>
  <div class="panel-title">聽　書<span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body">
    <div class="tts-cur" id="tts-cur">點擊播放開始聽書</div>
    <div class="tts-ctrl">
      <button class="tts-cb" onclick="ttsPrev()">⏮</button>
      <button class="tts-cb play" id="tts-play-btn" onclick="toggleTTS()">▶</button>
      <button class="tts-cb" onclick="ttsNext()">⏭</button>
    </div>
    <div class="srow">
      <div class="slabel">速度</div>
      <div class="btnrow">
        <button class="cbtn" data-spd="0.7" onclick="setSpeed(0.7)">0.7×</button>
        <button class="cbtn active" data-spd="1.0" onclick="setSpeed(1.0)">1.0×</button>
        <button class="cbtn" data-spd="1.25" onclick="setSpeed(1.25)">1.25×</button>
        <button class="cbtn" data-spd="1.5" onclick="setSpeed(1.5)">1.5×</button>
        <button class="cbtn" data-spd="1.75" onclick="setSpeed(1.75)">1.75×</button>
        <button class="cbtn" data-spd="2.0" onclick="setSpeed(2.0)">2.0×</button>
      </div>
    </div>
    <div class="srow" style="flex-direction:column;align-items:stretch;gap:10px;">
      <div class="slabel">定時關閉</div>
      <div class="timer-wrap">
        <div class="timer-disp" id="timer-disp">未啟動</div>
        <input type="range" class="timer-slider" id="timer-slider" min="1" max="20" value="10" oninput="previewTimer(this.value)">
        <div class="timer-labels"><span>1分</span><span>10分</span><span>20分</span></div>
        <div class="timer-note" id="timer-note">滑動選擇時間，再點啟動</div>
        <div style="display:flex;gap:8px;justify-content:center;">
          <button class="cbtn" onclick="startTimer()">啟動定時</button>
          <button class="timer-cancel" id="timer-cancel" onclick="cancelTimer()">取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="panel" id="panel-settings">
  <div class="panel-handle"></div>
  <div class="panel-title">閱讀設定<span class="panel-close" onclick="closeAllPanels()">✕</span></div>
  <div class="panel-body">
    <div class="srow">
      <div class="slabel">主題</div>
      <div class="btnrow">
        <button class="cbtn active" data-theme-btn="day" onclick="setTheme('day')">日間</button>
        <button class="cbtn" data-theme-btn="night" onclick="setTheme('night')">夜間</button>
        <button class="cbtn" data-theme-btn="eye" onclick="setTheme('eye')">護眼</button>
      </div>
    </div>
    <div class="srow">
      <div class="slabel">字體</div>
      <div class="btnrow">
        <button class="cbtn active" data-font-btn="serif" onclick="setFont('serif')">宋體</button>
        <button class="cbtn" data-font-btn="sans" onclick="setFont('sans')">黑體</button>
      </div>
    </div>
    <div class="srow">
      <div class="slabel">字體大小</div>
      <div class="szctrl">
        <button class="szbtn" onclick="changeFontSize(-1)">−</button>
        <div class="szval" id="font-size-val">18</div>
        <button class="szbtn" onclick="changeFontSize(1)">＋</button>
      </div>
    </div>
    <div class="srow">
      <div class="slabel">行距</div>
      <div class="btnrow">
        <button class="cbtn" data-lh-btn="1.6" onclick="setLH(1.6)">緊</button>
        <button class="cbtn active" data-lh-btn="2.0" onclick="setLH(2.0)">標準</button>
        <button class="cbtn" data-lh-btn="2.6" onclick="setLH(2.6)">寬</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ══ DB ══
const DBN='ShujuanDB6';let _db;
function openDB(){return new Promise((res,rej)=>{if(_db)return res(_db);const r=indexedDB.open(DBN,1);r.onupgradeneeded=e=>{const d=e.target.result;['books','settings'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id'});});if(!d.objectStoreNames.contains('bms')){const b=d.createObjectStore('bms',{keyPath:'id',autoIncrement:true});b.createIndex('bookId','bookId');}};r.onsuccess=e=>{_db=e.target.result;res(_db);};r.onerror=e=>rej(e);});}
async function dbAdd(store,obj){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction(store,'readwrite').objectStore(store).add(obj);r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbPut(store,obj){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction(store,'readwrite').objectStore(store).put(obj);r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbGet(store,key){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction(store,'readonly').objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbGetAll(store){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction(store,'readonly').objectStore(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=rej;});}
async function dbDel(store,key){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction(store,'readwrite').objectStore(store).delete(key);r.onsuccess=()=>res();r.onerror=rej;});}
async function dbIdx(store,idx,key){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction(store,'readonly').objectStore(store).index(idx).getAll(key);r.onsuccess=()=>res(r.result);r.onerror=rej;});}
// books store uses autoIncrement — patch:
async function addBook(obj){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('books','readwrite').objectStore('books').add(obj);r.onsuccess=()=>res(r.result);r.onerror=rej;});}

// ══ SETTINGS ══
async function loadSettings(){const r=await dbGet('settings','app');return r?r.value:{fontSize:18,lineHeight:2,font:'serif',theme:'day'};}
async function saveSettings(s){await dbPut('settings',{id:'app',value:s});}

// ══ S→T CONVERT (簡→繁 only) ══
// Full Simplified→Traditional table
const S2T_MAP={
  "万":"萬","东":"東","个":"個","来":"來","业":"業","乱":"亂","书":"書","产":"產","从":"從","会":"會",

// ══ TTS ══
const synth=window.speechSynthesis;
let _ttsOn=false,_ttsBusy=false,_ttsIdx=0,_ttsParas=[],_ttsSpeed=1.0;
let _timerInterval=null,_timerSecs=0,_timerPreview=10;

function _bestVoice(){const vs=synth.getVoices();return vs.find(v=>v.lang==='zh-TW'&&v.localService)||vs.find(v=>v.lang.startsWith('zh')&&v.localService)||vs.find(v=>v.lang.startsWith('zh'))||null;}

function _speak(idx){
  if(!_ttsOn)return;
  if(idx>=_ttsParas.length){_stopTTS();document.getElementById('tts-cur').textContent='朗讀完畢';return;}
  if(_ttsBusy)return;
  _ttsBusy=true;synth.cancel();_ttsIdx=idx;
  document.getElementById('tts-play-btn').textContent='⏸';
  document.querySelectorAll('.tts-hl').forEach(e=>e.classList.remove('tts-hl'));
  document.getElementById('tts-cur').textContent=_ttsParas[idx].substring(0,40)+(_ttsParas[idx].length>40?'…':'');
  const u=new SpeechSynthesisUtterance(_ttsParas[idx]);
  u.lang='zh-TW';u.rate=_ttsSpeed;
  const v=_bestVoice();if(v)u.voice=v;
  u.onstart=()=>{_ttsBusy=true;};
  u.onend=()=>{_ttsBusy=false;if(_ttsOn)_speak(idx+1);};
  u.onerror=()=>{_ttsBusy=false;if(_ttsOn)_speak(idx+1);};
  setTimeout(()=>{if(_ttsOn)synth.speak(u);else _ttsBusy=false;},60);
}
function _stopTTS(){_ttsOn=false;_ttsBusy=false;synth.cancel();document.getElementById('tts-play-btn').textContent='▶';}
function toggleTTS(){if(_ttsOn){_stopTTS();}else{_ttsOn=true;_ttsBusy=false;_speak(_ttsIdx);}}
function ttsPrev(){_ttsBusy=false;const i=Math.max(0,_ttsIdx-1);if(_ttsOn){_ttsOn=true;_speak(i);}else _ttsIdx=i;}
function ttsNext(){_ttsBusy=false;if(_ttsOn){_ttsOn=true;_speak(_ttsIdx+1);}else _ttsIdx++;}
function setSpeed(s){_ttsSpeed=s;document.querySelectorAll('[data-spd]').forEach(b=>b.classList.toggle('active',parseFloat(b.dataset.spd)===s));if(_ttsOn){_ttsBusy=false;_ttsOn=true;_speak(_ttsIdx);}}

// Timer
function previewTimer(v){
  _timerPreview=parseInt(v);
  document.getElementById('timer-disp').textContent=`${String(_timerPreview).padStart(2,'0')}:00`;
  document.getElementById('timer-note').textContent=`滑動選擇，目前：${_timerPreview} 分鐘`;
}
function startTimer(){
  cancelTimer();
  _timerSecs=_timerPreview*60;
  document.getElementById('timer-cancel').style.display='';
  _tick();
  _timerInterval=setInterval(_tick,1000);
  showToast(`⏰ 定時 ${_timerPreview} 分鐘已啟動`);
}
function _tick(){
  if(_timerSecs<=0){cancelTimer();_stopTTS();showToast('⏰ 定時結束，聽書已停止');return;}
  const m=Math.floor(_timerSecs/60),s=_timerSecs%60;
  document.getElementById('timer-disp').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  _timerSecs--;
}
function cancelTimer(){if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}document.getElementById('timer-disp').textContent='未啟動';document.getElementById('timer-note').textContent='滑動選擇時間，再點啟動';document.getElementById('timer-cancel').style.display='none';}

// ══ FLIP ══
let _pages=[],_pidx=0,_lines=[];
const CH_RE=/^(第[零一二三四五六七八九十百千万萬\d]+[章节卷集回話话篇]+|Chapter\s*\d+|第\s*\d+\s*章|序章|前言|尾聲|後記|附錄|番外|楔子)/;

function _buildLines(){
  _lines=[];
  App.displayText.split('\n').forEach(line=>{
    const t=line.trim();
    if(t)_lines.push({t,h:CH_RE.test(t)&&t.length<60});
  });
}

function buildFlipPages(){
  const body=document.getElementById('flip-text');
  // Wait until element has real height
  const h=body.clientHeight;
  if(h<50){setTimeout(buildFlipPages,100);return;}
  const fs=App.s.fontSize,lh=App.s.lineHeight;
  const lpp=Math.max(2,Math.floor((h*0.88)/(fs*lh)));
  _pages=[];
  for(let i=0;i<_lines.length;i+=lpp)_pages.push(_lines.slice(i,i+lpp));
  if(!_pages.length)_pages=[[{t:'（無內容）',h:false}]];
  _pidx=0;_renderFlip();
}

function _renderFlip(){
  const pg=_pages[_pidx]||[];
  const ft=document.getElementById('flip-text');
  const ff=App.s.font==='sans'?"'Noto Sans TC',sans-serif":"'Noto Serif TC',serif";
  ft.style.fontSize=App.s.fontSize+'px';
  ft.style.lineHeight=App.s.lineHeight;
  ft.style.fontFamily=ff;
  ft.innerHTML=pg.map((l,i)=>l.h?`<p class="ch-h">${esc(l.t)}</p>`:`<p data-p="${_pidx*100+i}">${esc(l.t)}</p>`).join('');
  const tot=_pages.length,pct=tot>1?Math.round(_pidx/(tot-1)*100):100;
  document.getElementById('flip-pnum').textContent=`${_pidx+1} / ${tot}`;
  document.getElementById('flip-pct-label').textContent=`${pct}%`;
  document.getElementById('flip-prog-fill').style.width=pct+'%';
  _saveProgress(pct);
}

let _spTimer;
function _saveProgress(pct){
  clearTimeout(_spTimer);
  _spTimer=setTimeout(async()=>{
    if(!App.bookId)return;
    const b=await dbGet('books',App.bookId);
    if(b){b.progress=pct;b.lastRead=Date.now();await dbPut('books',b);}
  },900);
}

function flipNext(){if(_pidx<_pages.length-1){_pidx++;_renderFlip();}}
function flipPrev(){if(_pidx>0){_pidx--;_renderFlip();}}

// swipe
let _sx=null;
function initSwipe(){
  const f=document.getElementById('r-flip');
  f.addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;},{passive:true});
  f.addEventListener('touchend',e=>{
    if(_sx===null)return;
    const dx=e.changedTouches[0].clientX-_sx;_sx=null;
    if(Math.abs(dx)>55){dx<0?flipNext():flipPrev();}
  },{passive:true});
}

// ══ INIT ══
async function init(){
  App.s=await loadSettings();
  applySettings();
  await renderLibrary();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  initSwipe();
  previewTimer(10); // init timer display
  document.getElementById('file-input').onchange=async e=>{
    const f=e.target.files[0];if(!f)return;e.target.value='';
    showToast('載入中…');
    const text=await readTxt(f);
    const d=await openDB();
    const id=await new Promise((res,rej)=>{const r=d.transaction('books','readwrite').objectStore('books').add({title:f.name.replace(/\.txt$/i,''),content:text,size:f.size,addedAt:Date.now(),lastRead:Date.now(),progress:0});r.onsuccess=()=>res(r.result);r.onerror=rej;});
    await renderLibrary();showToast('✅ 匯入成功');openBook(id);
  };
}

function readTxt(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const t=e.target.result;if((t.match(/\uFFFD/g)||[]).length>50){const r2=new FileReader();r2.onload=e2=>res(e2.target.result);r2.readAsText(f,'GBK');}else res(t);};r.onerror=rej;r.readAsText(f,'UTF-8');});}

// ══ LIBRARY ══
async function renderLibrary(){
  _allBooks=await dbGetAll('books');
  _allBooks.sort((a,b)=>(b.lastRead||0)-(a.lastRead||0));
  _drawBooks(_allBooks);
}
function _drawBooks(books){
  const list=document.getElementById('book-list');
  const empty=document.getElementById('empty-lib');
  list.innerHTML='';
  empty.style.display=books.length===0?'flex':'none';
  const EM=['📖','📚','📜','📕','📗','📘','📙'];
  books.forEach(b=>{
    let h=0;for(const c of b.title)h=(h*31+c.charCodeAt(0))>>>0;
    const emoji=EM[h%EM.length];
    const pct=b.progress||0;
    const sz=b.size<1048576?(b.size/1024).toFixed(0)+'KB':(b.size/1048576).toFixed(1)+'MB';
    const d=new Date(b.lastRead||b.addedAt);
    const circ=2*Math.PI*14,off=circ*(1-pct/100);
    const row=document.createElement('div');
    row.className='book-row';
    row.innerHTML=`
      <div class="b-thumb" style="background:linear-gradient(135deg,var(--accent),var(--accent-light))">${emoji}</div>
      <div class="b-info"><div class="b-title">${esc(b.title)}</div><div class="b-meta">${sz} · ${d.getMonth()+1}/${d.getDate()}</div></div>
      <svg width="36" height="36" viewBox="0 0 36 36" style="flex-shrink:0">
        <circle cx="18" cy="18" r="14" fill="none" stroke="var(--surface2)" stroke-width="3"/>
        <circle cx="18" cy="18" r="14" fill="none" stroke="var(--accent)" stroke-width="3"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
          transform="rotate(-90 18 18)" stroke-linecap="round"/>
        <text x="18" y="22" text-anchor="middle" style="font-size:8px;fill:var(--text-dim);font-family:sans-serif">${pct}%</text>
      </svg>`;
    row.addEventListener('click',()=>openBook(b.id));
    let pt;
    row.addEventListener('touchstart',()=>{pt=setTimeout(()=>{if(confirm(`刪除「${b.title}」？`))dbDel('books',b.id).then(renderLibrary).then(()=>showToast('已刪除'));},700);},{passive:true});
    row.addEventListener('touchend',()=>clearTimeout(pt),{passive:true});
    row.addEventListener('touchmove',()=>clearTimeout(pt),{passive:true});
    list.appendChild(row);
  });
}
function filterBooks(q){
  document.getElementById('s-clear').style.display=q?'block':'none';
  document.getElementById('no-result').style.display='none';
  if(!q){_drawBooks(_allBooks);return;}
  const f=_allBooks.filter(b=>b.title.includes(q));
  _drawBooks(f);
  document.getElementById('no-result').style.display=f.length===0?'block':'none';
}
function clearSearch(){document.getElementById('search-input').value='';filterBooks('');}

// ══ OPEN BOOK ══
async function openBook(id){
  const b=await dbGet('books',id);if(!b)return;
  App.bookId=id;App.rawText=b.content;App.isConverted=false;App.displayText=b.content;
  _updateConvertBtn();
  _parseBook();
  document.getElementById('r-title').textContent=b.title;
  document.getElementById('page-library').classList.add('hidden');
  document.getElementById('page-reader').classList.remove('hidden');
  hideUI();
  _stopTTS();_ttsIdx=0;_ttsBusy=false;
  document.getElementById('tts-cur').textContent='點擊播放開始聽書';
  // build pages after layout
  setTimeout(()=>{_buildLines();buildFlipPages();},80);
}

function goLibrary(){
  _stopTTS();cancelTimer();
  document.getElementById('page-reader').classList.add('hidden');
  document.getElementById('page-library').classList.remove('hidden');
  renderLibrary();
}

function _parseBook(){
  App.chapters=[];App.paragraphs=[];let pi=0;
  App.displayText.split('\n').forEach(line=>{
    const t=line.trim();if(!t)return;
    if(CH_RE.test(t)&&t.length<60)App.chapters.push({title:t,pi});
    else{App.paragraphs.push(t);pi++;}
  });
  _ttsParas=App.paragraphs;
}

// ══ CONVERT ══
function toggleConvert(){
  App.isConverted=!App.isConverted;
  App.displayText=App.isConverted?s2t(App.rawText):App.rawText;
  _updateConvertBtn();
  _parseBook();
  _buildLines();
  buildFlipPages();
}
function _updateConvertBtn(){
  const btn=document.getElementById('tb-conv');
  document.getElementById('tb-conv-lbl').textContent=App.isConverted?'已轉繁':'簡→繁';
  btn.classList.toggle('active',App.isConverted);
}

function _buildChapterList(){
  const list=document.getElementById('chapter-list');
  if(!App.chapters.length){list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">未偵測到章節標題</div>';return;}
  list.innerHTML=App.chapters.map((ch,i)=>`<div class="ch-item" id="chi-${i}" onclick="jumpCh(${i})">${esc(ch.title)}</div>`).join('');
}
function jumpCh(i){
  const ch=App.chapters[i];
  // find page containing chapter title
  const pi=_pages.findIndex(pg=>pg.some(l=>l.t===ch.title));
  if(pi>=0){_pidx=pi;_renderFlip();}
  document.querySelectorAll('.ch-item').forEach(e=>e.classList.remove('active'));
  const ce=document.getElementById('chi-'+i);if(ce)ce.classList.add('active');
  closeAllPanels();
}

  if(!App.bookId)return;

  if(!bms.length){list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">尚無書籤</div>';return;}

}
function jumpBMPage(pi){_pidx=Math.min(pi,_pages.length-1);_renderFlip();closeAllPanels();}
async function delBM(id){await dbDel('bms',id);_renderBMs();}
async function doAddBookmark(){
  const pct=_pages.length>1?Math.round(_pidx/(_pages.length-1)*100):100;
  const preview=(_pages[_pidx]&&_pages[_pidx][0])?_pages[_pidx][0].t.substring(0,22)+'…':pct+'%';
  await new Promise((res,rej)=>{openDB().then(d=>{const r=d.transaction('bms','readwrite').objectStore('bms').add({bookId:App.bookId,pageIdx:_pidx,progress:pct,preview,createdAt:Date.now()});r.onsuccess=()=>res();r.onerror=rej;});});
  _renderBMs();showToast('🔖 書籤已加入');
}

// ══ SETTINGS ══
function applySettings(){
  document.body.setAttribute('data-theme',App.s.theme);
  document.querySelectorAll('[data-theme-btn]').forEach(b=>b.classList.toggle('active',b.dataset.themeBtn===App.s.theme));
  document.querySelectorAll('[data-font-btn]').forEach(b=>b.classList.toggle('active',b.dataset.fontBtn===App.s.font));
  document.querySelectorAll('[data-lh-btn]').forEach(b=>b.classList.toggle('active',parseFloat(b.dataset.lhBtn)===App.s.lineHeight));
  document.getElementById('font-size-val').textContent=App.s.fontSize;
}
function _rebuildIfOpen(){if(document.getElementById('page-reader')&&!document.getElementById('page-reader').classList.contains('hidden')&&_lines.length)buildFlipPages();}
function changeFontSize(d){App.s.fontSize=Math.max(12,Math.min(32,App.s.fontSize+d));document.getElementById('font-size-val').textContent=App.s.fontSize;_rebuildIfOpen();saveSettings(App.s);}
function setTheme(t){App.s.theme=t;document.body.setAttribute('data-theme',t);document.querySelectorAll('[data-theme-btn]').forEach(b=>b.classList.toggle('active',b.dataset.themeBtn===t));saveSettings(App.s);}
function setFont(f){App.s.font=f;document.querySelectorAll('[data-font-btn]').forEach(b=>b.classList.toggle('active',b.dataset.fontBtn===f));_rebuildIfOpen();saveSettings(App.s);}
function setLH(v){App.s.lineHeight=v;document.querySelectorAll('[data-lh-btn]').forEach(b=>b.classList.toggle('active',parseFloat(b.dataset.lhBtn)===v));_rebuildIfOpen();saveSettings(App.s);}

// ══ PANELS ══
function openPanel(id){
  if(id==='panel-bookmarks')_renderBMs();
  if(id==='panel-chapters')_buildChapterList();
  document.getElementById(id).classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeAllPanels(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));document.getElementById('overlay').classList.remove('open');}

// ══ UTILS ══
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let _toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2400);}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
