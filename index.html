<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="書卷">
<meta name="theme-color" content="#8b5e3c">
<title>書卷 - 純粹閱讀</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap');
:root{
  --bg:#f5f0e8;--surface:#ede7da;--surface2:#e3ddd0;--card:#fff9f0;
  --text:#1e1408;--text-dim:#7a6e5a;--accent:#8b5e3c;--accent-light:#c49a6c;
  --border:#d5cec2;--shadow:rgba(44,30,14,.12);--radius:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="night"]{--bg:#0e0d0a;--surface:#1a1814;--surface2:#222018;--card:#1a1814;--text:#d5c9b5;--text-dim:#665e50;--accent:#c49a6c;--accent-light:#8b5e3c;--border:#2a2820;--shadow:rgba(0,0,0,.6);}
[data-theme="eye"]{--bg:#ccd9b8;--surface:#bfcfaa;--surface2:#b2c49c;--card:#d4e0c0;--text:#182810;--text-dim:#426030;--accent:#3a6820;--accent-light:#5a9040;--border:#a0bc88;--shadow:rgba(20,40,10,.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;position:fixed;width:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;-webkit-font-smoothing:antialiased;transition:background .3s;}
.page{position:fixed;inset:0;display:flex;flex-direction:column;will-change:transform;}
.page.hidden{display:none;}
.lib-header{display:flex;align-items:center;padding:calc(var(--safe-top)+14px) 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0;}
.lib-title{flex:1;font-size:20px;font-weight:500;letter-spacing:3px;color:var(--accent);}
.icon-btn{width:40px;height:40px;border-radius:12px;border:none;background:transparent;color:var(--text-dim);font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.lib-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.add-row{display:flex;align-items:center;gap:14px;padding:20px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--card);}
.add-thumb{width:44px;height:58px;border-radius:8px;border:2px dashed var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;}
.book-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--bg);}
.b-thumb{width:44px;height:58px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:1px 2px 6px var(--shadow);background:var(--accent);color:#fff;}
.b-info{flex:1;min-width:0;}.b-title{font-size:15px;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-meta{font-size:12px;color:var(--text-dim);}
.r-topbar,.r-toolbar{position:absolute;left:0;right:0;z-index:100;background:var(--surface);transition:transform .3s;padding-left:14px;padding-right:14px;}
.r-topbar{top:0;padding-top:calc(var(--safe-top)+10px);padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.r-toolbar{bottom:0;padding-bottom:calc(var(--safe-bottom)+6px);padding-top:6px;border-top:1px solid var(--border);display:flex;justify-content:space-around;}
.ui-hide{transform:translateY(-110%);}
.r-toolbar.ui-hide{transform:translateY(110%);}
.r-book-title{flex:1;font-size:15px;font-weight:500;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.r-flip{position:absolute;inset:0;display:flex;flex-direction:column;padding:calc(var(--safe-top)+20px) 0 calc(var(--safe-bottom)+20px);}
.flip-text{flex:1;padding:20px 24px;overflow:hidden;line-height:2.0;word-break:break-all;}
.flip-text p{margin-bottom:1em;text-indent:2em;}
.flip-footer{padding:0 24px 10px;display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);}
.fz-l,.fz-r,.fz-m{position:absolute;top:0;bottom:0;z-index:10;}
.fz-l{left:0;width:30%;}.fz-r{right:0;width:30%;}.fz-m{left:30%;right:30%;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;opacity:0;transition:0.3s;}
.overlay.open{display:block;opacity:1;}
.panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);z-index:201;transform:translateY(100%);transition:0.3s;border-radius:20px 20px 0 0;padding-bottom:var(--safe-bottom);max-height:80vh;display:flex;flex-direction:column;}
.panel.open{transform:translateY(0);}
.panel-body{overflow-y:auto;padding:20px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 20px;border-radius:20px;z-index:1000;display:none;}
.tts-ctrl{display:flex;justify-content:center;gap:20px;margin-bottom:20px;}
.tts-btn{width:50px;height:50px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;}
.cbtn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;margin:4px;cursor:pointer;color:var(--text);}
</style>
</head>
<body data-theme="day">

<div class="page" id="page-library">
  <div class="lib-header">
    <div class="lib-title">書卷</div>
    <button class="icon-btn" onclick="document.getElementById('file-input').click()">＋</button>
  </div>
  <div class="lib-body">
    <div class="add-row" onclick="document.getElementById('file-input').click()">
      <div class="add-thumb">📄</div>
      <div>
        <div style="font-size:15px;color:var(--accent);font-weight:500;">匯入 TXT 小說</div>
        <div style="font-size:12px;color:var(--text-dim);">支援智慧偵測編碼與進度記憶</div>
      </div>
    </div>
    <div id="book-list"></div>
  </div>
  <input type="file" id="file-input" accept=".txt" style="display:none">
</div>

<div class="page hidden" id="page-reader">
  <div class="r-topbar ui-hide" id="r-topbar">
    <button class="icon-btn" onclick="goLibrary()">‹</button>
    <div class="r-book-title" id="r-title">載入中...</div>
    <button class="icon-btn" onclick="openPanel('panel-settings')">⚙️</button>
  </div>
  <div class="r-flip">
    <div class="fz-l" onclick="flipPrev()"></div>
    <div class="fz-m" onclick="toggleUI()"></div>
    <div class="fz-r" onclick="flipNext()"></div>
    <div class="flip-text" id="flip-text"></div>
    <div class="flip-footer">
      <div id="flip-pnum">0 / 0</div>
      <div id="flip-pct">0%</div>
    </div>
  </div>
  <div class="r-toolbar ui-hide" id="r-toolbar">
    <button class="icon-btn" onclick="openPanel('panel-tts')">🎧 聽書</button>
    <button class="icon-btn" onclick="openPanel('panel-settings')">⚙️ 設定</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanels()"></div>

<div class="panel" id="panel-settings">
  <div class="panel-body">
    <h3 style="margin-bottom:15px">閱讀設定</h3>
    <div style="margin-bottom:20px">
      <p style="font-size:14px;margin-bottom:8px">主題</p>
      <button class="cbtn" onclick="setTheme('day')">日間</button>
      <button class="cbtn" onclick="setTheme('night')">夜間</button>
      <button class="cbtn" onclick="setTheme('eye')">護眼</button>
    </div>
    <div>
      <p style="font-size:14px;margin-bottom:8px">字體大小</p>
      <button class="cbtn" onclick="changeFontSize(-2)">A-</button>
      <span id="fs-label" style="padding:0 15px">18</span>
      <button class="cbtn" onclick="changeFontSize(2)">A+</button>
    </div>
  </div>
</div>

<div class="panel" id="panel-tts">
  <div class="panel-body">
    <h3 style="margin-bottom:15px;text-align:center">聽書控制</h3>
    <div class="tts-ctrl">
      <button class="tts-btn" onclick="ttsPrev()">⏮</button>
      <button class="tts-btn" id="tts-play-btn" onclick="toggleTTS()">▶</button>
      <button class="tts-btn" onclick="ttsNext()">⏭</button>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text-dim)">自動選用 iOS 高品質語音</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ 核心數據與擴充簡轉繁字庫 ══
const DBN = 'ShujuanDB_v3';
let _db, _currentBook = null, _pages = [], _pidx = 0, _fontSize = 18;

// 擴充版常用簡轉繁映射
const S2T_MAP = {"万":"萬","东":"東","个":"個","来":"來","书":"書","产":"產","会":"會","传":"傳","儿":"兒","两":"兩","变":"變","过":"過","进":"進","远":"遠","还":"還","这":"這","们":"們","说":"說","国":"國","学":"學","对":"對","点":"點","头":"頭","面":"面","开":"開","后":"後","发":"發","动":"動","当":"當","车":"車","经":"經","长":"長","见":"見","让":"讓","无":"無","电":"電","义":"義","业":"業","从":"從","给":"給","体":"體","么":"麼","将":"將","应":"應","起":"起","种":"種","法":"法","能":"能","现":"現","理":"理","此":"此","并":"並","位":"位","想":"想","使":"使","身":"身","全":"全","被":"被","而":"而","它":"它","或":"或","且":"且","又":"又","因":"因","很":"很","看":"看","各":"各","去":"去","那":"那","几":"幾","只":"只","没":"沒","虽":"雖","但":"但","要":"要","他":"他","她":"她","着":"著","里":"裡","系":"系","划":"劃","制":"製","筑":"築","复":"複","适":"適","联":"聯","声":"聲","听":"聽","响":"響","语":"語"};

function s2t(str) {
  let r = '';
  for(const c of str) r += S2T_MAP[c] || c;
  return r;
}

// ══ IndexedDB 記憶功能 ══
async function initDB() {
  return new Promise(res => {
    const r = indexedDB.open(DBN, 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      d.createObjectStore('books', {keyPath:'id', autoIncrement:true});
      d.createObjectStore('settings', {keyPath:'key'});
    };
    r.onsuccess = e => { _db = e.target.result; res(); };
  });
}

async function saveState(key, val) {
  const t = _db.transaction('settings','readwrite').objectStore('settings');
  t.put({key, val});
}

async function getState(key) {
  return new Promise(res => {
    const r = _db.transaction('settings').objectStore('settings').get(key);
    r.onsuccess = () => res(r.result ? r.result.val : null);
  });
}

// ══ 智慧編碼偵測與檔案處理 ══
document.getElementById('file-input').onchange = async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  
  showToast("正在偵測編碼並讀取...");
  const reader = new FileReader();
  
  reader.onload = async (evt) => {
    let text = evt.target.result;
    // 檢查亂碼特徵 (UTF-8 錯誤符號)
    if (text.includes('\uFFFD')) {
      const reReader = new FileReader();
      reReader.onload = (reEvt) => processBook(file.name, reEvt.target.result);
      reReader.readAsText(file, "GB18030"); // 嘗試相容簡體編碼
    } else {
      processBook(file.name, text);
    }
  };
  reader.readAsText(file, "UTF-8");
};

async function processBook(name, rawText) {
  showToast("簡轉繁處理中...");
  const t_text = s2t(rawText);
  const id = await addBook({
    title: name.replace('.txt',''),
    content: t_text,
    progress: 0,
    lastDate: Date.now()
  });
  renderLibrary();
  openBook(id);
}

async function addBook(book) {
  return new Promise(res => {
    const r = _db.transaction('books','readwrite').objectStore('books').add(book);
    r.onsuccess = () => res(r.result);
  });
}

// ══ 閱讀與分頁 ══
async function openBook(id) {
  const r = _db.transaction('books').objectStore('books').get(id);
  r.onsuccess = async () => {
    _currentBook = r.result;
    document.getElementById('r-title').textContent = _currentBook.title;
    document.getElementById('page-library').classList.add('hidden');
    document.getElementById('page-reader').classList.remove('hidden');
    
    preparePages(_currentBook.content);
    _pidx = Math.min(_currentBook.progress || 0, _pages.length - 1);
    renderPage();
    saveState('lastBookId', id);
  };
}

function preparePages(content) {
  const size = 500; // 固定字數分頁，確保跨裝置一致
  _pages = [];
  for(let i=0; i<content.length; i+=size) {
    _pages.push(content.substring(i, i+size));
  }
}

function renderPage() {
  if(!_pages[_pidx]) return;
  document.getElementById('flip-text').innerHTML = _pages[_pidx].split('\n').map(p => `<p>${p}</p>`).join('');
  document.getElementById('flip-pnum').textContent = `${_pidx + 1} / ${_pages.length}`;
  document.getElementById('flip-pct').textContent = `${Math.floor((_pidx / _pages.length) * 100)}%`;
  
  if(_currentBook) {
    _currentBook.progress = _pidx;
    _currentBook.lastDate = Date.now();
    _db.transaction('books','readwrite').objectStore('books').put(_currentBook);
  }
}

function flipNext() { if(_pidx < _pages.length - 1) { _pidx++; renderPage(); if(_isTtsPlaying) speakCurrent(); } }
function flipPrev() { if(_pidx > 0) { _pidx--; renderPage(); if(_isTtsPlaying) speakCurrent(); } }

// ══ 聽書 (iOS 自然語音優選) ══
const synth = window.speechSynthesis;
let _isTtsPlaying = false;

function toggleTTS() {
  if(_isTtsPlaying) {
    synth.cancel();
    _isTtsPlaying = false;
    document.getElementById('tts-play-btn').textContent = "▶";
  } else {
    speakCurrent();
  }
}

function speakCurrent() {
  synth.cancel();
  const ut = new SpeechSynthesisUtterance(_pages[_pidx]);
  const voices = synth.getVoices();
  // 優先選取 iOS 高品質中文語音
  const premium = voices.find(v => (v.name.includes('Premium') || v.name.includes('Enhanced')) && v.lang.includes('zh-TW'));
  if(premium) ut.voice = premium;
  ut.lang = 'zh-TW';
  ut.onend = () => { if(_isTtsPlaying) flipNext(); };
  _isTtsPlaying = true;
  document.getElementById('tts-play-btn').textContent = "⏸";
  synth.speak(ut);
}

// ══ UI 與環境 ══
function toggleUI() {
  const isHidden = document.getElementById('r-topbar').classList.contains('ui-hide');
  document.getElementById('r-topbar').classList.toggle('ui-hide', !isHidden);
  document.getElementById('r-toolbar').classList.toggle('ui-hide', !isHidden);
}

function goLibrary() {
  synth.cancel();
  _isTtsPlaying = false;
  document.getElementById('page-reader').classList.add('hidden');
  document.getElementById('page-library').classList.remove('hidden');
  renderLibrary();
}

async function renderLibrary() {
  const list = document.getElementById('book-list');
  list.innerHTML = '';
  _db.transaction('books').objectStore('books').openCursor(null, 'prev').onsuccess = (e) => {
    const c = e.target.result;
    if(c) {
      const b = c.value;
      const row = document.createElement('div');
      row.className = 'book-row';
      row.innerHTML = `<div class="b-thumb">📖</div><div class="b-info"><div class="b-title">${b.title}</div><div class="b-meta">進度：${Math.floor((b.progress/(_pages.length||1))*100)}%</div></div>`;
      row.onclick = () => openBook(b.id);
      list.appendChild(row);
      c.continue();
    }
  };
}

window.onload = async () => {
  await initDB();
  renderLibrary();
  const theme = await getState('theme') || 'day';
  const fs = await getState('fontSize') || 18;
  setTheme(theme);
  _fontSize = fs;
  document.getElementById('flip-text').style.fontSize = _fontSize + 'px';
  document.getElementById('fs-label').textContent = _fontSize;
};

function setTheme(t) {
  document.body.setAttribute('data-theme', t);
  saveState('theme', t);
}

function changeFontSize(n) {
  _fontSize += n;
  document.getElementById('flip-text').style.fontSize = _fontSize + 'px';
  document.getElementById('fs-label').textContent = _fontSize;
  saveState('fontSize', _fontSize);
}

function openPanel(id) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById(id).classList.add('open');
}

function closePanels() {
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>
