<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="書卷">
<meta name="theme-color" content="#8b5e3c">
<title>書卷 · TXT 閱讀器</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --bg:#f7f2ea;--surface:#ede7da;--surface2:#e3ddd0;--card:#fff9f0;
  --text:#2a1f0e;--text-dim:#7a6e5a;--accent:#8b5e3c;--accent-light:#c49a6c;
  --border:#d5cec2;--shadow:rgba(44,30,14,.10);--radius:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="night"]{--bg:#111009;--surface:#1c1a14;--surface2:#252118;--card:#1c1a14;--text:#d8ccb8;--text-dim:#6a6050;--accent:#c49a6c;--accent-light:#8b5e3c;--border:#2c2820;--shadow:rgba(0,0,0,.5);}
[data-theme="eye"]{--bg:#d0e0c0;--surface:#c2d4b0;--surface2:#b4c8a0;--card:#d8e8c8;--text:#1a2810;--text-dim:#4a6030;--accent:#3a6820;--accent-light:#6a9840;--border:#a8c090;--shadow:rgba(20,40,10,.10);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;height:100vh;height:-webkit-fill-available;overflow:hidden;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;}
.page{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;}
.page.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
.page.slide-left{transform:translateX(-30%);opacity:0;pointer-events:none;}

/* ── LIBRARY ── */
#page-library{background:var(--bg);}
.lib-nav{display:flex;align-items:center;padding:calc(var(--safe-top) + 12px) 16px 10px;background:var(--surface);border-bottom:1px solid var(--border);gap:10px;flex-shrink:0;}
.lib-title{font-size:20px;font-weight:500;letter-spacing:3px;color:var(--accent);flex:1;}
.nav-btn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;color:var(--text-dim);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0;}
.nav-btn:active{background:var(--surface2);}

/* Search bar */
.search-wrap{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.search-box{display:flex;align-items:center;background:var(--surface2);border-radius:10px;padding:8px 12px;gap:8px;}
.search-box input{flex:1;border:none;background:transparent;color:var(--text);font-size:15px;font-family:'Noto Serif TC',serif;outline:none;}
.search-box input::placeholder{color:var(--text-dim);}
.search-clear{font-size:14px;color:var(--text-dim);cursor:pointer;display:none;}

/* Book list */
.library-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.upload-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface);transition:background .15s;}
.upload-row:active{background:var(--surface2);}
.upload-icon-wrap{width:44px;height:58px;border-radius:8px;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.upload-row-text{font-size:14px;color:var(--accent);font-weight:500;}
.upload-row-sub{font-size:12px;color:var(--text-dim);margin-top:2px;}

.book-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.book-row:active{background:var(--surface2);}
.book-thumb{width:44px;height:58px;border-radius:8px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-light) 100%);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;box-shadow:2px 2px 6px var(--shadow);}
.book-thumb-inner{font-size:22px;}
.book-info{flex:1;min-width:0;}
.book-row-title{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.book-row-meta{font-size:12px;color:var(--text-dim);}
/* Progress circle */
.progress-circle-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;}
.progress-circle{width:36px;height:36px;}
.progress-circle circle{fill:none;stroke-width:3;stroke-linecap:round;}
.pc-bg{stroke:var(--surface2);}
.pc-fill{stroke:var(--accent);transition:stroke-dashoffset .4s;}
.progress-pct-label{font-size:10px;color:var(--text-dim);}
/* swipe-to-delete hint */
.book-row-del{position:absolute;right:0;top:0;bottom:0;width:72px;background:#e05555;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;border-radius:0 0 0 0;opacity:0;pointer-events:none;transition:opacity .2s;}

.empty-library{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center;}
.empty-library .icon{font-size:56px;opacity:.4;}
.empty-library .title{font-size:16px;color:var(--text-dim);letter-spacing:1px;}
.empty-library .hint{font-size:13px;color:var(--text-dim);opacity:.7;}

/* ── READER NAV ── */
.reader-nav{display:flex;align-items:center;padding:calc(var(--safe-top) + 10px) 12px 10px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0;transition:opacity .3s,transform .3s;}
.reader-nav.hidden-ui{opacity:0;transform:translateY(-100%);pointer-events:none;}
.reader-nav-title{flex:1;font-size:15px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.convert-pill{font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;transition:all .15s;white-space:nowrap;}
.convert-pill.active{background:var(--accent);border-color:var(--accent);color:white;}

/* ── SCROLL MODE ── */
.reader-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px;scroll-behavior:smooth;}
.reader-content{max-width:640px;margin:0 auto;font-size:18px;line-height:2;letter-spacing:.05em;color:var(--text);}
.reader-content p{margin-bottom:.6em;text-indent:2em;word-break:break-all;}
.reader-content .ch-title{font-size:1.05em;font-weight:500;color:var(--accent);text-indent:0;margin:2em 0 1em;border-left:3px solid var(--accent);padding-left:12px;}
.reader-content .tts-highlight{background:rgba(196,154,108,.28);border-radius:3px;}

/* ── FLIP MODE ── */
.flip-wrap{flex:1;display:none;flex-direction:column;overflow:hidden;}
.flip-wrap.active{display:flex;}
.flip-body{flex:1;overflow:hidden;padding:24px 20px;font-size:18px;line-height:2;letter-spacing:.05em;color:var(--text);}
.flip-body p{margin-bottom:.6em;text-indent:2em;word-break:break-all;}
.flip-body .ch-title{font-size:1.05em;font-weight:500;color:var(--accent);text-indent:0;margin:1em 0 .8em;border-left:3px solid var(--accent);padding-left:12px;}
.flip-nav-row{display:flex;align-items:center;justify-content:space-between;padding:8px 24px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.flip-arrow{width:44px;height:44px;border-radius:50%;border:none;background:var(--surface2);color:var(--text);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.flip-arrow:active{background:var(--accent);color:white;}
.flip-page-num{font-size:12px;color:var(--text-dim);}

/* ── BOTTOM BAR ── */
.reader-bottom{background:var(--surface);border-top:1px solid var(--border);padding:10px 16px calc(var(--safe-bottom) + 10px);flex-shrink:0;transition:opacity .3s,transform .3s;}
.reader-bottom.hidden-ui{opacity:0;transform:translateY(100%);pointer-events:none;}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.progress-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.progress-thumb{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:2px;transition:width .3s;}
.prog-pct{font-size:11px;color:var(--text-dim);width:32px;text-align:right;}
.tts-row{display:flex;align-items:center;gap:8px;}
.tts-info{flex:1;font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tts-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-dim);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.tts-btn:active{background:var(--border);}
.tts-btn.play{width:44px;height:44px;background:var(--accent);color:white;font-size:18px;}
.tts-speed{font-size:11px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:5px 10px;cursor:pointer;}

/* ── DRAWERS ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:78vh;display:flex;flex-direction:column;padding-bottom:var(--safe-bottom);}
.drawer.open{transform:translateY(0);}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.drawer-title{font-size:15px;font-weight:500;letter-spacing:2px;color:var(--text);padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.drawer-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:14px;color:var(--text-dim);white-space:nowrap;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}
.choice-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-family:'Noto Serif TC',serif;cursor:pointer;transition:all .15s;}
.choice-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
.size-control{display:flex;align-items:center;gap:10px;}
.size-val{font-size:13px;color:var(--text);width:28px;text-align:center;}
.size-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.chapter-item{padding:12px 4px 12px 10px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text-dim);cursor:pointer;border-left:3px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chapter-item:last-child{border-bottom:none;}
.chapter-item:active{background:var(--surface2);}
.chapter-item.active{color:var(--accent);border-left-color:var(--accent);}
.bm-item{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--border);gap:10px;}
.bm-item:last-child{border-bottom:none;}
.bm-info{flex:1;cursor:pointer;}
.bm-preview{font-size:13px;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bm-meta{font-size:11px;color:var(--text-dim);}
.bm-del{font-size:16px;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:4px;}

.toast{position:fixed;bottom:calc(var(--safe-bottom) + 90px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.75);color:white;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .25s,transform .25s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>
<body data-theme="day">

<!-- ══ LIBRARY ══ -->
<div class="page" id="page-library">
  <div class="lib-nav">
    <div class="lib-title">書　卷</div>
    <button class="nav-btn" onclick="document.getElementById('file-input').click()" title="匯入">＋</button>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span style="font-size:15px;color:var(--text-dim)">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋書名…" oninput="filterBooks(this.value)">
      <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
    </div>
  </div>
  <div class="library-scroll" id="library-scroll">
    <div class="upload-row" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon-wrap">📄</div>
      <div>
        <div class="upload-row-text">匯入 TXT 小說</div>
        <div class="upload-row-sub">點擊選擇檔案</div>
      </div>
    </div>
    <div id="book-list"></div>
    <div class="empty-library" id="empty-library" style="display:none">
      <div class="icon">📚</div>
      <div class="title">書庫空空如也</div>
      <div class="hint">點擊上方「匯入 TXT 小說」開始</div>
    </div>
    <div id="no-results" style="display:none;padding:30px;text-align:center;color:var(--text-dim);font-size:14px">找不到符合的書籍</div>
  </div>
  <input type="file" id="file-input" accept=".txt" style="display:none">
</div>

<!-- ══ READER ══ -->
<div class="page hidden" id="page-reader">
  <div class="reader-nav">
    <button class="nav-btn" onclick="showPage('library')">‹</button>
    <div class="reader-nav-title" id="reader-title">書名</div>
    <button class="convert-pill" id="convert-pill" onclick="toggleConvert()">繁→簡</button>
    <button class="nav-btn" onclick="openDrawer('chapters-drawer')">☰</button>
    <button class="nav-btn" onclick="openDrawer('settings-drawer')">⚙</button>
  </div>
  <div class="reader-scroll" id="reader-scroll" onscroll="updateProgress()">
    <div class="reader-content" id="reader-content"></div>
  </div>
  <div class="flip-wrap" id="flip-wrap">
    <div class="flip-body" id="flip-body"></div>
    <div class="flip-nav-row">
      <button class="flip-arrow" onclick="flipPrev()">‹</button>
      <div class="flip-page-num" id="flip-page-num">1 / 1</div>
      <button class="flip-arrow" onclick="flipNext()">›</button>
    </div>
  </div>
  <div class="reader-bottom" id="reader-bottom">
    <div class="progress-row">
      <div class="progress-track"><div class="progress-thumb" id="progress-fill" style="width:0%"></div></div>
      <div class="prog-pct" id="progress-pct">0%</div>
    </div>
    <div class="tts-row">
      <button class="tts-btn" onclick="ttsPrev()">⏮</button>
      <button class="tts-btn play" id="tts-play" onclick="toggleTTS()">▶</button>
      <button class="tts-btn" onclick="ttsNext()">⏭</button>
      <div class="tts-info" id="tts-info">點擊播放開始聽書</div>
      <div class="tts-speed" id="tts-speed" onclick="ttsSpeed()">1.0×</div>
      <button class="tts-btn" onclick="doAddBookmark()">🔖</button>
      <button class="tts-btn" onclick="openDrawer('bookmarks-drawer')">📋</button>
    </div>
  </div>
</div>

<!-- ══ DRAWERS ══ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeAllDrawers()"></div>
<div class="drawer" id="chapters-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">目　錄</div>
  <div class="drawer-body"><div id="chapter-list"></div></div>
</div>
<div class="drawer" id="bookmarks-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">書　籤</div>
  <div class="drawer-body"><div id="bookmark-list"></div></div>
</div>
<div class="drawer" id="settings-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">閱讀設定</div>
  <div class="drawer-body">
    <div class="setting-row">
      <div class="setting-label">主題</div>
      <div class="btn-row">
        <button class="choice-btn active" data-theme-btn="day" onclick="setTheme('day')">日間</button>
        <button class="choice-btn" data-theme-btn="night" onclick="setTheme('night')">夜間</button>
        <button class="choice-btn" data-theme-btn="eye" onclick="setTheme('eye')">護眼</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">字體</div>
      <div class="btn-row">
        <button class="choice-btn active" data-font-btn="serif" onclick="setFont('serif')">宋體</button>
        <button class="choice-btn" data-font-btn="sans" onclick="setFont('sans')">黑體</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">字體大小</div>
      <div class="size-control">
        <button class="size-btn" onclick="changeFontSize(-1)">−</button>
        <div class="size-val" id="font-size-val">18</div>
        <button class="size-btn" onclick="changeFontSize(1)">＋</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">行距</div>
      <div class="btn-row">
        <button class="choice-btn" onclick="setLineHeight(1.6)">緊</button>
        <button class="choice-btn active" onclick="setLineHeight(2.0)">標準</button>
        <button class="choice-btn" onclick="setLineHeight(2.6)">寬</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">閱讀模式</div>
      <div class="btn-row">
        <button class="choice-btn active" data-mode-btn="scroll" onclick="setReadMode('scroll')">滑動</button>
        <button class="choice-btn" data-mode-btn="flip" onclick="setReadMode('flip')">翻頁</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
// ══ DB ══
const DB_NAME='ShujuanDB',DB_VER=1;let _db;
function openDB(){return new Promise((res,rej)=>{if(_db)return res(_db);const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('books'))d.createObjectStore('books',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});if(!d.objectStoreNames.contains('bookmarks')){const b=d.createObjectStore('bookmarks',{keyPath:'id',autoIncrement:true});b.createIndex('bookId','bookId',{unique:false});}};r.onsuccess=e=>{_db=e.target.result;res(_db);};r.onerror=()=>rej(r.error);});}
async function saveBook(title,content,size){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('books','readwrite').objectStore('books').add({title,content,size,addedAt:Date.now(),lastRead:Date.now(),progress:0,scrollPos:0});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function getAllBooks(){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('books','readonly').objectStore('books').getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function getBook(id){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('books','readonly').objectStore('books').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function updateBookProgress(id,sp,pct){const d=await openDB();const b=await getBook(id);if(!b)return;b.scrollPos=sp;b.progress=pct;b.lastRead=Date.now();return new Promise((res,rej)=>{const r=d.transaction('books','readwrite').objectStore('books').put(b);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
async function deleteBook(id){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('books','readwrite').objectStore('books').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
async function saveSetting(key,value){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('settings','readwrite').objectStore('settings').put({key,value});r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
async function getSetting(key,def=null){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('settings','readonly').objectStore('settings').get(key);r.onsuccess=()=>res(r.result?r.result.value:def);r.onerror=()=>rej(r.error);});}
async function addBM(bookId,sp,pct,preview){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('bookmarks','readwrite').objectStore('bookmarks').add({bookId,scrollPos:sp,progress:pct,preview,createdAt:Date.now()});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function getBookmarks(bookId){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('bookmarks','readonly').objectStore('bookmarks').index('bookId').getAll(bookId);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function deleteBM(id){const d=await openDB();return new Promise((res,rej)=>{const r=d.transaction('bookmarks','readwrite').objectStore('bookmarks').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

const S2T={};for(const[t,s]of Object.entries(T2S)){if(!S2T[s])S2T[s]=t;}
function toSimplified(t){return t.split('').map(c=>T2S[c]||c).join('');}
function toTraditional(t){return t.split('').map(c=>S2T[c]||c).join('');}

// ══ TTS ══
const synth=window.speechSynthesis;
const SPEEDS=[0.7,1.0,1.25,1.5,1.75,2.0];
let _speedIdx=1,_ttsActive=false,_ttsIdx=0,_paras=[],_speaking=false;
function _getBestVoice(){const all=synth.getVoices();return all.find(v=>v.lang==='zh-TW'&&v.localService)||all.find(v=>v.lang.startsWith('zh')&&v.localService)||all.find(v=>v.lang.startsWith('zh'))||null;}
function _speak(idx){
  if(!_ttsActive)return;
  if(idx>=_paras.length){_stopTTS();document.getElementById('tts-info').textContent='朗讀完畢';return;}
  if(_speaking)return;
  _speaking=true;synth.cancel();_ttsIdx=idx;
  document.getElementById('tts-play').textContent='⏸';
  document.querySelectorAll('.tts-highlight').forEach(e=>e.classList.remove('tts-highlight'));
  const el=document.querySelector(`[data-p="${idx}"]`);
  if(el){el.classList.add('tts-highlight');el.scrollIntoView({behavior:'smooth',block:'center'});document.getElementById('tts-info').textContent=el.textContent.substring(0,30)+'…';}
  const u=new SpeechSynthesisUtterance(_paras[idx]);
  u.lang='zh-TW';u.rate=SPEEDS[_speedIdx];
  const v=_getBestVoice();if(v)u.voice=v;
  u.onstart=()=>{_speaking=true;};
  u.onend=()=>{_speaking=false;if(_ttsActive)_speak(idx+1);};
  u.onerror=()=>{_speaking=false;if(_ttsActive)_speak(idx+1);};
  setTimeout(()=>synth.speak(u),50);
}
function _stopTTS(){_ttsActive=false;_speaking=false;synth.cancel();document.getElementById('tts-play').textContent='▶';document.querySelectorAll('.tts-highlight').forEach(e=>e.classList.remove('tts-highlight'));}
function toggleTTS(){if(!_paras.length)return;if(_ttsActive){_stopTTS();}else{_ttsActive=true;_speaking=false;_speak(_ttsIdx);}}
function ttsPrev(){_speaking=false;const i=Math.max(0,_ttsIdx-1);if(_ttsActive){_ttsActive=true;_speak(i);}else _ttsIdx=i;}
function ttsNext(){_speaking=false;if(_ttsActive){_ttsActive=true;_speak(_ttsIdx+1);}else _ttsIdx++;}
function ttsSpeed(){_speedIdx=(_speedIdx+1)%SPEEDS.length;document.getElementById('tts-speed').textContent=SPEEDS[_speedIdx]+'×';if(_ttsActive){_speaking=false;_ttsActive=true;_speak(_ttsIdx);}}

// ══ FLIP ══
let _flipPages=[],_flipIdx=0;
function CH_RE(){return /^(第[零一二三四五六七八九十百千万萬\d]+[章节卷集回話话篇]+|Chapter\s*\d+|第\s*\d+\s*章|序章|前言|尾聲|後記|附錄|番外|楔子)/;}
function buildFlipPages(){
  const body=document.getElementById('flip-body');
  const fs=App.settings.fontSize,lh=App.settings.lineHeight;
  const linesPerPage=Math.max(3,Math.floor((body.clientHeight*0.88)/(fs*lh)));
  const re=CH_RE();
  const allLines=[];
  App.displayText.split('\n').forEach(line=>{const t=line.trim();if(t)allLines.push({text:t,isTitle:re.test(t)&&t.length<60});});
  _flipPages=[];
  for(let i=0;i<allLines.length;i+=linesPerPage)_flipPages.push(allLines.slice(i,i+linesPerPage));
  if(!_flipPages.length)_flipPages=[[{text:'（無內容）',isTitle:false}]];
  _flipIdx=0;renderFlipPage();
}
function renderFlipPage(){
  if(!_flipPages.length)return;
  const body=document.getElementById('flip-body');
  const ff=App.settings.font==='sans'?"'Noto Sans TC',sans-serif":"'Noto Serif TC',serif";
  body.style.cssText=`font-size:${App.settings.fontSize}px;line-height:${App.settings.lineHeight};font-family:${ff};`;
  body.innerHTML=_flipPages[_flipIdx].map(l=>l.isTitle?`<p class="ch-title">${esc(l.text)}</p>`:`<p>${esc(l.text)}</p>`).join('');
  document.getElementById('flip-page-num').textContent=`${_flipIdx+1} / ${_flipPages.length}`;
  const pct=_flipPages.length>1?Math.round(_flipIdx/(_flipPages.length-1)*100):100;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
}
function flipNext(){if(_flipIdx<_flipPages.length-1){_flipIdx++;renderFlipPage();}}
function flipPrev(){if(_flipIdx>0){_flipIdx--;renderFlipPage();}}
let _swipeX=null;
function initSwipe(){
  const fw=document.getElementById('flip-wrap');
  fw.addEventListener('touchstart',e=>{_swipeX=e.touches[0].clientX;},{passive:true});
  fw.addEventListener('touchend',e=>{if(_swipeX===null)return;const dx=e.changedTouches[0].clientX-_swipeX;_swipeX=null;if(Math.abs(dx)>50){dx<0?flipNext():flipPrev();}},{passive:true});
}
function setReadMode(mode){
  App.settings.readMode=mode;
  const isFlip=mode==='flip';
  document.getElementById('reader-scroll').style.display=isFlip?'none':'';
  document.getElementById('flip-wrap').classList.toggle('active',isFlip);
  document.querySelectorAll('[data-mode-btn]').forEach(b=>b.classList.toggle('active',b.dataset.modeBtn===mode));
  if(isFlip&&App.displayText)setTimeout(buildFlipPages,80);
  saveSetting('appSettings',App.settings);
}

// ══ APP ══
const App={currentBookId:null,rawText:'',displayText:'',paragraphs:[],chapters:[],isConverted:false,
  settings:{fontSize:18,lineHeight:2,font:'serif',theme:'day',readMode:'scroll'}};
let _allBooks=[];

// ══ PROGRESS CIRCLE ══
function makeCircleSVG(pct){
  const r=15,c=18,circ=2*Math.PI*r;
  const offset=circ*(1-pct/100);
  return `<svg class="progress-circle" viewBox="0 0 36 36">
    <circle class="pc-bg" cx="${c}" cy="${c}" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="0"/>
    <circle class="pc-fill" cx="${c}" cy="${c}" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      transform="rotate(-90 ${c} ${c})"/>
    <text x="${c}" y="${c}" text-anchor="middle" dominant-baseline="central"
      style="font-size:8px;fill:var(--text-dim);font-family:sans-serif">${pct}%</text>
  </svg>`;
}

// ══ INIT ══
async function init(){
  const s=await getSetting('appSettings',null);
  if(s)App.settings={...App.settings,...s};
  applySettings();
  await renderLibrary();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
  initSwipe();
  document.getElementById('file-input').onchange=async e=>{
    const file=e.target.files[0];if(!file)return;e.target.value='';
    showToast('載入中…');
    const text=await readFileText(file);
    const id=await saveBook(file.name.replace(/\.txt$/i,''),text,file.size);
    await renderLibrary();showToast('✅ 匯入成功');openBook(id);
  };
  document.getElementById('reader-scroll').addEventListener('click',e=>{
    if(e.target.tagName==='P'){uiVisible=!uiVisible;document.querySelector('.reader-nav').classList.toggle('hidden-ui',!uiVisible);document.getElementById('reader-bottom').classList.toggle('hidden-ui',!uiVisible);}
  });
}

function readFileText(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{const text=e.target.result;const rep=(text.match(/\uFFFD/g)||[]).length;if(rep>50){const r2=new FileReader();r2.onload=e2=>res(e2.target.result);r2.onerror=()=>res(text);r2.readAsText(file,'GBK');}else res(text);};
    r.onerror=()=>rej(r.error);r.readAsText(file,'UTF-8');
  });
}

// ══ LIBRARY ══
async function renderLibrary(){
  _allBooks=await getAllBooks();
  // sort by lastRead desc
  _allBooks.sort((a,b)=>(b.lastRead||0)-(a.lastRead||0));
  renderBookList(_allBooks);
}

function renderBookList(books){
  const list=document.getElementById('book-list');
  const empty=document.getElementById('empty-library');
  list.innerHTML='';
  empty.style.display=books.length===0?'flex':'none';
  const emojis=['📖','📚','📜','📕','📗','📘','📙'];
  books.forEach(book=>{
    let h=0;for(const c of book.title)h=(h*31+c.charCodeAt(0))&0xffffff;
    const emoji=emojis[Math.abs(h)%emojis.length];
    const pct=book.progress||0;
    const sz=book.size<1024*1024?(book.size/1024).toFixed(0)+'KB':(book.size/1024/1024).toFixed(1)+'MB';
    const d=new Date(book.lastRead||book.addedAt);
    const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
    const row=document.createElement('div');
    row.className='book-row';
    row.innerHTML=`
      <div class="book-thumb"><div class="book-thumb-inner">${emoji}</div></div>
      <div class="book-info">
        <div class="book-row-title">${esc(book.title)}</div>
        <div class="book-row-meta">${sz} · ${dateStr}</div>
      </div>
      <div class="progress-circle-wrap">
        ${makeCircleSVG(pct)}
      </div>`;
    row.onclick=()=>openBook(book.id);
    // long press to delete
    let pressTimer;
    row.addEventListener('touchstart',()=>{pressTimer=setTimeout(()=>{if(confirm(`刪除「${book.title}」？`)){deleteBook(book.id).then(renderLibrary).then(()=>showToast('已刪除'));}},700);},{passive:true});
    row.addEventListener('touchend',()=>clearTimeout(pressTimer),{passive:true});
    row.addEventListener('touchmove',()=>clearTimeout(pressTimer),{passive:true});
    list.appendChild(row);
  });
}

// ══ SEARCH ══
function filterBooks(q){
  const clear=document.getElementById('search-clear');
  const noRes=document.getElementById('no-results');
  clear.style.display=q?'block':'none';
  if(!q){renderBookList(_allBooks);noRes.style.display='none';return;}
  const filtered=_allBooks.filter(b=>b.title.includes(q));
  renderBookList(filtered);
  noRes.style.display=filtered.length===0?'block':'none';
}
function clearSearch(){document.getElementById('search-input').value='';filterBooks('');document.getElementById('search-input').blur();}

// ══ OPEN BOOK ══
async function openBook(id){
  const book=await getBook(id);if(!book)return;
  App.currentBookId=id;App.rawText=book.content;App.isConverted=false;App.displayText=book.content;
  document.getElementById('convert-pill').textContent='繁→簡';
  document.getElementById('convert-pill').classList.remove('active');
  parseBook();renderReader();
  document.getElementById('reader-title').textContent=book.title;
  showPage('reader');
  _stopTTS();_ttsIdx=0;_speaking=false;
  document.getElementById('tts-info').textContent='點擊播放開始聽書';
  setTimeout(()=>{if(App.settings.readMode!=='flip')document.getElementById('reader-scroll').scrollTop=book.scrollPos||0;},150);
}

function parseBook(){
  const re=CH_RE();App.chapters=[];App.paragraphs=[];let pi=0;
  App.displayText.split('\n').forEach((line,li)=>{const t=line.trim();if(!t)return;if(re.test(t)&&t.length<60){App.chapters.push({title:t,paraIdx:pi});}else{App.paragraphs.push(t);pi++;}});
  _paras=App.paragraphs;
}

function renderReader(){
  const re=CH_RE();let html='',pi=0;
  App.displayText.split('\n').forEach(line=>{const t=line.trim();if(!t)return;if(re.test(t)&&t.length<60){html+=`<p class="ch-title">${esc(t)}</p>`;}else{html+=`<p data-p="${pi}">${esc(t)}</p>`;pi++;}});
  document.getElementById('reader-content').innerHTML=html;
  applySettings();buildChapterList();renderBMs();updateProgress();
  setReadMode(App.settings.readMode||'scroll');
}

function buildChapterList(){
  const list=document.getElementById('chapter-list');
  if(!App.chapters.length){list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">未偵測到章節標題</div>';return;}
  list.innerHTML=App.chapters.map((ch,i)=>`<div class="chapter-item" id="ch-${i}" onclick="jumpCh(${i})">${esc(ch.title)}</div>`).join('');
}
function jumpCh(idx){
  const ch=App.chapters[idx];
  if(App.settings.readMode==='flip'){const pi=_flipPages.findIndex(pg=>pg.some(l=>l.text===ch.title));if(pi>=0){_flipIdx=pi;renderFlipPage();}}
  else{const el=document.querySelector(`[data-p="${ch.paraIdx}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
  document.querySelectorAll('.chapter-item').forEach(e=>e.classList.remove('active'));
  const ce=document.getElementById('ch-'+idx);if(ce)ce.classList.add('active');
  closeAllDrawers();
}

async function renderBMs(){
  if(!App.currentBookId)return;
  const bms=await getBookmarks(App.currentBookId);
  const list=document.getElementById('bookmark-list');
  if(!bms.length){list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">尚無書籤</div>';return;}
  list.innerHTML=bms.map(bm=>`<div class="bm-item"><div class="bm-info" onclick="jumpBM(${bm.scrollPos})"><div class="bm-preview">${esc(bm.preview)}</div><div class="bm-meta">${bm.progress}% · ${new Date(bm.createdAt).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div><button class="bm-del" onclick="removeBM(${bm.id})">🗑</button></div>`).join('');
}
function jumpBM(sp){document.getElementById('reader-scroll').scrollTop=sp;closeAllDrawers();}
async function removeBM(id){await deleteBM(id);renderBMs();}
async function doAddBookmark(){
  const a=document.getElementById('reader-scroll');
  const sp=a.scrollTop,total=a.scrollHeight-a.clientHeight,pct=total>0?Math.round(sp/total*100):0;
  const els=document.elementsFromPoint(window.innerWidth/2,window.innerHeight/2);
  const pe=els.find(e=>e.tagName==='P'&&e.dataset.p!==undefined);
  await addBM(App.currentBookId,sp,pct,pe?pe.textContent.substring(0,20)+'…':pct+'%');
  renderBMs();showToast('🔖 已加入書籤');
}

let _progTimer;
function updateProgress(){
  const a=document.getElementById('reader-scroll');if(!a)return;
  const sp=a.scrollTop,total=a.scrollHeight-a.clientHeight,pct=total>0?Math.round(sp/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  clearTimeout(_progTimer);_progTimer=setTimeout(async()=>{if(App.currentBookId)await updateBookProgress(App.currentBookId,sp,pct);},800);
}

function toggleConvert(){
  const pill=document.getElementById('convert-pill');
  App.isConverted=!App.isConverted;
  const sp=document.getElementById('reader-scroll').scrollTop;
  App.displayText=App.isConverted?toSimplified(App.rawText):App.rawText;
  pill.textContent=App.isConverted?'簡→繁':'繁→簡';
  pill.classList.toggle('active',App.isConverted);
  parseBook();renderReader();setTimeout(()=>{document.getElementById('reader-scroll').scrollTop=sp;},50);
}

// ══ SETTINGS ══
function applySettings(){
  document.body.setAttribute('data-theme',App.settings.theme);
  const rc=document.getElementById('reader-content');
  if(rc){rc.style.fontSize=App.settings.fontSize+'px';rc.style.lineHeight=App.settings.lineHeight;rc.style.fontFamily=App.settings.font==='sans'?"'Noto Sans TC',sans-serif":"'Noto Serif TC',serif";}
  document.querySelectorAll('[data-theme-btn]').forEach(b=>b.classList.toggle('active',b.dataset.themeBtn===App.settings.theme));
  document.querySelectorAll('[data-font-btn]').forEach(b=>b.classList.toggle('active',b.dataset.fontBtn===App.settings.font));
  document.querySelectorAll('[data-mode-btn]').forEach(b=>b.classList.toggle('active',b.dataset.modeBtn===(App.settings.readMode||'scroll')));
  document.getElementById('font-size-val').textContent=App.settings.fontSize;
}
function changeFontSize(d){App.settings.fontSize=Math.max(12,Math.min(30,App.settings.fontSize+d));document.getElementById('font-size-val').textContent=App.settings.fontSize;document.getElementById('reader-content').style.fontSize=App.settings.fontSize+'px';if(App.settings.readMode==='flip')buildFlipPages();saveSetting('appSettings',App.settings);}
function setTheme(t){App.settings.theme=t;document.body.setAttribute('data-theme',t);document.querySelectorAll('[data-theme-btn]').forEach(b=>b.classList.toggle('active',b.dataset.themeBtn===t));saveSetting('appSettings',App.settings);}
function setFont(f){App.settings.font=f;document.getElementById('reader-content').style.fontFamily=f==='sans'?"'Noto Sans TC',sans-serif":"'Noto Serif TC',serif";document.querySelectorAll('[data-font-btn]').forEach(b=>b.classList.toggle('active',b.dataset.fontBtn===f));if(App.settings.readMode==='flip')buildFlipPages();saveSetting('appSettings',App.settings);}
function setLineHeight(v){App.settings.lineHeight=v;document.getElementById('reader-content').style.lineHeight=v;if(App.settings.readMode==='flip')buildFlipPages();saveSetting('appSettings',App.settings);}

// ══ PAGE / DRAWER ══
let uiVisible=true;
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('hidden','slide-left'));
  if(name==='reader'){document.getElementById('page-library').classList.add('slide-left');}
  else{_stopTTS();document.getElementById('page-reader').classList.add('hidden');renderLibrary();}
}
function openDrawer(id){document.getElementById(id).classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeAllDrawers(){document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open'));document.getElementById('drawer-overlay').classList.remove('open');}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let _toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

document.addEventListener('DOMContentLoaded',init);
</script>
